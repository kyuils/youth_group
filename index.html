<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>혜림교회 청소년부 출석부</title>
  <!-- 짧은 주소(/youth_group/)로 들어와도 앱(/web/)으로 즉시 이동.
       JS가 막힌 환경을 위해 meta refresh를 백업으로 둔다. -->
  <meta http-equiv="refresh" content="0; url=./web/">
  <script>location.replace('./web/' + location.search + location.hash);</script>
  <meta name="robots" content="noindex">
</head>
<body>
  <p><a href="./web/">출석부로 이동하기</a></p>
</body>
</html>

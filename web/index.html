<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0066FF">
  <title>혜림교회 청소년부 출석부</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js" crossorigin></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <style>
    /* ============================================================
       Montage Design System (WDS) — 혜림교회 청소년부 출석부 적용
       tokens(montage-tokens.css) + components(montage-app.css) inline
       + legacy var alias (JSX inline style 호환) + UX Medium 5 커스텀
       ============================================================ */

    /* ── Montage atomic + semantic + type + space + radius + shadow tokens ── */
    :root {
      /* Common */
      --atomic-common-0: #000000; --atomic-common-100: #ffffff;

      /* Cool Neutral */
      --atomic-coolNeutral-5: #0F0F10; --atomic-coolNeutral-7: #141415; --atomic-coolNeutral-10: #171719;
      --atomic-coolNeutral-15: #1B1C1E; --atomic-coolNeutral-17: #212225; --atomic-coolNeutral-20: #292A2D;
      --atomic-coolNeutral-22: #2E2F33; --atomic-coolNeutral-23: #333438; --atomic-coolNeutral-25: #37383C;
      --atomic-coolNeutral-30: #46474C; --atomic-coolNeutral-40: #5A5C63; --atomic-coolNeutral-50: #70737C;
      --atomic-coolNeutral-60: #878A93; --atomic-coolNeutral-70: #989BA2; --atomic-coolNeutral-80: #AEB0B6;
      --atomic-coolNeutral-90: #C2C4C8; --atomic-coolNeutral-95: #DBDCDF; --atomic-coolNeutral-96: #E1E2E4;
      --atomic-coolNeutral-97: #EAEBEC; --atomic-coolNeutral-98: #F4F4F5; --atomic-coolNeutral-99: #F7F7F8;

      /* Blue — brand */
      --atomic-blue-10:#001536; --atomic-blue-20:#002966; --atomic-blue-30:#003E9C; --atomic-blue-40:#0054D1;
      --atomic-blue-45:#005EEB; --atomic-blue-50:#0066FF; --atomic-blue-55:#1A75FF; --atomic-blue-60:#3385FF;
      --atomic-blue-65:#4F95FF; --atomic-blue-70:#69A5FF; --atomic-blue-80:#9EC5FF; --atomic-blue-90:#C9DEFE;
      --atomic-blue-95:#EAF2FE; --atomic-blue-99:#F7FBFF;

      /* Status atomics */
      --atomic-red-10:#3B0101; --atomic-red-40:#E52222; --atomic-red-50:#FF4242; --atomic-red-60:#FF6363;
      --atomic-red-90:#FED5D5; --atomic-red-95:#FEECEC;
      --atomic-green-10:#00240C; --atomic-green-40:#009632; --atomic-green-50:#00BF40; --atomic-green-60:#1ED45A;
      --atomic-green-90:#ACFCC7; --atomic-green-95:#D9FFE6;
      --atomic-orange-10:#361E00; --atomic-orange-39:#D17600; --atomic-orange-50:#FF9200; --atomic-orange-60:#FFA938;
      --atomic-orange-90:#FEE6C6; --atomic-orange-95:#FEF4E6;

      /* Accent palette */
      --atomic-redOrange-48:#F55A00; --atomic-redOrange-50:#FF5E00; --atomic-redOrange-60:#FF7B2E;
      --atomic-lime-37:#429E00; --atomic-lime-50:#58CF04; --atomic-lime-60:#6BE016;
      --atomic-cyan-40:#0098B2; --atomic-cyan-50:#00BDDE; --atomic-cyan-60:#28D0ED;
      --atomic-lightBlue-40:#008DCF; --atomic-lightBlue-50:#00AEFF; --atomic-lightBlue-60:#3DC2FF;
      --atomic-violet-45:#5B37ED; --atomic-violet-50:#6541F2; --atomic-violet-60:#7D5EF7; --atomic-violet-70:#9E86FC;
      --atomic-purple-40:#AD36E3; --atomic-purple-50:#CB59FF; --atomic-purple-60:#D478FF;
      --atomic-pink-46:#E846CD; --atomic-pink-50:#F553DA; --atomic-pink-60:#FA73E3;

      /* Semantic — Light */
      --semantic-static-white:#ffffff; --semantic-static-black:#000000;
      --semantic-primary-normal:#0066FF; --semantic-primary-strong:#005EEB; --semantic-primary-heavy:#0054D1;
      --semantic-label-normal:#171719; --semantic-label-strong:#000000;
      --semantic-label-neutral:rgba(46,47,51,0.88); --semantic-label-alternative:rgba(55,56,60,0.61);
      --semantic-label-assistive:rgba(55,56,60,0.28); --semantic-label-disable:rgba(55,56,60,0.16);
      --semantic-background-normal-normal:#ffffff; --semantic-background-normal-alternative:#F7F7F8;
      --semantic-background-elevated-normal:#ffffff; --semantic-background-elevated-alternative:#F7F7F8;
      --semantic-background-transparent-normal:rgba(255,255,255,0.08);
      --semantic-background-transparent-alternative:rgba(255,255,255,0.28);
      --semantic-interaction-inactive:#989BA2; --semantic-interaction-disable:#F4F4F5;
      --semantic-line-normal-normal:rgba(112,115,124,0.22);
      --semantic-line-normal-neutral:rgba(112,115,124,0.16);
      --semantic-line-normal-alternative:rgba(112,115,124,0.08);
      --semantic-line-solid-normal:#E1E2E4; --semantic-line-solid-neutral:#EAEBEC; --semantic-line-solid-alternative:#F4F4F5;
      --semantic-status-positive:#00BF40; --semantic-status-cautionary:#FF9200; --semantic-status-negative:#FF4242;
      --semantic-accent-bg-redOrange:#FF5E00; --semantic-accent-bg-lime:#58CF04; --semantic-accent-bg-cyan:#00BDDE;
      --semantic-accent-bg-lightBlue:#00AEFF; --semantic-accent-bg-violet:#6541F2;
      --semantic-accent-bg-purple:#CB59FF; --semantic-accent-bg-pink:#F553DA;
      --semantic-accent-fg-red:#E52222; --semantic-accent-fg-redOrange:#F55A00; --semantic-accent-fg-orange:#D17600;
      --semantic-accent-fg-lime:#429E00; --semantic-accent-fg-green:#009632; --semantic-accent-fg-cyan:#0098B2;
      --semantic-accent-fg-lightBlue:#008DCF; --semantic-accent-fg-blue:#005EEB; --semantic-accent-fg-violet:#5B37ED;
      --semantic-accent-fg-purple:#AD36E3; --semantic-accent-fg-pink:#E846CD;
      --semantic-inverse-primary:#3385FF; --semantic-inverse-background:#1B1C1E; --semantic-inverse-label:#F7F7F8;
      --semantic-fill-normal:rgba(112,115,124,0.08); --semantic-fill-strong:rgba(112,115,124,0.16);
      --semantic-fill-alternative:rgba(112,115,124,0.05);
      --semantic-material-dimmer:rgba(23,23,25,0.52);

      /* Shadows */
      --shadow-xsmall:0px 1px 2px -1px rgba(23,23,23,0.10);
      --shadow-small:0px 2px 4px -2px rgba(23,23,23,0.06), 0px 4px 6px -1px rgba(23,23,23,0.06);
      --shadow-medium:0px 4px 6px -2px rgba(23,23,23,0.07), 0px 10px 15px -3px rgba(23,23,23,0.07);
      --shadow-large:0px 6px 10px -4px rgba(23,23,23,0.08), 0px 16px 24px -6px rgba(23,23,23,0.08);
      --shadow-xlarge:0px 10px 15px -5px rgba(23,23,23,0.10), 0px 24px 38px -10px rgba(23,23,23,0.12);
      --shadow-spread-small:0px 0px 60px 0px rgba(23,23,23,0.10);
      --shadow-spread-medium:0px 15px 75px 0px rgba(23,23,23,0.16);

      /* Spacing */
      --space-0:0px; --space-0-5:0.5px; --space-1:1px; --space-2:2px; --space-4:4px;
      --space-6:6px; --space-8:8px; --space-10:10px; --space-12:12px; --space-14:14px;
      --space-16:16px; --space-20:20px; --space-24:24px; --space-32:32px; --space-40:40px;
      --space-48:48px; --space-56:56px; --space-64:64px; --space-72:72px; --space-80:80px;

      /* Radii */
      --radius-sm:8px; --radius-md:10px; --radius-lg:12px; --radius-xl:16px; --radius-2xl:20px; --radius-pill:9999px;

      /* Type — Pretendard ramp + tracking */
      --font-family-base:"Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      --font-family-mono:"JetBrains Mono", "D2Coding", Menlo, Consolas, monospace;
      --type-title1-size:2rem;       --type-title1-line:2.75rem;   --type-title1-tracking:-0.0253em;
      --type-title3-size:1.5rem;     --type-title3-line:2rem;      --type-title3-tracking:-0.023em;
      --type-heading1-size:1.375rem; --type-heading1-line:1.875rem;--type-heading1-tracking:-0.0194em;
      --type-heading2-size:1.25rem;  --type-heading2-line:1.75rem; --type-heading2-tracking:-0.012em;
      --type-headline1-size:1.125rem;--type-headline1-line:1.625rem;--type-headline1-tracking:-0.002em;
      --type-headline2-size:1.0625rem;--type-headline2-line:1.5rem;--type-headline2-tracking:0em;
      --type-body1-size:1rem;        --type-body1-line:1.5rem;     --type-body1-tracking:0.0057em;
      --type-body2-size:0.9375rem;   --type-body2-line:1.375rem;   --type-body2-tracking:0.0096em;
      --type-label1-size:0.875rem;   --type-label1-line:1.25rem;   --type-label1-tracking:0.0145em;
      --type-label2-size:0.8125rem;  --type-label2-line:1.125rem;  --type-label2-tracking:0.0194em;
      --type-caption1-size:0.75rem;  --type-caption1-line:1rem;    --type-caption1-tracking:0.0252em;
      --type-caption2-size:0.6875rem;--type-caption2-line:0.875rem;--type-caption2-tracking:0.0311em;

      /* Weights */
      --weight-regular:400; --weight-medium:500; --weight-bold-display:700; --weight-bold-text:600;

      /* ── 출석 5상태 액센트 매핑 (도메인 → atomic) — 이 5개만 바꾸면 전부 따라옴 ── */
      --att-p2:        var(--atomic-green-50);
      --att-p3:        var(--atomic-blue-50);
      --att-p4:        var(--atomic-violet-50);
      --att-etc:       var(--atomic-orange-50);
      --att-absent:    var(--atomic-red-50);
      --att-p2-fg:     var(--semantic-accent-fg-green);
      --att-p3-fg:     var(--semantic-accent-fg-blue);
      --att-p4-fg:     var(--semantic-accent-fg-violet);
      --att-etc-fg:    var(--semantic-accent-fg-orange);
      --att-absent-fg: var(--semantic-accent-fg-red);

      /* ── Legacy 변수 alias (JSX inline style 호환용 — 절대 제거 금지) ── */
      --primary:        var(--semantic-primary-normal);
      --primary-strong: var(--semantic-primary-strong);
      --bg:             var(--semantic-background-normal-normal);
      --bg-alt:         var(--semantic-background-normal-alternative);
      --label-normal:   var(--semantic-label-normal);
      --label-alt:      var(--semantic-label-alternative);
      --line-solid:     var(--semantic-line-solid-normal);
      --fill-normal:    var(--semantic-fill-normal);
      --status-positive:   var(--semantic-status-positive);
      --status-cautionary: var(--semantic-status-cautionary);
      --status-negative:   var(--semantic-status-negative);
      --status-violet:     var(--atomic-violet-50);
      --font-base:         var(--font-family-base);

      /* 앱 셸 */
      --app-max: 460px;
      --appbar-h: 56px;
    }

    /* ── Dark theme (선택) — <html data-theme="dark"> ── */
    [data-theme="dark"]{
      --semantic-primary-normal:#3385FF; --semantic-primary-strong:#1A75FF; --semantic-primary-heavy:#0066FF;
      --semantic-label-normal:#F7F7F8; --semantic-label-strong:#ffffff;
      --semantic-label-neutral:rgba(194,196,200,0.88); --semantic-label-alternative:rgba(174,176,182,0.61);
      --semantic-label-assistive:rgba(174,176,182,0.28); --semantic-label-disable:rgba(152,155,162,0.16);
      --semantic-background-normal-normal:#1B1C1E; --semantic-background-normal-alternative:#0F0F10;
      --semantic-background-elevated-normal:#212225; --semantic-background-elevated-alternative:#141415;
      --semantic-interaction-inactive:#5A5C63; --semantic-interaction-disable:#2E2F33;
      --semantic-line-normal-normal:rgba(112,115,124,0.32);
      --semantic-line-normal-neutral:rgba(112,115,124,0.28);
      --semantic-line-normal-alternative:rgba(112,115,124,0.22);
      --semantic-line-solid-normal:#37383C; --semantic-line-solid-neutral:#333438; --semantic-line-solid-alternative:#2E2F33;
      --semantic-status-positive:#1ED45A; --semantic-status-cautionary:#FFA938; --semantic-status-negative:#FF6363;
      --semantic-fill-normal:rgba(112,115,124,0.22); --semantic-fill-strong:rgba(112,115,124,0.28);
      --semantic-fill-alternative:rgba(112,115,124,0.12);
      --semantic-material-dimmer:rgba(23,23,25,0.74);
      --semantic-inverse-primary:#0066FF; --semantic-inverse-background:#ffffff; --semantic-inverse-label:#171719;
    }

    /* ====== RESET / BASE ====== */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:var(--font-family-base);
      color:var(--semantic-label-normal);
      background:var(--semantic-background-normal-alternative);
      font-size:var(--type-body1-size);
      line-height:var(--type-body1-line);
      letter-spacing:var(--type-body1-tracking);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit}
    #root{min-height:100dvh;display:flex;justify-content:center;background:var(--semantic-background-normal-alternative)}

    /* ====== APP SHELL ====== */
    .app{
      width:100%;max-width:var(--app-max);min-height:100dvh;
      background:var(--semantic-background-normal-normal);
      display:flex;flex-direction:column;position:relative;
      box-shadow:var(--shadow-spread-small);
    }
    @media(max-width:460px){.app{box-shadow:none;max-width:100%}}

    /* ====== APPBAR ====== */
    .appbar{
      position:sticky;top:0;z-index:10;
      background:color-mix(in srgb, var(--semantic-background-normal-normal) 88%, transparent);
      backdrop-filter:saturate(180%) blur(32px);
      -webkit-backdrop-filter:saturate(180%) blur(32px);
      border-bottom:1px solid var(--semantic-line-solid-normal);
      padding:env(safe-area-inset-top) 0 0;
    }
    .appbar-inner{height:var(--appbar-h);display:flex;align-items:center;padding:0 var(--space-16);gap:var(--space-8)}
    .appbar-title{flex:1;display:flex;flex-direction:column;line-height:1.15;min-width:0}
    .appbar-title .sub{
      font-size:var(--type-caption2-size);line-height:var(--type-caption2-line);
      letter-spacing:var(--type-caption2-tracking);
      color:var(--semantic-label-alternative);font-weight:var(--weight-medium);
    }
    .appbar-title .main{
      font-size:var(--type-headline2-size);line-height:1.25;
      letter-spacing:var(--type-headline2-tracking);
      font-weight:var(--weight-bold-text);
      color:var(--semantic-label-normal);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    /* ====== BUTTONS ====== */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      height:44px;padding:0 var(--space-16);
      border-radius:var(--radius-lg);
      font-size:var(--type-body2-size);letter-spacing:var(--type-body2-tracking);
      font-weight:var(--weight-bold-text);
      transition:background 150ms ease, box-shadow 150ms ease, color 150ms ease;
    }
    .btn.primary{background:var(--semantic-primary-normal);color:var(--semantic-static-white)}
    .btn.primary:hover{background:var(--semantic-primary-strong)}
    .btn.primary:active{background:var(--semantic-primary-heavy)}
    .btn.ghost{background:var(--semantic-fill-normal);color:var(--semantic-label-normal)}
    .btn.ghost:hover{background:var(--semantic-fill-strong)}
    .btn.danger{background:color-mix(in srgb, var(--semantic-status-negative) 10%, transparent);color:var(--semantic-status-negative)}
    .btn.danger:hover{background:color-mix(in srgb, var(--semantic-status-negative) 16%, transparent)}
    .btn.sm{height:32px;padding:0 var(--space-12);font-size:var(--type-label2-size);letter-spacing:var(--type-label2-tracking);border-radius:var(--radius-sm)}

    /* ====== LOGIN / 표지 ====== */
    .login{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      padding:var(--space-32) var(--space-24) var(--space-32);gap:var(--space-14);text-align:center;
    }
    .login h1{font-size:var(--type-heading1-size);line-height:var(--type-heading1-line);letter-spacing:var(--type-heading1-tracking);font-weight:var(--weight-bold-display);margin:0}
    .login p{color:var(--semantic-label-alternative);margin:0}
    .login-brand{display:inline-flex;align-items:center;gap:var(--space-6);margin-bottom:var(--space-24)}
    .login-brand-text{font-size:var(--type-label1-size);font-weight:var(--weight-bold-display);color:var(--semantic-label-normal);letter-spacing:-0.01em}
    .login-illustration{margin:var(--space-8) 0 var(--space-4);display:flex;justify-content:center}
    .login-illustration svg{filter:drop-shadow(0 6px 16px color-mix(in srgb, var(--semantic-primary-normal) 12%, transparent))}
    .login-title{
      font-size:var(--type-heading1-size);line-height:var(--type-heading1-line);
      font-weight:var(--weight-bold-display);letter-spacing:var(--type-heading1-tracking);
      margin:var(--space-8) 0 0;color:var(--semantic-label-normal);
    }
    .login-sub{font-size:var(--type-body2-size);color:var(--semantic-label-alternative);margin:0 0 var(--space-6)}
    .login-features{display:flex;gap:var(--space-8);flex-wrap:wrap;justify-content:center;margin:var(--space-4) 0 var(--space-8)}
    .feature-badge{
      display:inline-flex;align-items:center;gap:var(--space-6);
      padding:7px var(--space-12);border-radius:var(--radius-pill);
      background:var(--semantic-fill-normal);color:var(--semantic-label-neutral);
      font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);
      font-weight:var(--weight-bold-text);
    }
    .feature-badge svg{display:block;flex-shrink:0}
    .login-gis{
      margin-top:var(--space-12);padding:var(--space-6);
      border:1px solid var(--semantic-line-solid-normal);border-radius:var(--radius-xl);
      background:var(--semantic-background-normal-normal);box-shadow:var(--shadow-xsmall);
    }

    /* ====== STUDENT CARD ====== */
    .student-card{
      padding:var(--space-12) var(--space-16);
      border:1px solid var(--semantic-line-solid-normal);
      border-radius:var(--radius-xl);
      margin:var(--space-8) var(--space-16);
      display:flex;align-items:center;gap:var(--space-12);
      background:var(--semantic-background-normal-normal);
      transition:border-color 150ms ease, background 150ms ease;
    }
    .student-card.compact{padding:var(--space-10) var(--space-12);margin:var(--space-6) var(--space-12);gap:var(--space-10)}
    .student-card.compact .student-info{flex:0 0 80px;min-width:80px;max-width:96px}
    .student-card.compact .student-name{font-size:var(--type-label1-size);line-height:1.2}
    .student-card.compact .student-meta{font-size:var(--type-caption2-size);margin-top:1px}
    .student-card.compact .student-actions{flex:1;gap:var(--space-4);justify-content:flex-end}

    .student-name{font-weight:var(--weight-bold-text);color:var(--semantic-label-normal)}
    .student-meta{font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);color:var(--semantic-label-alternative)}
    .student-actions{margin-left:auto;display:flex;gap:var(--space-6);flex-wrap:wrap;justify-content:flex-end}

    .student-card[data-status="P2"]    {background:color-mix(in srgb, var(--att-p2) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p2) 26%, transparent)}
    .student-card[data-status="P3"]    {background:color-mix(in srgb, var(--att-p3) 4%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p3) 24%, transparent)}
    .student-card[data-status="P4"]    {background:color-mix(in srgb, var(--att-p4) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p4) 24%, transparent)}
    .student-card[data-status="ETC"]   {background:color-mix(in srgb, var(--att-etc) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-etc) 26%, transparent)}
    .student-card[data-status="ABSENT"]{background:color-mix(in srgb, var(--att-absent) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-absent) 24%, transparent)}

    /* ====== STATUS PILL ====== */
    .pill{
      padding:var(--space-6) var(--space-10);border-radius:var(--radius-pill);
      font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);
      font-weight:var(--weight-bold-text);
      border:1.5px solid var(--semantic-line-solid-normal);
      background:var(--semantic-background-normal-normal);
      color:var(--semantic-label-neutral);
      transition:background 150ms ease, border-color 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }
    .pill.compact{padding:var(--space-4) 7px;font-size:var(--type-caption2-size);border-width:1px;letter-spacing:-0.02em}

  <script>
    window.APP_CONFIG = {

      OAUTH_CLIENT_ID: '90527666620-pv68hai4j0rfqa94hsubrs2pe3afgril.apps.googleusercontent.com',

  </script>
  <script type="text/babel" data-presets="env,react" data-type="module">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ──────────────── API client ────────────────
    async function callApi(action, payload) {
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(window.APP_CONFIG.GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body,
      });
      if (!res.ok) throw new Error('네트워크 오류 ' + res.status);
      const json = await res.json();
      if (json && json.ok === false && (json.code === 'token_expired' || json.code === 'invalid_token')) {
        sessionStorage.removeItem('idToken');
      }
      return json;
    }

    // ──────────────── Google Auth ────────────────
    function useGoogleAuth() {
      const [idToken, setIdToken] = useState(() => sessionStorage.getItem('idToken') || null);
      const [ready, setReady] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        let cancelled = false;
        let attempts = 0;
        let timerId = null;
        const tryInit = () => {
          if (cancelled) return;
          if (!window.google || !window.google.accounts || !window.google.accounts.id) {
            attempts++;
            if (attempts > 50) { console.warn('GIS failed to load after 5s'); return; }
            timerId = setTimeout(tryInit, 100);
            return;
          }
          google.accounts.id.initialize({
            client_id: window.APP_CONFIG.OAUTH_CLIENT_ID,
            callback: (resp) => {
              if (resp && resp.credential) {
                sessionStorage.setItem('idToken', resp.credential);
                setIdToken(resp.credential);
              }
            },
            auto_select: false,
          });
          setReady(true);
        };
        tryInit();
        return () => { cancelled = true; if (timerId) clearTimeout(timerId); };
      }, []);

      const renderButton = useCallback(() => {
        if (!ready || !containerRef.current) return;
        google.accounts.id.renderButton(containerRef.current, { theme: 'outline', size: 'large', text: 'signin_with' });
      }, [ready]);

      useEffect(() => { if (ready && !idToken) renderButton(); }, [ready, idToken, renderButton]);

      const signOut = useCallback(() => {
        sessionStorage.removeItem('idToken');
        setIdToken(null);
        if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
      }, []);

      return { idToken, ready, containerRef, signOut };
    }

    // ──────────────── Helpers ────────────────
    function todayISO() {
      const now = new Date();
      const kst = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
      const y = kst.getUTCFullYear();
      const m = String(kst.getUTCMonth()+1).padStart(2,'0');
      const dd = String(kst.getUTCDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    // Relative time for prayer createdAt etc. Accepts 'YYYY-MM-DD' or
    // ISO timestamp; returns "오늘", "어제", "N일 전", "N주 전", or absolute date.
    function relativeDate(iso) {
      if (!iso) return '';
      const dateOnly = String(iso).slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateOnly)) return iso;
      const then = new Date(dateOnly + 'T00:00:00');
      const now = new Date(todayISO() + 'T00:00:00');
      const diff = Math.round((now - then) / 86400000);
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff > 0 && diff < 14) return diff + '일 전';
      if (diff >= 14 && diff < 60) return Math.floor(diff / 7) + '주 전';
      if (diff < 0) return dateOnly; // future → show absolute
      return dateOnly;
    }

    const STATUS_OPTIONS = [
      { code: 'P2', label: '2부', accent: 'positive' },
      { code: 'P3', label: '3부', accent: 'primary' },
      { code: 'P4', label: '4부', accent: 'violet' },
      { code: 'ETC', label: '기타', accent: 'cautionary' },
      { code: 'ABSENT', label: '결석', accent: 'negative' },
    ];

    // present = attended a service (P2/P3/P4)
    const PRESENT_CODES = ['P2', 'P3', 'P4'];

    const TITLE_LABELS = {
      pastor: '강도사',
      head: '교사총무',
      dev: '개발자',
      newcomer_lead: '새가족부 총괄',
    };

    function roleLabel(me) {
      const roleName =
        me.role === 'admin' ? '관리자'
        : me.role === 'newcomer_staff' ? '새가족부'
        : '교사';
      const titleName = TITLE_LABELS[me.title] || '';
      return titleName ? `${roleName} · ${titleName}` : roleName;
    }

    // ──────────────── Toast ────────────────
    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="toast">{msg}</div>;
    }

    function useToast() {
      const [msg, setMsg] = useState(null);
      const timerRef = useRef(null);
      const show = useCallback((m) => {
        setMsg(m);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => setMsg(null), 2200);
      }, []);
      useEffect(() => () => { if (timerRef.current) clearTimeout(timerRef.current); }, []);
      return React.useMemo(() => ({ msg, show }), [msg, show]);
    }

    // ──────────────── Login / Error screens ────────────────
    function LoginScreen({ containerRef }) {
      return (
        <div className="login">
          <div className="login-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="12" cy="12" r="10" fill="#E8F0FE" stroke="#0066FF" strokeWidth="1.5"/>
              <path d="M12 6v12M6 12h12" stroke="#0066FF" strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <span className="login-brand-text">혜림교회</span>
          </div>
          <div className="login-illustration" aria-hidden="true">

          </div>
          <div ref={containerRef} className="login-gis" />
        </div>
      );
    }

    function UnauthorizedScreen({ email, onSignOut }) {
      return (
        <div className="login">
          <h1>접근 권한이 없어요</h1>
          <p>{email} 계정은 교사 명단에 등록되지 않았습니다.</p>
          <p>부장에게 등록을 요청하세요.</p>
          <button className="btn ghost" onClick={onSignOut}>다른 계정으로 로그인</button>
        </div>
      );
    }

    // ──────────────── App (top-level) ────────────────
    function App() {
      const auth = useGoogleAuth();
      // me = { email, teacher, role, title, permissions }
      const [me, setMe] = useState(null);
      const [authError, setAuthError] = useState(null);

      useEffect(() => {
        if (!auth.idToken) { setMe(null); setAuthError(null); return; }
        let aborted = false;
        callApi('whoami', { idToken: auth.idToken })
          .then((r) => {
            if (aborted) return;
            if (r.ok) {
              setMe({
                email: r.email,
                teacher: r.teacher,
                role: r.role || 'teacher',
                // title may come top-level or nested; defensive read
                title: r.title || (typeof r.teacher === 'object' && r.teacher && r.teacher.title) || '',
                permissions: r.permissions || [],
              });
              setAuthError(null);
            } else if (r.code === 'unauthorized') {
              setAuthError({ code: 'unauthorized', email: r.email }); setMe(null);
            } else if (r.code === 'token_expired' || r.code === 'invalid_token' || r.code === 'aud_mismatch' || r.code === 'iss_mismatch' || r.code === 'email_unverified') {
              sessionStorage.removeItem('idToken');
              auth.signOut();
            } else {
              setAuthError({ code: r.code || 'unknown' }); setMe(null);
            }
          })
          .catch((e) => { if (!aborted) setAuthError({ code: 'network', message: e.message }); });
        return () => { aborted = true; };
      }, [auth.idToken, auth.signOut]);

      if (!auth.idToken) return <div className="app"><LoginScreen containerRef={auth.containerRef} /></div>;
      if (authError && authError.code === 'unauthorized') {
        return <div className="app"><UnauthorizedScreen email={authError.email} onSignOut={auth.signOut} /></div>;
      }
      if (!me) {
        if (authError) {
          return (
            <div className="app">
              <div className="login">
                <h1>서버에 연결할 수 없어요</h1>
                <p>네트워크 또는 서버(GAS) 설정 문제일 수 있습니다.</p>
                <p style={{fontSize:12,color:'var(--label-alt)'}}>오류 코드: {authError.code}{authError.message ? ' · ' + authError.message : ''}</p>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn ghost" onClick={() => {
                    setAuthError(null);
                    const t = auth.idToken;
                    auth.signOut();
                    setTimeout(() => { sessionStorage.setItem('idToken', t); window.location.reload(); }, 50);
                  }}>다시 시도</button>
                  <button className="btn ghost" onClick={auth.signOut}>로그아웃</button>
                </div>
              </div>
            </div>
          );
        }
        return <div className="app"><div className="loading">로그인 확인 중…</div></div>;
      }

      return <Shell me={me} idToken={auth.idToken} onSignOut={auth.signOut} />;
    }

    // ──────────────── Shell ────────────────
    function Shell({ me, idToken, onSignOut }) {
      // Admin with no class (e.g. 김지헌 pastor) defaults to admin tab per spec §9
      const [tab, setTab] = useState(() =>
        (!me.teacher && me.permissions.includes('read_all')) ? 'admin' : 'roster'
      );
      const [date, setDate] = useState(todayISO());
      const [detailId, setDetailId] = useState(null);
      const toast = useToast();

      const TABS = useMemo(() => {
        const base = [['roster','출석'],['prayer','기도제목'],['records','기록'],['stats','통계']];
        const extra = [];
        if (me.permissions.includes('write_newcomer')) extra.push(['newcomers','새가족부']);
        if (me.permissions.includes('read_all')) extra.push(['admin','관리자']);
        return [...base, ...extra];
      }, [me.permissions]);

      // If current tab disappeared after permission change, reset
      const validTab = TABS.some(([k]) => k === tab) ? tab : 'roster';

      return (
        <div className="app">
          <div className="appbar">
            <div className="appbar-inner">
              <div className="appbar-title">
                <div className="sub">청소년부 · {roleLabel(me)}</div>
                <div className="main">{me.teacher ? me.teacher + ' 반' : me.email}</div>
              </div>
              <button className="btn ghost" onClick={onSignOut} style={{height:36,fontSize:13}}>로그아웃</button>
            </div>
          </div>

          {validTab === 'roster'    && <RosterView    idToken={idToken} me={me} date={date} onChangeDate={setDate} toast={toast} onOpenDetail={setDetailId} />}
          {validTab === 'prayer'    && <PrayerView    idToken={idToken} toast={toast} />}
          {validTab === 'records'   && <RecordsView   idToken={idToken} toast={toast} me={me} />}
          {validTab === 'stats'     && <StatsView     idToken={idToken} toast={toast} />}
          {validTab === 'newcomers' && <NewcomersView idToken={idToken} toast={toast} />}
          {validTab === 'admin'     && <AdminView     idToken={idToken} toast={toast} me={me} />}

          <div className="bottomnav">
            {TABS.map(([k, label]) => (
              <button key={k} className={validTab === k ? 'active' : ''} onClick={() => setTab(k)}>{label}</button>
            ))}
          </div>

          {detailId && <StudentDetail idToken={idToken} studentId={detailId} onClose={() => setDetailId(null)} toast={toast} />}
          <Toast msg={toast.msg} />
        </div>
      );
    }

    // ──────────────── RosterView ────────────────
    function RosterView({ idToken, me, date, onChangeDate, toast, onOpenDetail }) {
      const [students, setStudents] = useState(null);
      const [att, setAtt] = useState({});
      const [attRows, setAttRows] = useState([]); // raw rows for last-attended & streak
      const [loading, setLoading] = useState(true);
      const [pendingEtc, setPendingEtc] = useState(null); // { studentId, status, prevStatus }
      const [bulkBusy, setBulkBusy] = useState(false);
      const [sortBy, setSortBy] = useState('name');    // 'name' | 'grade' | 'lastAtt'
      const [filterBy, setFilterBy] = useState('all'); // 'all' | 'unmarked' | 'streak'

      useEffect(() => {
        let aborted = false;
        setLoading(true);
        Promise.all([
          callApi('getRoster', { idToken }),
          callApi('getAttendance', { idToken, year: new Date().getFullYear() }),
        ]).then(([r, a]) => {
          if (aborted) return;
          if (!r.ok) { toast.show('명단 불러오기 실패'); setLoading(false); return; }
          if (!a.ok) toast.show('출석 기록 불러오기 실패');
          setStudents(r.students);
          const rows = (a.rows || []);
          setAttRows(rows);
          const map = {};
          rows.forEach((row) => { map[row.date + '|' + row.studentId] = row.status; });
          setAtt(map);
          setLoading(false);
        }).catch(() => { if (!aborted) { toast.show('네트워크 오류'); setLoading(false); } });
        return () => { aborted = true; };
      }, [idToken, toast.show]);

      // Common attendance write with optimistic update + rollback.
      const saveAttendance = (studentId, status, etcText) => {
        const key = date + '|' + studentId;
        let prev;
        setAtt((m) => { prev = m[key]; return { ...m, [key]: status }; });
        callApi('setAttendance', { idToken, date, studentId, status, etcText })
          .then((r) => {
            if (!r.ok) {
              setAtt((m) => {
                if (m[key] !== status) return m;
                const next = { ...m };
                if (prev !== undefined) next[key] = prev; else delete next[key];
                return next;
              });
              toast.show('저장 실패: ' + (r.code || ''));
            }
          })
          .catch(() => {
            setAtt((m) => {
              if (m[key] !== status) return m;
              const next = { ...m };
              if (prev !== undefined) next[key] = prev; else delete next[key];
              return next;
            });
            toast.show('네트워크 오류');
          });
      };

      const setStatus = (studentId, status) => {
        // ETC/ABSENT use a mobile-friendly bottom sheet instead of window.prompt.
        if (status === 'ETC' || status === 'ABSENT') {
          const prev = att[date + '|' + studentId];
          setPendingEtc({ studentId, status, prevStatus: prev });
          return;
        }
        saveAttendance(studentId, status, '');
      };

      const handleEtcSave = (text) => {
        if (!pendingEtc) return;
        saveAttendance(pendingEtc.studentId, pendingEtc.status, text || '');
        setPendingEtc(null);
      };
      const handleEtcCancel = () => setPendingEtc(null);

      // Bulk attendance: apply same status to every student in the class.
      const bulkSet = (status) => {
        if (!students || students.length === 0) return;
        const label = STATUS_OPTIONS.find(function(o){return o.code === status;});
        const labelText = label ? label.label : status;
        if (!window.confirm('반 전체 ' + students.length + '명을 \'' + labelText + '\'로 일괄 표시할까요?')) return;
        setBulkBusy(true);
        const items = students.map(function(s){ return { studentId: s.id, status: status, etcText: '' }; });
        // optimistic
        setAtt(function(m){
          const next = { ...m };
          students.forEach(function(s){ next[date + '|' + s.id] = status; });
          return next;
        });
        callApi('setAttendanceBatch', { idToken, date, items })
          .then(function(r){
            setBulkBusy(false);
            if (r.ok) toast.show((r.written || items.length) + '명 ' + labelText + ' 처리됨');
            else toast.show('일괄 저장 실패: ' + (r.code || ''));
          })
          .catch(function(){ setBulkBusy(false); toast.show('네트워크 오류'); });
      };

      if (loading) return <div className="loading">불러오는 중…</div>;
      if (!students || students.length === 0) return <div className="loading">학생이 없습니다.</div>;

      // ── M4/M5 계산: 학생별 마지막 출석일 + 최근 3주 연속 결석 ──
      // rowsByStudent[id] = 그 학생의 모든 row를 date desc 정렬
      const rowsByStudent = {};
      attRows.forEach(function(r){
        (rowsByStudent[r.studentId] = rowsByStudent[r.studentId] || []).push(r);
      });
      Object.keys(rowsByStudent).forEach(function(id){
        rowsByStudent[id].sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
      });

      function lastAttendedOf(id) {
        const rs = rowsByStudent[id] || [];
        for (let i = 0; i < rs.length; i++) {
          if (PRESENT_CODES.indexOf(rs[i].status) >= 0) return rs[i].date;
        }
        return null;
      }
      function isStreakAbsent(id) {
        const rs = rowsByStudent[id] || [];
        if (rs.length < 3) return false;
        return rs[0].status === 'ABSENT' && rs[1].status === 'ABSENT' && rs[2].status === 'ABSENT';
      }
      function daysSince(iso) {
        if (!iso) return null;
        const a = new Date(iso + 'T00:00:00');
        const b = new Date(todayISO() + 'T00:00:00');
        const diff = Math.round((b - a) / 86400000);
        return diff >= 0 ? diff : null;
      }
      function shortDate(iso) {
        if (!iso) return '';
        const parts = iso.split('-');
        return parts.length === 3 ? (parts[1] + '/' + parts[2]) : iso;
      }
      function gradeOrder(g) {
        // 중1<중2<중3<고1<고2<고3<기타
        const map = { '중1':1,'중2':2,'중3':3,'고1':4,'고2':5,'고3':6 };
        return map[g] || 99;
      }

      // ── M2 정렬·필터 적용 ──
      let view = students.slice();
      if (filterBy === 'unmarked') {
        view = view.filter(function(s){ return !att[date + '|' + s.id]; });
      } else if (filterBy === 'streak') {
        view = view.filter(function(s){ return isStreakAbsent(s.id); });
      }
      if (sortBy === 'name') {
        view.sort(function(a,b){ return String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko'); });
      } else if (sortBy === 'grade') {
        view.sort(function(a,b){
          const d = gradeOrder(a['학년']) - gradeOrder(b['학년']);
          return d !== 0 ? d : String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko');
        });
      } else if (sortBy === 'lastAtt') {
        view.sort(function(a,b){
          const la = lastAttendedOf(a.id) || '';
          const lb = lastAttendedOf(b.id) || '';
          if (la === lb) return String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko');
          return la < lb ? 1 : -1; // recent first
        });
      }

      // counts for filter chips
      const unmarkedCount = students.filter(function(s){ return !att[date + '|' + s.id]; }).length;
      const streakCount   = students.filter(function(s){ return isStreakAbsent(s.id); }).length;

      return (
        <>
          <div style={{padding:'12px 16px 0'}}>
            <label style={{fontSize:13,color:'var(--label-alt)'}}>예배 날짜</label>
            <input type="date" value={date} onChange={(e) => onChangeDate(e.target.value)}
              style={{display:'block',marginTop:4,padding:'8px 12px',border:'1px solid var(--line-solid)',borderRadius:8,font:'inherit',width:'100%'}} />
          </div>
          <div className="bulk-bar">
            <span className="bulk-label">일괄 표시</span>
            {STATUS_OPTIONS.map((opt) => (
              <button key={opt.code} className="pill compact"
                disabled={bulkBusy}
                onClick={() => bulkSet(opt.code)}>{opt.label}</button>
            ))}
          </div>
          <div className="filter-bar" role="toolbar" aria-label="명단 필터·정렬">
            <button className={'filter-chip' + (filterBy === 'all' ? ' active' : '')}
              onClick={() => setFilterBy('all')}>전체<span className="count">{students.length}</span></button>
            <button className={'filter-chip' + (filterBy === 'unmarked' ? ' active' : '')}
              onClick={() => setFilterBy('unmarked')}>미체크<span className="count">{unmarkedCount}</span></button>
            <button className={'filter-chip' + (filterBy === 'streak' ? ' active' : '')}
              onClick={() => setFilterBy('streak')}>⚠ 3주결석<span className="count">{streakCount}</span></button>
            <span className="filter-sep"></span>
            <button className={'filter-chip' + (sortBy === 'name' ? ' active' : '')}
              onClick={() => setSortBy('name')}>이름순</button>
            <button className={'filter-chip' + (sortBy === 'grade' ? ' active' : '')}
              onClick={() => setSortBy('grade')}>학년순</button>
            <button className={'filter-chip' + (sortBy === 'lastAtt' ? ' active' : '')}
              onClick={() => setSortBy('lastAtt')}>최근출석순</button>
          </div>
          {view.length === 0 && (
            <div className="loading" style={{padding:24}}>
              {filterBy === 'unmarked' ? '모두 체크되었습니다 🎉'
                : filterBy === 'streak' ? '3주 연속 결석한 학생이 없습니다 🎉'
                : '학생이 없습니다.'}
            </div>
          )}
          {view.map((s) => {
            const cur = att[date + '|' + s.id];
            const last = lastAttendedOf(s.id);
            const days = daysSince(last);
            const lastClass = days === null ? '' : (days <= 7 ? 'recent' : (days >= 21 ? 'stale' : ''));
            const streak = isStreakAbsent(s.id);
            return (
              <div className={'student-card compact' + (streak ? ' warn' : '')} key={s.id} data-status={cur || undefined}>
                <div className="student-info">
                  <button className="student-name" onClick={() => onOpenDetail(s.id)} style={{textAlign:'left'}}>
                    {s['이름']}
                    {streak && <span className="warn-badge" title="최근 3개 예배 모두 결석">⚠ 3주</span>}
                  </button>
                  <div className="student-meta">
                    {s['학년']} · {s['성별']}
                    {last ? (
                      <span className={'last-att ' + lastClass} title={'마지막 출석: ' + last}>
                        · {days === 0 ? '오늘' : (days + '일 전')}
                      </span>
                    ) : (
                      <span className="last-att stale" title="올해 출석 기록 없음">· 기록 없음</span>
                    )}
                  </div>
                </div>
                <div className="student-actions">
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill compact ' + (cur === opt.code ? 'active ' + opt.code : '')}
                      onClick={() => setStatus(s.id, opt.code)}>{opt.label}</button>
                  ))}
                </div>
              </div>
            );
          })}
          {pendingEtc && (
            <EtcInputSheet status={pendingEtc.status} onSave={handleEtcSave} onCancel={handleEtcCancel} />
          )}
        </>
      );
    }

    // Mobile-friendly bottom sheet for entering ETC (외부예배) or ABSENT 사유.
    // Replaces window.prompt for better keyboard handling on phones.
    function EtcInputSheet({ status, onSave, onCancel }) {
      const [value, setValue] = useState('');
      const isEtc = status === 'ETC';
      const title = isEtc ? '외부 예배 입력' : '결석 사유 (선택)';
      const help = isEtc
        ? '다른 곳에서 예배드린 장소나 사유를 입력하세요. 예: 타 교회, 사경회, 수련회'
        : '결석 사유를 입력하세요. 비워두면 사유 없이 결석으로 기록됩니다.';
      const placeholder = isEtc ? '예: 타 교회, 사경회' : '예: 병원, 가족여행 (빈 칸도 OK)';

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onCancel]);

      return (
        <div className="sheet-overlay" role="dialog" aria-modal="true" onClick={onCancel}>
          <div className="sheet" onClick={(e)=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <div style={{padding:'4px 20px 20px'}}>
              <h3 style={{margin:'4px 0 6px',fontSize:17,fontWeight:600}}>{title}</h3>
              <p style={{margin:'0 0 12px',fontSize:12,color:'var(--label-alt)',lineHeight:1.45}}>{help}</p>
              <input type="text" autoFocus value={value}
                onChange={(e) => setValue(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') onSave(value); }}
                placeholder={placeholder}
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line-solid)',borderRadius:10,fontSize:15,fontFamily:'inherit',outline:'none'}} />
              <div style={{display:'flex',gap:8,marginTop:14}}>

    // ──────────────── PrayerView ────────────────
    function PrayerView({ idToken, toast }) {
      const [prayers, setPrayers] = useState(null);
      const [students, setStudents] = useState([]);
      const [editing, setEditing] = useState(null);
      const [loading, setLoading] = useState(true);

      const reload = useCallback(() => {
        setLoading(true);
        Promise.all([callApi('getRoster', { idToken }), callApi('getPrayers', { idToken })])
          .then(([r, p]) => {
            if (r.ok) setStudents(r.students);
            if (p.ok) setPrayers(p.prayers);
            setLoading(false);
          })
          .catch(() => { toast.show('불러오기 실패'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      useEffect(() => {
        if (!editing) return;
        const onKey = (e) => { if (e.key === 'Escape') setEditing(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [editing]);

      const save = () => {
        if (!editing) return;
        callApi('setPrayer', { idToken, id: editing.id, studentId: editing.studentId, text: editing.text, active: true })
          .then((r) => {
            if (r.ok) { setEditing(null); reload(); toast.show('저장됨'); }
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      const remove = (p) => {
        if (!confirm('이 기도제목을 삭제할까요?')) return;
        callApi('setPrayer', { idToken, id: p.id, studentId: p.studentId, text: p.text, active: false })
          .then((r) => { if (r.ok) reload(); else toast.show('삭제 실패'); })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byStudent = {};
      (prayers || []).forEach((p) => { (byStudent[p.studentId] = byStudent[p.studentId] || []).push(p); });

      return (
        <>
          {students.map((s) => (
            <div key={s.id} style={{padding:'12px 16px',borderBottom:'1px solid var(--line-solid)'}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div className="student-name">{s['이름']}</div>
                <button className="btn ghost sm" aria-label={`${s['이름']} 기도제목 추가`} style={{marginLeft:'auto'}}
                  onClick={() => setEditing({ studentId: s.id, text: '' })}>＋</button>
              </div>
              {(byStudent[s.id] || []).map((p) => (
                <div key={p.id} style={{marginTop:8,padding:'10px 12px',background:'var(--fill-normal)',borderRadius:10,display:'flex',gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{whiteSpace:'pre-wrap'}}>{p.text}</div>
                    {p.createdAt && (
                      <div className="prayer-meta" title={p.createdAt}>
                        {relativeDate(p.createdAt)}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setEditing({ id: p.id, studentId: p.studentId, text: p.text })} style={{color:'var(--label-alt)'}}>수정</button>
                  <button onClick={() => remove(p)} style={{color:'var(--status-negative)'}}>삭제</button>
                </div>
              ))}
            </div>
          ))}
          {editing && (
            <div className="sheet-overlay" onClick={() => setEditing(null)}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <div className="sheet-handle" />
                <div className="sheet-header"><h3>기도제목</h3></div>
                <div className="sheet-body">
                  <textarea value={editing.text} onChange={(e) => setEditing({ ...editing, text: e.target.value })}
                    rows={4} style={{width:'100%',padding:10,border:'1.5px solid var(--line-solid)',borderRadius:10,font:'inherit'}} />
                </div>
                <div className="sheet-footer" style={{display:'flex',gap:8}}>
                  <button className="btn ghost" style={{flex:1}} onClick={() => setEditing(null)}>취소</button>
                  <button className="btn primary" style={{flex:1}} onClick={save}>저장</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // ──────────────── StatsView ────────────────
    function StatsView({ idToken, toast }) {
      const [data, setData] = useState(null);
      const [sortBy, setSortBy] = useState('name'); // 'name' | 'pct_desc' | 'pct_asc'
      useEffect(() => {
        Promise.all([callApi('getRoster',{idToken}), callApi('getAttendance',{idToken, year: new Date().getFullYear()})])
          .then(([r,a]) => { if (r.ok && a.ok) setData({ students: r.students, rows: a.rows }); })
          .catch(() => toast.show('네트워크 오류'));
      }, [idToken, toast.show]);
      if (!data) return <div className="loading">불러오는 중…</div>;
      if (!data.students || data.students.length === 0) return <div className="loading">학생이 없습니다.</div>;
      const dates = Array.from(new Set(data.rows.map((r) => r.date)));
      if (dates.length === 0) return <div className="loading">올해 출석 기록이 아직 없습니다.</div>;

      // 학생별 출석률 계산
      const total = dates.length;
      const perStudent = data.students.map(function(s){
        const mine = data.rows.filter(function(r){ return r.studentId === s.id; });
        const present = mine.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
        const pct = total > 0 ? Math.round((present / total) * 100) : 0;
        return { s: s, present: present, pct: pct };
      });

      // 반 평균
      const avgPct = perStudent.length > 0
        ? Math.round(perStudent.reduce(function(acc, x){ return acc + x.pct; }, 0) / perStudent.length)
        : 0;
      const riskCount = perStudent.filter(function(x){ return x.pct < 50; }).length;
      const goodCount = perStudent.filter(function(x){ return x.pct >= 80; }).length;

      // 최근 주 출석률 (가장 최근 date 한 회의 P2/P3/P4 비율)
      const latestDate = dates.slice().sort().reverse()[0];
      const latestRows = data.rows.filter(function(r){ return r.date === latestDate; });
      const latestPresent = latestRows.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
      const latestPct = data.students.length > 0
        ? Math.round((latestPresent / data.students.length) * 100) : 0;

      // 정렬
      let view = perStudent.slice();
      if (sortBy === 'name') {
        view.sort(function(a,b){ return String(a.s['이름']||'').localeCompare(String(b.s['이름']||''),'ko'); });
      } else if (sortBy === 'pct_desc') {
        view.sort(function(a,b){ return b.pct - a.pct; });
      } else if (sortBy === 'pct_asc') {
        view.sort(function(a,b){ return a.pct - b.pct; });
      }

      return (
        <>
          {/* 반 요약 카드 */}
          <div className="stats-summary">
            <div className="stats-summary-title">올해 반 평균 출석률</div>
            <div className="stats-summary-row">
              <span className="big">{avgPct}%</span>
              <span className="sub">({total}회 예배 · 학생 {data.students.length}명)</span>
            </div>
            <div className="stats-summary-meta">
              최근 예배({latestDate}): <strong>{latestPresent}/{data.students.length}명</strong> 출석 · {latestPct}%
              {' · '}양호(80%↑): <strong>{goodCount}명</strong>
              {' · '}위험(50%↓): <strong style={{color:'var(--status-negative)'}}>{riskCount}명</strong>
            </div>
          </div>

          {/* 정렬 칩 */}
          <div className="filter-bar" role="toolbar" aria-label="통계 정렬">
            <span className="bulk-label">정렬</span>
            <button className={'filter-chip' + (sortBy === 'name' ? ' active' : '')}
              onClick={() => setSortBy('name')}>이름순</button>
            <button className={'filter-chip' + (sortBy === 'pct_desc' ? ' active' : '')}
              onClick={() => setSortBy('pct_desc')}>출석률 ↓</button>
            <button className={'filter-chip' + (sortBy === 'pct_asc' ? ' active' : '')}
              onClick={() => setSortBy('pct_asc')}>출석률 ↑</button>
          </div>

          {/* 학생별 progress bar */}
          {view.map(function(x){
            const cls = x.pct < 50 ? 'risk' : (x.pct >= 80 ? 'good' : '');
            return (
              <div key={x.s.id} className={'stat-bar-card ' + cls}>
                <div className="stat-bar-head">
                  <span className="stat-bar-name">{x.s['이름']}</span>
                  <span className="stat-bar-pct">{x.pct}%</span>
                </div>
                <div className="stat-bar-track">
                  <div className="stat-bar-fill" style={{width: Math.max(2, x.pct) + '%'}}></div>
                </div>
                <div className="stat-bar-meta">{x.present} / {total}회 출석 · {x.s['학년']}</div>
              </div>
            );
          })}
        </>
      );
    }

                  {['학년','성별','생년월일','연락처','학교','초등학교','신급','부/모','부모님연락처','주소','비고']
                    .filter((k) => detail[k])

                        display = (
                          <span>
                            <span style={{marginRight:8}}>{v}</span>
                            <a href={'https://www.google.com/maps/search/?api=1&query=' + q}
                               target="_blank" rel="noopener noreferrer"
                               className="link-chip" aria-label="지도에서 보기">🗺 지도</a>
                          </span>
                        );

    // ──────────────── NewcomersView ────────────────
    function NewcomersView({ idToken, toast }) {
      const [data, setData] = useState(null); // { students, progress }
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [graduateTarget, setGraduateTarget] = useState(null); // student object

      const reload = useCallback(() => {
        setLoading(true);
        callApi('getNewcomers', { idToken })
          .then((r) => {
            if (r.ok) setData({ students: r.students, progress: r.progress || {} });
            else toast.show('새가족 명단 불러오기 실패: ' + (r.code || ''));
            setLoading(false);
          })
          .catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      const todayDate = todayISO();

      const setAttendance = (studentId, status) => {
        let etcText = null;
        if (status === 'ETC') {
          etcText = window.prompt('외부 예배 장소/사유 (예: 타 교회, 사경회)');
          if (etcText === null) return;
        } else if (status === 'ABSENT') {
          etcText = window.prompt('결석 사유 (선택, 예: 병원, 가족여행)');
          if (etcText === null) return;
        }
        callApi('setAttendance', { idToken, date: todayDate, studentId, status, etcText })
          .then((r) => {
            if (r.ok) reload();
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      const toggleProgress = (studentId, week, current) => {
        const completed = !current;
        callApi('setNewcomerProgress', { idToken, studentId, week, completed })
          .then((r) => {
            if (r.ok) reload();
            else toast.show('진도 저장 실패');
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const students = (data && data.students) || [];
      const progress = (data && data.progress) || {};
      // progress keyed by studentId → { '1주': bool, '2주': bool, '3주': bool, '4주': bool }

      return (
        <>
          <div style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:14,color:'var(--label-alt)'}}>{students.length}명의 새가족</div>
            <button className="btn primary sm" onClick={() => setShowForm(true)}>＋ 새가족 추가</button>
          </div>

          {students.length === 0 && <div className="loading">새가족이 없습니다.</div>}

          {students.map((s) => {
            const prog = progress[s.id] || {};
            // today's attendance
            const todayAtt = s.todayStatus || null;
            return (
              <div className="newcomer-card" key={s.id} data-status={todayAtt || undefined}>
                <div className="newcomer-card-top">
                  <div style={{flex:1}}>
                    <div className="student-name">{s['이름']}</div>
                    <div className="student-meta">{s['학년']} · {s['성별']}</div>
                  </div>
                  <button className="btn danger sm" onClick={() => setGraduateTarget(s)}>등반</button>
                </div>
                <div className="newcomer-card-bottom">
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>출석</div>
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill ' + (todayAtt === opt.code ? 'active ' + opt.code : '')}
                      style={{fontSize:11,padding:'4px 8px'}}
                      onClick={() => setAttendance(s.id, opt.code)}>{opt.label}</button>
                  ))}
                </div>
                <div className="newcomer-card-bottom" style={{borderTop:'none',paddingTop:0}}>
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>교육</div>
                  {[1,2,3,4].map((w) => {
                    const key = `${w}주`;
                    const checked = !!prog[key];
                    return (
                      <button key={w}
                        className={'check-pill' + (checked ? ' checked' : '')}
                        onClick={() => toggleProgress(s.id, w, checked)}>
                        <span className="check-icon">{checked ? '✓' : '○'}</span>
                        {w}주
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {showForm && (
            <NewcomerForm
              idToken={idToken}
              toast={toast}
              onClose={() => setShowForm(false)}
              onSuccess={() => { setShowForm(false); reload(); }}
            />
          )}

          {graduateTarget && (
            <GraduateDialog
              idToken={idToken}
              toast={toast}
              student={graduateTarget}
              onClose={() => setGraduateTarget(null)}
              onSuccess={() => { setGraduateTarget(null); reload(); }}
            />
          )}
        </>
      );
    }

                <select className="form-select" value={form.grade} onChange={(e) => set('grade', e.target.value)}>
                  <option value="">선택</option>
                  {['중1','중2','중3','고1','고2','고3'].map((g) => <option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div className="form-row">
                <label className="form-label">연락처</label>
                <input className="form-input" value={form.phone} onChange={(e) => set('phone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">생년월일</label>
                <input type="date" className="form-input" value={form.birthDate} onChange={(e) => set('birthDate', e.target.value)} />
              </div>
              <div className="form-row">
                <label className="form-label">학교</label>
                <input className="form-input" value={form.school} onChange={(e) => set('school', e.target.value)} placeholder="○○중학교" />
              </div>
              <div className="form-row">
                <label className="form-label">부모님 연락처</label>
                <input className="form-input" value={form.parentPhone} onChange={(e) => set('parentPhone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">주소</label>
                <input className="form-input" value={form.address} onChange={(e) => set('address', e.target.value)} />
              </div>
              <div className="form-row">
                <label className="form-label">비고</label>
                <input className="form-input" value={form.note} onChange={(e) => set('note', e.target.value)} />
              </div>
            </div>
            <div className="sheet-footer" style={{display:'flex',gap:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={onClose} disabled={saving}>취소</button>
              <button className="btn primary" style={{flex:1}} onClick={submit} disabled={saving}>
                {saving ? '저장 중…' : '저장'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── GraduateDialog ────────────────
    function GraduateDialog({ idToken, toast, student, onClose, onSuccess }) {
      const [targetTeacher, setTargetTeacher] = useState('');
      const [teachers, setTeachers] = useState(null);
      const [saving, setSaving] = useState(false);

      // Try to fetch teacher list from getAllRosters; fall back to free text if not authorized
      useEffect(() => {
        callApi('getAllRosters', { idToken })
          .then((r) => {
            if (r.ok && r.byClass) {
              setTeachers(Object.keys(r.byClass).filter(Boolean));
            } else {
              setTeachers([]); // will show free-text fallback
            }
          })
          .catch(() => setTeachers([]));
      }, [idToken]);

      const confirm_ = () => {
        if (!targetTeacher.trim()) { toast.show('반을 선택해 주세요'); return; }
        setSaving(true);
        callApi('graduate', { idToken, studentId: student.id, targetTeacher: targetTeacher.trim() })
          .then((r) => {
            setSaving(false);
            if (r.ok) { toast.show(student['이름'] + ' 등반 완료'); onSuccess(); }
            else toast.show('등반 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" style={{maxHeight:'50vh'}} onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-header"><h3>{student['이름']} 등반</h3></div>
            <div className="sheet-body">
              <p style={{fontSize:14,color:'var(--label-alt)',margin:'0 0 16px'}}>이동할 반(교사)을 선택하세요.</p>
              {teachers === null ? (
                <div style={{color:'var(--label-alt)',fontSize:14}}>불러오는 중…</div>
              ) : teachers.length > 0 ? (
                <select className="form-select" value={targetTeacher} onChange={(e) => setTargetTeacher(e.target.value)}>
                  <option value="">반 선택</option>
                  {teachers.map((t) => <option key={t} value={t}>{t} 반</option>)}
                </select>
              ) : (
                <input
                  className="form-input"
                  value={targetTeacher}
                  onChange={(e) => setTargetTeacher(e.target.value)}
                  placeholder="교사 이름 직접 입력"
                />
              )}
            </div>
            <div className="sheet-footer" style={{display:'flex',gap:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={onClose} disabled={saving}>취소</button>
              <button className="btn primary" style={{flex:1}} onClick={confirm_} disabled={saving || !targetTeacher.trim()}>
                {saving ? '처리 중…' : '등반 확정'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── AdminView ────────────────
    function AdminView({ idToken, toast, me }) {
      const [classFilter, setClassFilter] = useState(''); // '' = all
      const [rosters, setRosters] = useState(null);   // { byClass: { teacher: [students] } }
      const [allAtt, setAllAtt] = useState(null);     // { rows: [...] }
      const [allPrayers, setAllPrayers] = useState(null); // { prayers: [...] }
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        const year = new Date().getFullYear();
        Promise.all([
          callApi('getAllRosters', { idToken }),
          callApi('getAllAttendance', { idToken, year }),
          callApi('getAllPrayers', { idToken }),
        ]).then(([r, a, p]) => {
          if (r.ok) setRosters(r);
          else toast.show('명단 불러오기 실패');
          if (a.ok) setAllAtt(a);
          if (p.ok) setAllPrayers(p);
          setLoading(false);
        }).catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byClass = (rosters && rosters.byClass) || {};
      const classNames = Object.keys(byClass).sort();

      const displayClasses = classFilter ? [classFilter] : classNames;

      // Attendance stats per class
      const attRows = (allAtt && allAtt.rows) || [];
      const allDates = Array.from(new Set(attRows.map((r) => r.date)));

      // Prayers grouped by class (via student's 반)
      const prayerList = (allPrayers && allPrayers.prayers) || [];
      // Build studentId → 반 map from rosters
      const studentClass = {};
      classNames.forEach((cls) => {
        (byClass[cls] || []).forEach((s) => { studentClass[s.id] = cls; });
      });

      return (
        <>
          <div style={{padding:'12px 16px'}}>
            <label style={{fontSize:13,fontWeight:600,color:'var(--label-alt)',display:'block',marginBottom:6}}>반 선택</label>
            <select className="form-select" value={classFilter} onChange={(e) => setClassFilter(e.target.value)}>
              <option value="">전체 반</option>
              {classNames.map((c) => <option key={c} value={c}>{c} 반</option>)}
            </select>
          </div>

          {/* Attendance stats */}
          <div className="admin-section">
            <h4>출석 통계 (올해 {allDates.length}회)</h4>
            {displayClasses.map((cls) => {
              const students = byClass[cls] || [];
              if (students.length === 0) return null;
              const clsRows = attRows.filter((r) => studentClass[r.studentId] === cls);
              const present = clsRows.filter((r) => PRESENT_CODES.includes(r.status)).length;
              const total = students.length * allDates.length;
              const pct = total > 0 ? Math.round((present / total) * 100) : 0;
              return (
                <div key={cls} className="stat-row">
                  <span>{cls} 반 ({students.length}명)</span>
                  <span style={{fontWeight:600}}>{present} / {total} <span style={{color:'var(--primary)'}}>{pct}%</span></span>
                </div>
              );
            })}
          </div>

          {/* Student roster */}
          <div className="admin-section">
            <h4>학생 명단</h4>
            {displayClasses.map((cls) => {
              const students = byClass[cls] || [];
              return (
                <div key={cls} style={{marginBottom:12}}>
                  <div className="class-group-head">{cls} 반</div>
                  {students.map((s) => (
                    <div key={s.id} style={{fontSize:14,padding:'4px 0',borderBottom:'1px solid var(--fill-normal)',display:'flex',gap:8}}>
                      <span style={{flex:1,fontWeight:500}}>{s['이름']}</span>
                      <span style={{color:'var(--label-alt)',fontSize:12}}>{s['학년']} · {s['성별']}</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          {/* Prayers grouped by class */}
          <div className="admin-section">
            <h4>기도제목</h4>
            {displayClasses.map((cls) => {
              const clsPrayers = prayerList.filter((p) => studentClass[p.studentId] === cls);
              if (clsPrayers.length === 0) return null;
              return (
                <div key={cls} style={{marginBottom:12}}>
                  <div className="class-group-head">{cls} 반</div>
                  {clsPrayers.map((p) => (
                    <div key={p.id} style={{padding:'6px 0',borderBottom:'1px solid var(--fill-normal)',fontSize:14}}>
                      <span style={{fontWeight:500}}>{p.studentName || p.studentId}</span>
                      <span style={{color:'var(--label-alt)',marginLeft:8}}>— {p.text}</span>
                    </div>
                  ))}
                </div>
              );
            })}
            {prayerList.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>기도제목이 없습니다.</div>}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

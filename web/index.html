                          style={{flex: c, background: GRADE_COLORS[g] || '#9AA0A6'}}
                          title={g + ' ' + c + '명'} />;
                      })}
                    </div>
                    <span className="gs-date">{Number(col.date.slice(5,7)) + '/' + Number(col.date.slice(8,10))}</span>
                  </div>
                );
              })}
            </div>
            <div className="gs-legend">
              {gradeNames.map(function(g){
                return (
                  <span key={g} className="gs-leg">
                    <span className="gs-dot" style={{background: GRADE_COLORS[g] || '#9AA0A6'}} />{g}
                  </span>
                );
              })}
            </div>
          </div>

          <div className="admin-section">
            <h4>결석 사유 <span style={{fontWeight:400,fontSize:12,color:'var(--label-alt)'}}>(선택 주일 {weekSnapshot.date})</span></h4>
            {absClasses.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>선택 주일 결석자가 없습니다 🎉</div>}
            {absClasses.map(function(cls){
              return (
                <div key={cls} style={{marginBottom:10}}>
                  <div className="class-group-head">{classLabel(cls)}</div>
                  {absByClass[cls].map(function(r, i){
                    return (
                      <div key={r.studentId + '_' + i} className="abs-item">
                        <span className="abs-name">{r.studentName || ('학생 ' + r.studentId)}</span>
                        <span className="abs-reason">{r.etcText ? r.etcText : '사유 미입력'}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>

          <GroupStatSection title="학년별 통계" groups={gradeGroups} />
        </>
      );
    }

    // 그룹(반/학년) 통계 공용 렌더러. groups: [{name, count, present, total, pct}]
    function GroupStatSection({ title, groups }) {
      return (
        <div className="admin-section">
          <h4>{title}</h4>
          {groups.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>데이터가 없습니다.</div>}
          {groups.map(function(g){
            return (
              <div key={g.name} className="stat-bar-card">
                <div className="stat-bar-head">
                  <span className="stat-bar-name">{g.name} <span style={{fontWeight:400,color:'var(--label-alt)'}}>({g.count}명)</span></span>
                  <span className="stat-bar-pct">{g.pct}%</span>
                </div>
                <div className="stat-bar-track">
                  <div className="stat-bar-fill" style={{width: Math.max(2, g.pct) + '%'}}></div>
                </div>
                <div className="stat-bar-meta">{g.present} / {g.total}회 출석</div>
              </div>
            );
          })}
        </div>
      );
    }
    // 관리자: 새가족 출석 현황 + 등반 교육 진행(읽기 전용) + 올해 등반 완료자
    function AdminNewcomerStatus({ attRows, newcomers }) {
      const year = String(new Date().getFullYear());
      const ncStudents = (newcomers && newcomers.students) || [];
      const dates = Array.from(new Set(attRows.map(function(r){ return r.date; }))).sort();
      const totalDates = dates.length;

      // 올해 등반 완료자 (graduates 없는 구 GAS 응답과 하위호환)
      const hasGradApi = !!(newcomers && newcomers.graduates);
      const gradsThisYear = ((newcomers && newcomers.graduates) || [])
        .filter(function(g){ return String(g.graduatedOn || '').slice(0, 4) === year; })
        .sort(function(a,b){ return String(b.graduatedOn).localeCompare(String(a.graduatedOn)); });

      const WEEKS = [1, 2, 3, 4];

      return (
        <>
          <div className="admin-section">
            <h4>새가족 출석 현황 (올해 {totalDates}회)</h4>
            {ncStudents.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>현재 새가족 학생이 없습니다.</div>}
            {ncStudents.map(function(s){
              const mine = attRows.filter(function(r){ return String(r.studentId) === String(s.id); });
              const present = mine.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
              const pct = totalDates > 0 ? Math.min(100, Math.round((present / totalDates) * 100)) : 0;
              return (
                <div key={s.id} className="stat-bar-card">
                  <div className="stat-bar-head">
                    <span className="stat-bar-name">{s['이름']}</span>
                    <span className="stat-bar-pct">{pct}%</span>
                  </div>
                  <div className="stat-bar-track">
                    <div className="stat-bar-fill" style={{width: Math.max(2, pct) + '%'}}></div>
                  </div>
                  <div className="stat-bar-meta">{present} / {totalDates}회 출석 · {s['학년']}</div>
                </div>
              );
            })}
          </div>

          <div className="admin-section">
            <h4>등반 교육 진행 <span style={{fontWeight:400,fontSize:12,color:'var(--label-alt)'}}>(수정은 새가족 탭에서)</span></h4>
            {ncStudents.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>진행 중인 학생이 없습니다.</div>}
            {ncStudents.map(function(s){
              const pr = s.progress || {};
              return (
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--fill-normal)'}}>
                  <span style={{flex:1,fontSize:14,fontWeight:500}}>{s['이름']}</span>
                  {WEEKS.map(function(w){
                    const done = !!pr['week' + w];
                    return (
                      <span key={w} className={'grad-week' + (done ? ' done' : '')}
                        title={done ? (pr['week' + w + 'Date'] || '') : ''}>
                        {w}주{done ? ' ✓' : ''}
                      </span>
                    );
                  })}
                </div>
              );
            })}
          </div>

          <div className="admin-section">
            <h4>올해 등반 완료 ({gradsThisYear.length}명)</h4>
            {!hasGradApi && <div style={{fontSize:14,color:'var(--label-alt)'}}>등반 명단은 GAS 재배포 후 표시됩니다.</div>}
            {hasGradApi && gradsThisYear.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>올해 등반 완료자가 없습니다.</div>}
            {gradsThisYear.map(function(g){
              return (
                <div key={g.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--fill-normal)',fontSize:14}}>
                  <span style={{flex:1,fontWeight:500}}>{g['이름'] || ('학생 ' + g.id)}
                    {g['학년'] ? <span style={{fontWeight:400,color:'var(--label-alt)',marginLeft:6,fontSize:12}}>{g['학년']}</span> : null}
                  </span>
                  <span style={{color:'var(--label-alt)',fontSize:13}}>{g.graduatedOn}</span>
                  <span className="sum-item" style={{fontSize:12}}>{classLabel(g.graduatedTo)}</span>
                </div>
              );
            })}
          </div>
        </>
      );
    }

    // 관리자: 명단 + 기도제목 (v1.2의 AdminView 내용 이동, 출석 합계 섹션은 통계 세그먼트로 대체되어 삭제)
    function AdminRosterPrayers({ byClass, allPrayers, classFilter, setClassFilter, onOpenDetail }) {
      const classNames = Object.keys(byClass).sort();
      const displayClasses = classFilter ? [classFilter] : classNames;
      const prayerList = (allPrayers && allPrayers.prayers) || [];
      const studentClass = {};
      classNames.forEach((cls) => {
        (byClass[cls] || []).forEach((s) => { studentClass[s.id] = cls; });
      });
      return (
        <>
          <div style={{padding:'12px 16px'}}>
            <label style={{fontSize:13,fontWeight:600,color:'var(--label-alt)',display:'block',marginBottom:6}}>반 선택</label>
            <select className="form-select" value={classFilter} onChange={(e) => setClassFilter(e.target.value)}>
              <option value="">전체 반</option>
              {classNames.map((c) => <option key={c} value={c}>{classLabel(c)}</option>)}
            </select>
          </div>
          <div className="admin-section">
            <h4>학생 명단</h4>
            {displayClasses.map((cls) => {
              const students = byClass[cls] || [];
              return (
                <div key={cls} style={{marginBottom:12}}>
                  <div className="class-group-head">{classLabel(cls)}</div>
                  {students.map((s) => (
                    <div key={s.id} style={{fontSize:14,padding:'4px 0',borderBottom:'1px solid var(--fill-normal)',display:'flex',gap:8,alignItems:'center'}}>
                      <button style={{flex:1,fontWeight:500,textAlign:'left',color:'var(--primary)'}}
                        onClick={() => onOpenDetail && onOpenDetail(s.id)}>{s['이름']}</button>
                      <span style={{color:'var(--label-alt)',fontSize:12}}>{s['학년']} · {s['성별']}</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          <div className="admin-section">
            <h4>기도제목</h4>
            {displayClasses.map((cls) => {
              const clsPrayers = prayerList.filter((p) => studentClass[p.studentId] === cls);
              if (clsPrayers.length === 0) return null;
              return (
                  <div key={cls} style={{marginBottom:12}}>
                    <div className="class-group-head">{classLabel(cls)}</div>
                    {clsPrayers.map((p) => (
                      <div key={p.id} style={{padding:'6px 0',borderBottom:'1px solid var(--fill-normal)',fontSize:14}}>
                        <div>
                          <span style={{fontWeight:500}}>{p.studentName || p.studentId}</span>
                          <span style={{color:'var(--label-alt)',marginLeft:8}}>— {p.text}</span>
                        </div>
                        {p.createdAt && (
                          <div className="prayer-meta" title={p.createdAt}>작성일 {prayerDateLabel(p.createdAt)}</div>
                        )}
                      </div>
                    ))}
                  </div>
              );
            })}
            {prayerList.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>기도제목이 없습니다.</div>}
          </div>
        </>
      );
    }

    function AdminView({ idToken, toast, me, onOpenDetail }) {
      const [seg, setSeg] = useState('stats'); // 'stats' | 'newcomer' | 'roster'
      const [classFilter, setClassFilter] = useState(''); // '' = all (명단·기도 세그먼트용)
      const [rosters, setRosters] = useState(null);
      const [allAtt, setAllAtt] = useState(null);
      const [allPrayers, setAllPrayers] = useState(null);
      const [newcomers, setNewcomers] = useState(null); // {students, graduates?}
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        const year = new Date().getFullYear();
        Promise.all([
          callApi('getAllRosters', { idToken }),
          callApi('getAllAttendance', { idToken, year }),
          callApi('getAllPrayers', { idToken }),
          callApi('getNewcomers', { idToken }),
        ]).then(([r, a, p, n]) => {
          if (r.ok) setRosters(r);
          else toast.show('명단 불러오기 실패');
          if (a.ok) setAllAtt(a);
          if (p.ok) setAllPrayers(p);
          if (n.ok) setNewcomers(n);
          setLoading(false);
        }).catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byClass = (rosters && rosters.byClass) || {};
      const attRows = (allAtt && allAtt.rows) || [];

      return (
        <>
          <div className="seg-bar">
            <button className={seg === 'stats' ? 'active' : ''} onClick={() => setSeg('stats')}>통계</button>
            <button className={seg === 'newcomer' ? 'active' : ''} onClick={() => setSeg('newcomer')}>새가족·등반</button>
            <button className={seg === 'roster' ? 'active' : ''} onClick={() => setSeg('roster')}>명단·기도</button>
          </div>
          {seg === 'stats' && <AdminStats byClass={byClass} attRows={attRows} newcomers={newcomers} />}
          {seg === 'newcomer' && <AdminNewcomerStatus attRows={attRows} newcomers={newcomers} />}
          {seg === 'roster' && (
            <AdminRosterPrayers byClass={byClass} allPrayers={allPrayers}
              classFilter={classFilter} setClassFilter={setClassFilter} onOpenDetail={onOpenDetail} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

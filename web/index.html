                onClick={() => setFilterBy('unmarked')}>미체크<span className="count">{unmarkedCount}</span></button>
              <button className={'filter-chip' + (filterBy === 'streak' ? ' active' : '')}
                onClick={() => setFilterBy('streak')}>⚠ 3주결석<span className="count">{streakCount}</span></button>
            </div>
            <div className="filter-row sort-row" role="group" aria-label="정렬">
              <span className="sort-label">정렬</span>
              <button className={'filter-chip' + (sortBy === 'name' ? ' active' : '')}
                onClick={() => setSortBy('name')}>이름순</button>
              <button className={'filter-chip' + (sortBy === 'grade' ? ' active' : '')}
                onClick={() => setSortBy('grade')}>학년순</button>
              <button className={'filter-chip' + (sortBy === 'lastAtt' ? ' active' : '')}
                onClick={() => setSortBy('lastAtt')}>최근출석순</button>
            </div>
          </div>
          {view.length === 0 && (
            <div className="loading" style={{padding:24}}>
              {filterBy === 'unmarked' ? '모두 체크되었습니다 🎉'
                : filterBy === 'streak' ? '3주 연속 결석한 학생이 없습니다 🎉'
                : '학생이 없습니다.'}
            </div>
          )}
          {view.map((s) => {
            const cur = att[date + '|' + s.id];
            const last = lastAttendedOf(s.id);
            const days = daysSince(last);
            const lastClass = days === null ? '' : (days <= 7 ? 'recent' : (days >= 21 ? 'stale' : ''));
            const streak = isStreakAbsent(s.id);
            return (
              <div className={'student-card compact' + (streak ? ' warn' : '')} key={s.id} data-status={cur || undefined}>
                <div className="student-info">
                  <button className="student-name" onClick={() => onOpenDetail(s.id)} style={{textAlign:'left'}}>
                    {s['이름']}
                    {streak && <span className="warn-badge" title="최근 3개 예배 모두 결석">⚠ 3주</span>}
                  </button>
                  <div className="student-meta">
                    {s['학년']} · {s['성별']}
                    {last ? (
                      <span className={'last-att ' + lastClass} title={'마지막 출석: ' + last}>
                        · {days === 0 ? '오늘' : (days + '일 전')}
                      </span>
                    ) : (
                      <span className="last-att stale" title="올해 출석 기록 없음">· 기록 없음</span>
                    )}
                  </div>
                </div>
                <div className="student-actions">
                  {(function(){
                    const ph = String(s['연락처'] || '').replace(/[^0-9+]/g, '');
                    return ph ? (
                      <a href={'tel:' + ph} className="pill compact call-pill"
                        aria-label={s['이름'] + ' 전화 걸기'} title={'전화: ' + s['연락처']}
                        onClick={(e) => e.stopPropagation()}>📞</a>
                    ) : null;
                  })()}
                  {attErr[date + '|' + s.id] && (
                    <button className="pill compact retry"
                      title="저장에 실패했습니다. 탭해서 재시도"
                      aria-label="저장 실패 — 재시도"
                      disabled={bulkBusy}
                      onClick={() => {
                        const e = attErr[date + '|' + s.id];
                        saveAttendance(s.id, e.status, e.etcText || '');
                      }}>⟳</button>
                  )}
                  {cur === 'ABSENT' && (
                    <button className="pill compact note-pill"
                      title="결석 사유 입력(선택)" aria-label={s['이름'] + ' 결석 사유 입력'}
                      disabled={bulkBusy}
                      onClick={() => openAbsenceReason(s.id)}>✎ 사유</button>
                  )}
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill compact ' + (cur === opt.code ? 'active ' + opt.code : '')}
                      disabled={bulkBusy}
                      onClick={() => setStatus(s.id, opt.code)}>{opt.label}</button>
                  ))}
                </div>
              </div>
            );
          })}
          {unmarkedCount > 0 && <div style={{height:140}} />}
          {unmarkedCount > 0 && (
            <div className="bulk-fab">
              {bulkOpen && (
                <div className="bulk-menu">
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code} disabled={bulkBusy}
                      onClick={() => { setBulkOpen(false); bulkSetUnmarked(opt.code); }}>
                      미체크 전원 {opt.label}
                    </button>
                  ))}
                </div>
              )}
              <button className="bulk-main" disabled={bulkBusy}
                onClick={() => { setBulkOpen(false); bulkSetUnmarked(defaultService); }}>
                미체크 {unmarkedCount}명 → {labelOf(defaultService)} 출석
              </button>
              <button className="bulk-more" disabled={bulkBusy} aria-label="다른 상태로 일괄 적용"
                aria-expanded={bulkOpen}
                onClick={() => setBulkOpen(!bulkOpen)}>▾</button>
            </div>
          )}
          {pendingEtc && (
            <EtcInputSheet status={pendingEtc.status}
              initial={pendingEtc.initial}
              subtitle={pendingEtc.bulk ? '미체크 ' + pendingEtc.count + '명에게 일괄 적용됩니다' : null}
              onSave={handleEtcSave} onCancel={handleEtcCancel} />
          )}
        </>
      );
    }

    // Mobile-friendly bottom sheet for entering ETC(외부예배) place or ABSENT 사유.
    // v1.5(R5): 결석 사유도 선택 입력 — 비우고 확인해도 결석으로 저장된다. initial로 기존 사유 프리필.
    function EtcInputSheet({ status, subtitle, initial, onSave, onCancel }) {
      const [value, setValue] = useState(initial || '');
      const isEtc = status === 'ETC';
      const title = isEtc ? '외부 예배 입력' : '결석 사유 (선택)';
      const help = isEtc
        ? '다른 곳에서 예배드린 장소나 사유를 입력하세요. 예: 타 교회, 사경회, 수련회'
        : '필요하면 결석 사유를 입력하세요. 비워두고 확인해도 결석으로 저장됩니다. 예: 병원, 가족여행';
      const placeholder = isEtc ? '예: 타 교회, 사경회' : '예: 병원, 가족여행 (선택)';

      const trySave = () => { onSave(value); };

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onCancel]);

      return (
        <div className="sheet-overlay" role="dialog" aria-modal="true" onClick={onCancel}>
          <div className="sheet" onClick={(e)=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <div style={{padding:'4px 20px 20px'}}>
              <h3 style={{margin:'4px 0 6px',fontSize:17,fontWeight:600}}>{title}</h3>
              {subtitle && (
                <p style={{margin:'0 0 6px',fontSize:13,fontWeight:600,color:'var(--primary)'}}>{subtitle}</p>
              )}
              <p style={{margin:'0 0 12px',fontSize:12,color:'var(--label-alt)',lineHeight:1.45}}>{help}</p>
              <input type="text" autoFocus value={value}
                onChange={(e) => setValue(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') trySave(); }}
                placeholder={placeholder}
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line-solid)',borderRadius:10,fontSize:15,fontFamily:'inherit',outline:'none'}} />
              <div style={{display:'flex',gap:8,marginTop:14}}>
                <button className="btn ghost" style={{flex:1}} onClick={onCancel}>취소</button>
                <button className="btn primary" style={{flex:2}} onClick={trySave}>확인</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── RosterManageView (명단: 학생 추가·정보 수정) ────────────────
    // 출석(체크) 흐름과 분리된 명단 관리 전용 화면. 교사가 자기 반에 학생 추가(R1) +
    // 학생 정보 수정 진입(R2, 출석부 외부). 수정 자체는 StudentDetail의 기존 수정 기능 재사용.
    function RosterManageView({ idToken, me, toast, onOpenDetail }) {
      const [students, setStudents] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showAdd, setShowAdd] = useState(false);

      const reload = useCallback(() => {
        setLoading(true);
        callApi('getRoster', { idToken })
          .then((r) => {
            if (r.ok) setStudents(r.students || []);
            else toast.show('명단 불러오기 실패: ' + (r.code || ''));
            setLoading(false);
          })
          .catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      if (loading) return <div className="loading">불러오는 중…</div>;
      const list = students || [];
      const sorted = [...list].sort((a, b) =>
        String(a['이름'] || '').localeCompare(String(b['이름'] || ''), 'ko'));

      return (
        <>
          <div style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:14,color:'var(--label-alt)'}}>
              {me.teacher ? classLabel(me.teacher) : '명단'} · <strong style={{color:'var(--label-normal)'}}>{list.length}명</strong>
            </div>
            <button className="btn primary sm" onClick={() => setShowAdd(true)}>＋ 학생 추가</button>
          </div>

          {list.length === 0 && (
            <div className="loading" style={{padding:24,lineHeight:1.6}}>
              아직 등록된 학생이 없습니다.<br />오른쪽 위 ‘＋ 학생 추가’로 시작하세요.
            </div>
          )}

          {sorted.map((s) => (
            <div className="student-card compact" key={s.id}>
              <div className="student-info">
                <button className="student-name" onClick={() => onOpenDetail && onOpenDetail(s.id)} style={{textAlign:'left'}}>
                  {s['이름']}
                </button>
                <div className="student-meta">
                  {s['학년']} · {s['성별']}{s['연락처'] ? ' · ' + s['연락처'] : ''}
                </div>
              </div>
              <div className="student-actions">
                {(function(){
                  const ph = String(s['연락처'] || '').replace(/[^0-9+]/g, '');
                  return ph ? (
                    <a href={'tel:' + ph} className="pill compact call-pill"
                      title={'전화: ' + s['연락처']} onClick={(e) => e.stopPropagation()}>📞</a>
                  ) : null;
                })()}
                <button className="btn ghost sm" onClick={() => onOpenDetail && onOpenDetail(s.id)}>정보 · 수정</button>
              </div>
            </div>
          ))}

          {showAdd && (
            <AddStudentSheet idToken={idToken} me={me} toast={toast}
              onClose={() => setShowAdd(false)}
              onSuccess={() => { setShowAdd(false); reload(); }} />
          )}
        </>
      );
    }

    // ──────────────── AddStudentSheet (교사 자기 반 학생 추가 · R1) ────────────────
    // NewcomerForm과 같은 폼 패턴. addStudent 액션으로 RAW_CLASS(본인 반)에 기록.
    function AddStudentSheet({ idToken, me, toast, onClose, onSuccess }) {
      const [form, setForm] = useState({
        name: '', gender: '남', phone: '',
        birthYear: '', birthMonth: '', birthDay: '', grade: '',
        school: '', parentPhone: '', address: '', note: '',
      });
      const [saving, setSaving] = useState(false);
      const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

      const thisYear = new Date().getFullYear();
      const birthYears = [];
      for (let y = thisYear - 8; y >= thisYear - 25; y--) birthYears.push(y);
      const pad2 = (n) => String(n).padStart(2, '0');

      const submit = () => {
        if (!form.name.trim()) { toast.show('이름을 입력하세요'); return; }
        const birthDate = (form.birthYear && form.birthMonth && form.birthDay)
          ? form.birthYear + '-' + pad2(form.birthMonth) + '-' + pad2(form.birthDay)
          : '';
        setSaving(true);
        callApi('addStudent', {
          idToken,
          name: form.name.trim(),
          gender: form.gender,
          phone: form.phone,
          birthDate: birthDate,
          grade: form.grade,
          school: form.school,
          parentPhone: form.parentPhone,
          address: form.address,
          note: form.note,
        })
          .then((r) => {
            setSaving(false);
            if (r.ok) { toast.show('학생이 추가됐습니다'); onSuccess(); }
            else if (r.code === 'forbidden') toast.show('추가 권한이 없습니다');
            else toast.show('추가 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-header">
              <h3>학생 추가{me && me.teacher ? ' · ' + classLabel(me.teacher) : ''}</h3>
              <button className="sheet-close" onClick={onClose}>✕</button>
            </div>
            <div className="sheet-body">
              <div className="form-row">
                <label className="form-label">이름 *</label>
                <input className="form-input" value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="홍길동" />
              </div>
              <div className="form-row">
                <label className="form-label">성별</label>
                <div className="radio-group">
                  {['남','여'].map((g) => (
                    <label key={g} className="radio-label">
                      <input type="radio" name="add-gender" value={g} checked={form.gender === g} onChange={() => set('gender', g)} />
                      {g}
                    </label>
                  ))}
                </div>
              </div>
              <div className="form-row">
                <label className="form-label">학년</label>
                <select className="form-select" value={form.grade} onChange={(e) => set('grade', e.target.value)}>
                  <option value="">선택</option>
                  {['중1','중2','중3','고1','고2','고3'].map((g) => <option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div className="form-row">
                <label className="form-label">연락처</label>
                <input className="form-input" value={form.phone} onChange={(e) => set('phone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">생년월일</label>
                <div style={{display:'flex',gap:8}}>
                  <select className="form-select" style={{flex:1.4}} value={form.birthYear}
                    onChange={(e) => set('birthYear', e.target.value)} aria-label="출생 연도">
                    <option value="">연도</option>
                    {birthYears.map((y) => <option key={y} value={y}>{y}년</option>)}
                  </select>
                  <select className="form-select" style={{flex:1}} value={form.birthMonth}
                    onChange={(e) => set('birthMonth', e.target.value)} aria-label="출생 월">
                    <option value="">월</option>
                    {Array.from({length:12},(_,i)=>i+1).map((m) => <option key={m} value={m}>{m}월</option>)}
                  </select>
                  <select className="form-select" style={{flex:1}} value={form.birthDay}
                    onChange={(e) => set('birthDay', e.target.value)} aria-label="출생 일">
                    <option value="">일</option>
                    {Array.from({length:31},(_,i)=>i+1).map((d) => <option key={d} value={d}>{d}일</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <label className="form-label">학교</label>
                <input className="form-input" value={form.school} onChange={(e) => set('school', e.target.value)} placeholder="○○중학교" />
              </div>
              <div className="form-row">
                <label className="form-label">부모님 연락처</label>
                <input className="form-input" value={form.parentPhone} onChange={(e) => set('parentPhone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">주소</label>
                <input className="form-input" value={form.address} onChange={(e) => set('address', e.target.value)} />
              </div>
              <div className="form-row">
                <label className="form-label">비고</label>
                <input className="form-input" value={form.note} onChange={(e) => set('note', e.target.value)} />
              </div>
            </div>
            <div className="sheet-footer" style={{display:'flex',gap:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={onClose} disabled={saving}>취소</button>
              <button className="btn primary" style={{flex:1}} onClick={submit} disabled={saving}>
                {saving ? '저장 중…' : '저장'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── PrayerView ────────────────
    function PrayerView({ idToken, me, toast }) {
      const [prayers, setPrayers] = useState(null);
      const [students, setStudents] = useState([]);
      const [editing, setEditing] = useState(null);
      const [loading, setLoading] = useState(true);
      // 새가족부 교사(#8)는 본인 반이 없으므로 새가족 명단을 대상으로 기도제목을 관리.
      const newcomerMode = !!(me && me.role === 'newcomer_staff');

      const reload = useCallback(() => {
        setLoading(true);
        const rosterCall = newcomerMode
          ? callApi('getNewcomers', { idToken })
          : callApi('getRoster', { idToken });
        Promise.all([rosterCall, callApi('getPrayers', { idToken })])
          .then(([r, p]) => {
            if (r.ok) setStudents(r.students || []);
            if (p.ok) setPrayers(p.prayers);
            setLoading(false);
          })
          .catch(() => { toast.show('불러오기 실패'); setLoading(false); });
      }, [idToken, toast.show, newcomerMode]);

      useEffect(reload, [reload]);

      useEffect(() => {
        if (!editing) return;
        const onKey = (e) => { if (e.key === 'Escape') setEditing(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [editing]);

      const save = () => {
        if (!editing) return;
        callApi('setPrayer', { idToken, id: editing.id, studentId: editing.studentId, text: editing.text, active: true })
          .then((r) => {
            if (r.ok) { setEditing(null); reload(); toast.show('저장됨'); }
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      const remove = (p) => {
        if (!confirm('이 기도제목을 삭제할까요?')) return;
        callApi('setPrayer', { idToken, id: p.id, studentId: p.studentId, text: p.text, active: false })
          .then((r) => { if (r.ok) reload(); else toast.show('삭제 실패'); })
          .catch(() => toast.show('네트워크 오류'));
      };

      // 응답 여부 토글 (#1). 서버가 응답일을 자동 기록/해제.
      const toggleAnswered = (p) => {
        callApi('setPrayer', { idToken, id: p.id, studentId: p.studentId, text: p.text, active: true, answered: !p.answered })
          .then((r) => { if (r.ok) reload(); else toast.show('저장 실패: ' + (r.code || '')); })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byStudent = {};
      (prayers || []).forEach((p) => { (byStudent[p.studentId] = byStudent[p.studentId] || []).push(p); });

      return (
        <>
          {students.map((s) => (
            <div key={s.id} style={{padding:'12px 16px',borderBottom:'1px solid var(--line-solid)'}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div className="student-name">{s['이름']}</div>
                <button className="btn ghost sm" aria-label={`${s['이름']} 기도제목 추가`} style={{marginLeft:'auto'}}
                  onClick={() => setEditing({ studentId: s.id, text: '' })}>＋</button>
              </div>
              {(byStudent[s.id] || []).map((p) => (
                <div key={p.id} className={'prayer-row' + (p.answered ? ' answered' : '')}
                  style={{marginTop:8,padding:'10px 12px',background:'var(--fill-normal)',borderRadius:10,display:'flex',gap:8,alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div className="prayer-text" style={{whiteSpace:'pre-wrap'}}>{p.text}</div>
                    <div className="prayer-meta">
                      {p.createdAt && <span title={p.createdAt}>작성일 {prayerDateLabel(p.createdAt)}</span>}
                      {p.answered && (
                        <span style={{color:'var(--status-positive)',marginLeft:6,fontWeight:700}}>
                          · 응답됨{p.answeredOn ? ' ' + p.answeredOn : ''}
                        </span>
                      )}
                    </div>
                  </div>
                  <button className={'check-pill' + (p.answered ? ' checked' : '')}
                    title="응답 여부" aria-pressed={p.answered}
                    onClick={() => toggleAnswered(p)}>
                    <span className="check-icon">{p.answered ? '✓' : '○'}</span>응답
                  </button>
                  <button onClick={() => setEditing({ id: p.id, studentId: p.studentId, text: p.text })} style={{color:'var(--label-alt)'}}>수정</button>
                  <button onClick={() => remove(p)} style={{color:'var(--status-negative)'}}>삭제</button>
                </div>
              ))}
            </div>
          ))}
          {editing && (
            <div className="sheet-overlay" onClick={() => setEditing(null)}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <div className="sheet-handle" />
                <div className="sheet-header"><h3>기도제목</h3></div>
                <div className="sheet-body">
                  <textarea value={editing.text} onChange={(e) => setEditing({ ...editing, text: e.target.value })}
                    rows={4} style={{width:'100%',padding:10,border:'1.5px solid var(--line-solid)',borderRadius:10,font:'inherit'}} />
                </div>
                <div className="sheet-footer" style={{display:'flex',gap:8}}>
                  <button className="btn ghost" style={{flex:1}} onClick={() => setEditing(null)}>취소</button>
                  <button className="btn primary" style={{flex:1}} onClick={save}>저장</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // ──────────────── WeeklyView (현황: 주별 명단 + 통계) ────────────────
    function WeeklyView({ idToken, toast, me, date }) {
      const [seg, setSeg] = useState('week'); // 'week' | 'stats'
      const [data, setData] = useState(null);
      useEffect(() => {
        Promise.all([callApi('getRoster',{idToken}), callApi('getAttendance',{idToken, year: new Date().getFullYear()})])
          .then(([r,a]) => {
            if (r.ok && a.ok) setData({ students: r.students, rows: a.rows });
            else toast.show('불러오기 실패');
          })
          .catch(() => toast.show('네트워크 오류'));
      }, [idToken, toast.show]);
      if (!data) return <div className="loading">불러오는 중…</div>;

      const labelOf = function(code){
        const o = STATUS_OPTIONS.find(function(x){ return x.code === code; });
        return o ? o.label : code;
      };

      // 선택한 주일의 기록을 학생 기준으로 매핑
      const byId = {};
      data.rows.forEach(function(r){ if (r.date === date) byId[r.studentId] = r; });
      const groupOf = function(code){
        return data.students.filter(function(s){ return byId[s.id] && byId[s.id].status === code; });
      };
      const presentGroups = PRESENT_CODES
        .map(function(code){ return { code: code, students: groupOf(code) }; })
        .filter(function(g){ return g.students.length > 0; });
      const etcStudents = groupOf('ETC');
      const absentStudents = groupOf('ABSENT');
      const unmarked = data.students.filter(function(s){ return !byId[s.id]; });
      const presentTotal = presentGroups.reduce(function(a,g){ return a + g.students.length; }, 0) + etcStudents.length;

      const contactChips = function(s){
        const phone = String(s['연락처'] || '').replace(/[^0-9+]/g, '');
        if (!phone) return null;
        return (
          <span style={{display:'inline-flex',gap:6,marginLeft:8}}>
            <a href={'tel:' + phone} className="link-chip" aria-label="전화 걸기">📞</a>
            <a href={'sms:' + phone} className="link-chip" aria-label="문자 보내기">💬</a>
          </span>
        );
      };

      return (
        <>
          <div className="seg-bar">
            <button className={seg === 'week' ? 'active' : ''} onClick={() => setSeg('week')}>주별 명단</button>
            <button className={seg === 'stats' ? 'active' : ''} onClick={() => setSeg('stats')}>통계</button>
          </div>

          {seg === 'stats' && <StatsView idToken={idToken} toast={toast} />}

          {seg === 'week' && (
            <div className="weekly-body">
              <div className="weekly-group">
                <div className="weekly-head">✅ 출석 {presentTotal}</div>
                {presentGroups.map(function(g){
                  return (
                    <div key={g.code} className="weekly-line">
                      <span className={'sum-item ' + g.code}>{labelOf(g.code)}</span>
                      <span className="weekly-names">{g.students.map(function(s){ return s['이름']; }).join(', ')}</span>
                    </div>
                  );
                })}
                {etcStudents.map(function(s){
                  return (
                    <div key={s.id} className="weekly-line">
                      <span className="sum-item ETC">기타</span>
                      <span className="weekly-names">{s['이름']}{byId[s.id].etcText ? ' (' + byId[s.id].etcText + ')' : ''}</span>
                    </div>
                  );
                })}
                {presentTotal === 0 && <div className="weekly-empty">이 주일의 출석 기록이 없습니다</div>}
              </div>

              <div className="weekly-group">
                <div className="weekly-head">❌ 결석 {absentStudents.length}</div>
                {absentStudents.map(function(s){
                  return (
                    <div key={s.id} className="weekly-line">
                      <span className="weekly-names">
                        {s['이름']}{byId[s.id].etcText ? ' (' + byId[s.id].etcText + ')' : ''}
                      </span>
                      {contactChips(s)}
                    </div>
                  );
                })}
                {absentStudents.length === 0 && <div className="weekly-empty">결석한 학생이 없습니다 🎉</div>}
              </div>

              <div className="weekly-group">
                <div className="weekly-head">⬜ 미체크 {unmarked.length}</div>
                {unmarked.length > 0 && (
                  <div className="weekly-line">
                    <span className="weekly-names">{unmarked.map(function(s){ return s['이름']; }).join(', ')}</span>
                  </div>
                )}
              </div>
            </div>
          )}
        </>
      );
    }

    // ──────────────── StatsView ────────────────
    function StatsView({ idToken, toast }) {
      const [data, setData] = useState(null);
      const [sortBy, setSortBy] = useState('name'); // 'name' | 'pct_desc' | 'pct_asc'
      useEffect(() => {
        Promise.all([callApi('getRoster',{idToken}), callApi('getAttendance',{idToken, year: new Date().getFullYear()})])
          .then(([r,a]) => { if (r.ok && a.ok) setData({ students: r.students, rows: a.rows }); })
          .catch(() => toast.show('네트워크 오류'));
      }, [idToken, toast.show]);
      if (!data) return <div className="loading">불러오는 중…</div>;
      if (!data.students || data.students.length === 0) return <div className="loading">학생이 없습니다.</div>;
      const dates = Array.from(new Set(data.rows.map((r) => r.date)));
      if (dates.length === 0) return <div className="loading">올해 출석 기록이 아직 없습니다.</div>;

      // 주별 출석 인원 추이(최근 12주) — 내 반 출석 인원 선형 그래프
      const weeklyPts = weeklyPresentPoints(data.rows, 12);

      // 학생별 출석률 계산
      const total = dates.length;
      const perStudent = data.students.map(function(s){
        const mine = data.rows.filter(function(r){ return r.studentId === s.id; });
        const present = mine.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
        const pct = total > 0 ? Math.round((present / total) * 100) : 0;
        return { s: s, present: present, pct: pct };
      });

      // 반 평균
      const avgPct = perStudent.length > 0
        ? Math.round(perStudent.reduce(function(acc, x){ return acc + x.pct; }, 0) / perStudent.length)
        : 0;
      const riskCount = perStudent.filter(function(x){ return x.pct < 50; }).length;
      const goodCount = perStudent.filter(function(x){ return x.pct >= 80; }).length;

      // 최근 주 출석률 (가장 최근 date 한 회의 P2/P3/P4 비율)
      const latestDate = dates.slice().sort().reverse()[0];
      const latestRows = data.rows.filter(function(r){ return r.date === latestDate; });
      const latestPresent = latestRows.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
      const latestPct = data.students.length > 0
        ? Math.round((latestPresent / data.students.length) * 100) : 0;

      // 정렬
      let view = perStudent.slice();
      if (sortBy === 'name') {
        view.sort(function(a,b){ return String(a.s['이름']||'').localeCompare(String(b.s['이름']||''),'ko'); });
      } else if (sortBy === 'pct_desc') {
        view.sort(function(a,b){ return b.pct - a.pct; });
      } else if (sortBy === 'pct_asc') {
        view.sort(function(a,b){ return a.pct - b.pct; });
      }

      return (
        <>
          {/* 내 반 주별 출석 인원 추이 (선형 그래프) */}
          <div className="admin-section">
            <h4>주별 출석 인원 <span style={{fontWeight:400,fontSize:12,color:'var(--label-alt)'}}>(최근 {weeklyPts.length}주)</span></h4>
            <LineChart points={weeklyPts} />
          </div>

          {/* 반 요약 카드 */}
          <div className="stats-summary">
            <div className="stats-summary-title">올해 반 평균 출석률</div>
            <div className="stats-summary-row">
              <span className="big">{avgPct}%</span>
              <span className="sub">({total}회 예배 · 학생 {data.students.length}명)</span>
            </div>
            <div className="stats-summary-meta">
              최근 예배({latestDate}): <strong>{latestPresent}/{data.students.length}명</strong> 출석 · {latestPct}%
              {' · '}양호(80%↑): <strong>{goodCount}명</strong>
              {' · '}위험(50%↓): <strong style={{color:'var(--status-negative)'}}>{riskCount}명</strong>
            </div>
          </div>

          {/* 정렬 칩 */}
          <div className="filter-bar" role="toolbar" aria-label="통계 정렬">
            <span className="bulk-label">정렬</span>
            <button className={'filter-chip' + (sortBy === 'name' ? ' active' : '')}
              onClick={() => setSortBy('name')}>이름순</button>
            <button className={'filter-chip' + (sortBy === 'pct_desc' ? ' active' : '')}
              onClick={() => setSortBy('pct_desc')}>출석률 ↓</button>
            <button className={'filter-chip' + (sortBy === 'pct_asc' ? ' active' : '')}
              onClick={() => setSortBy('pct_asc')}>출석률 ↑</button>
          </div>

          {/* 학생별 progress bar */}
          {view.map(function(x){
            const cls = x.pct < 50 ? 'risk' : (x.pct >= 80 ? 'good' : '');
            return (
              <div key={x.s.id} className={'stat-bar-card ' + cls}>
                <div className="stat-bar-head">
                  <span className="stat-bar-name">{x.s['이름']}</span>
                  <span className="stat-bar-pct">{x.pct}%</span>
                </div>
                <div className="stat-bar-track">
                  <div className="stat-bar-fill" style={{width: Math.max(2, x.pct) + '%'}}></div>
                </div>
                <div className="stat-bar-meta">{x.present} / {total}회 출석 · {x.s['학년']}</div>
              </div>
            );
          })}
        </>
      );
    }

    // ──────────────── StudentDetail ────────────────
    // 학생 정보 수정 가능한 필드 (#5/관리자#5). 반/id는 제외.
    const EDITABLE_FIELDS = ['이름','성별','학년','신급','연락처','생년월일','초등학교','학교','부/모','부모님연락처','주소','비고'];

    function StudentDetail({ idToken, studentId, me, onClose, toast }) {
      const [detail, setDetail] = useState(null);
      const [error, setError] = useState(null);
      const [editing, setEditing] = useState(false);
      const [form, setForm] = useState({});
      const [saving, setSaving] = useState(false);
      // 수정 권한: 관리자, 또는 본인 반이 있는 교사(자기 반 학생만 상세를 여므로), 또는 새가족부 교사.
      const canEdit = !!(me && (me.permissions.includes('read_all') || me.teacher || me.role === 'newcomer_staff'));

      const loadDetail = useCallback(() => {
        return callApi('getStudentDetail', { idToken, studentId })
          .then((r) => {
            if (r.ok) { setDetail(r.student); setError(null); }
            else { setError(r.code || 'unknown'); toast.show('불러오기 실패'); }
          })
          .catch(() => { setError('network'); toast.show('네트워크 오류'); });
      }, [idToken, studentId, toast.show]);

      useEffect(() => { let aborted = false; loadDetail(); return () => { aborted = true; }; }, [loadDetail]);

      const startEdit = () => {
        const f = {};
        EDITABLE_FIELDS.forEach((k) => { f[k] = detail[k] !== undefined ? String(detail[k]) : ''; });
        setForm(f);
        setEditing(true);
      };
      const saveEdit = () => {
        setSaving(true);
        const fields = {};
        EDITABLE_FIELDS.forEach((k) => { fields[k] = form[k] !== undefined ? form[k] : ''; });
        callApi('updateStudent', { idToken, studentId, fields })
          .then((r) => {
            setSaving(false);
            if (r.ok) { setEditing(false); loadDetail(); toast.show('저장됨'); }
            else if (r.code === 'forbidden') toast.show('수정 권한이 없습니다');
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      const [extra, setExtra] = useState(null);
      useEffect(() => {
        let aborted = false;
        Promise.all([
          callApi('getAttendance', { idToken, year: new Date().getFullYear() }),
          callApi('getPrayers', { idToken })
        ]).then(([a, p]) => {
          if (aborted) return;
          setExtra({
            att: a.ok ? a.rows.filter((r) => String(r.studentId) === String(studentId))
                              .sort((x, y) => (x.date < y.date ? 1 : -1)).slice(0, 12) : [],
            prayers: p.ok ? (p.prayers || []).filter((x) => String(x.studentId) === String(studentId) && String(x.text || '').trim()) : []
          });
        }).catch(() => { if (!aborted) setExtra({ att: [], prayers: [] }); });
        return () => { aborted = true; };
      }, [idToken, studentId]);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            {error ? (
              <>
                <div className="sheet-header"><h3>불러올 수 없어요</h3></div>
                <div className="sheet-body">
                  <p style={{color:'var(--label-alt)'}}>네트워크나 권한 문제일 수 있어요.</p>
                </div>
                <div className="sheet-footer">
                  <button className="btn ghost" style={{width:'100%'}} onClick={onClose}>닫기</button>
                </div>
              </>
            ) : !detail ? <div className="loading" style={{padding:40}}>불러오는 중…</div> : (
              <>
                <div className="sheet-header"><h3>{detail['이름']}{editing ? ' 정보 수정' : ''}</h3></div>
                <div className="sheet-body">
                  {editing ? (
                    EDITABLE_FIELDS.map((k) => (
                      <div key={k} className="form-row">
                        <label className="form-label">{k}</label>
                        {k === '성별' ? (
                          <select className="form-select" value={form[k] || ''}
                            onChange={(e) => setForm((f) => ({ ...f, [k]: e.target.value }))}>
                            <option value="">선택</option>
                            <option value="남">남</option>
                            <option value="여">여</option>
                          </select>
                        ) : k === '학년' ? (
                          <select className="form-select" value={form[k] || ''}
                            onChange={(e) => setForm((f) => ({ ...f, [k]: e.target.value }))}>
                            <option value="">선택</option>
                            {['중1','중2','중3','고1','고2','고3'].map((g) => <option key={g} value={g}>{g}</option>)}
                          </select>
                        ) : (
                          <input className="form-input" value={form[k] || ''}
                            onChange={(e) => setForm((f) => ({ ...f, [k]: e.target.value }))} />
                        )}
                      </div>
                    ))
                  ) : (
                  <>
                  {['학년','성별','생년월일','연락처','학교','초등학교','신급','부/모','부모님연락처','주소','비고']
                    .filter((k) => detail[k])
                    .map((k) => {
                      const v = detail[k];
                      let display = v;
                      // Phone numbers → tap to dial / text. Strip non-digit for href.
                      if ((k === '연락처' || k === '부모님연락처') && v) {
                        const cleaned = String(v).replace(/[^0-9+]/g, '');
                        display = (
                          <span style={{display:'inline-flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                            <span>{v}</span>
                            <a href={'tel:' + cleaned} className="link-chip" aria-label="전화 걸기">📞 전화</a>
                            <a href={'sms:' + cleaned} className="link-chip" aria-label="문자 보내기">💬 문자</a>
                          </span>
                        );
                      } else if (k === '주소' && v) {
                        const q = encodeURIComponent(String(v));
                        display = (
                          <span>
                            <span style={{marginRight:8}}>{v}</span>
                            <a href={'https://www.google.com/maps/search/?api=1&query=' + q}
                               target="_blank" rel="noopener noreferrer"
                               className="link-chip" aria-label="지도에서 보기">🗺 지도</a>
                          </span>
                        );
                      }
                      return (
                        <div key={k} style={{display:'flex',padding:'8px 0',borderBottom:'1px solid var(--fill-normal)'}}>
                          <div style={{width:90,color:'var(--label-alt)',fontSize:13,flexShrink:0}}>{k}</div>
                          <div style={{flex:1,fontSize:14,lineHeight:1.45}}>{display}</div>
                        </div>
                      );
                    })}
                  {extra && extra.prayers.length > 0 && (
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--label-alt)',marginBottom:6}}>🙏 기도제목</div>
                      {extra.prayers.map((p) => (
                        <div key={p.id} style={{fontSize:14,lineHeight:1.5,padding:'6px 0',whiteSpace:'pre-wrap',
                          borderBottom:'1px solid var(--fill-normal)'}}>{p.text}</div>
                      ))}
                    </div>
                  )}
                  {extra && extra.att.length > 0 && (
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--label-alt)',marginBottom:6}}>📅 올해 출석 (최근 12회)</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {extra.att.map((r) => {
                          const o = STATUS_OPTIONS.find((x) => x.code === r.status);
                          const [, mm, dd] = r.date.split('-');
                          const md = Number(mm) + '/' + Number(dd);
                          return (
                            <span key={r.date} className={'sum-item ' + r.status}
                              title={r.etcText || ''}>
                              {md} {o ? o.label : r.status}{r.etcText ? ' · ' + r.etcText : ''}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  </>
                  )}
                </div>
                <div className="sheet-footer" style={{display:'flex',gap:8}}>
                  {editing ? (
                    <>
                      <button className="btn ghost" style={{flex:1}} onClick={() => setEditing(false)} disabled={saving}>취소</button>
                      <button className="btn primary" style={{flex:1}} onClick={saveEdit} disabled={saving}>{saving ? '저장 중…' : '저장'}</button>
                    </>
                  ) : (
                    <>
                      {canEdit && <button className="btn primary" style={{flex:1}} onClick={startEdit}>수정</button>}
                      <button className="btn ghost" style={{flex:1}} onClick={onClose}>닫기</button>
                    </>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ──────────────── NewcomersView ────────────────
    function NewcomersView({ idToken, toast, onOpenDetail }) {
      const [data, setData] = useState(null); // { students, progress }
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [graduateTarget, setGraduateTarget] = useState(null); // student object (등반)
      const [changeGradTarget, setChangeGradTarget] = useState(null); // 등반 완료자 (등반반 변경)
      const [override, setOverride] = useState({}); // 즉시 반영용 (studentId|date -> 상태, 'NONE'=취소)
      const [date, setDate] = useState(recentSunday()); // 출석 수정 대상 주일

      const reload = useCallback(() => {
        setLoading(true);
        callApi('getNewcomers', { idToken })
          .then((r) => {
            // override(방금 누른 오늘 상태)는 비우지 않는다 — 백엔드가 todayStatus를
            // 아직 안 주는 경우에도 화면이 깜빡이거나 꺼지지 않게 유지. 탭 재진입(remount) 시 자연 초기화.
            if (r.ok) setData({ students: r.students, graduates: r.graduates || [] });
            else toast.show('새가족 명단 불러오기 실패: ' + (r.code || ''));
            setLoading(false);
          })
          .catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      const [pendingEtc, setPendingEtc] = useState(null); // { studentId, status }

      // 선택한 주일(date)의 출석을 저장/수정/취소. status==='NONE'이면 기록 삭제.
      const doSaveAttendance = (studentId, status, etcText) => {
        const k = studentId + '|' + date;
        setOverride((o) => ({ ...o, [k]: status })); // 즉시 반영
        callApi('setAttendance', { idToken, date, studentId, status, etcText: etcText || '' })
          .then((r) => {
            if (r.ok) { toast.show(status === 'NONE' ? '출석 취소됨' : ('출석 저장됨 (' + date + ')')); reload(); }
            else {
              setOverride((o) => { const n = { ...o }; delete n[k]; return n; });
              toast.show('저장 실패: ' + (r.code || ''));
            }
          })
          .catch(() => {
            setOverride((o) => { const n = { ...o }; delete n[k]; return n; });
            toast.show('네트워크 오류');
          });
      };

      // 같은 상태를 다시 누르면 취소(수정), 아니면 설정. ETC/ABSENT는 사유 시트.
      const tapStatus = (studentId, status, cur) => {
        if (cur === status) { doSaveAttendance(studentId, 'NONE', ''); return; }
        if (status === 'ETC' || status === 'ABSENT') { setPendingEtc({ studentId, status }); return; }
        doSaveAttendance(studentId, status, '');
      };

      const handleEtcSave = (text) => {
        if (!pendingEtc) return;
        doSaveAttendance(pendingEtc.studentId, pendingEtc.status, text || '');
        setPendingEtc(null);
      };

      const toggleProgress = (studentId, week, current) => {
        const completed = !current;
        callApi('setNewcomerProgress', { idToken, studentId, week, completed })
          .then((r) => {
            if (r.ok) reload();
            else toast.show('진도 저장 실패');
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      // 새가족 삭제(soft, active=FALSE) — 중복/오등록 정리(R3). 출석/기도 이력은 보존.
      const removeNewcomer = (s) => {
        if (!confirm('‘' + s['이름'] + '’ 님을 새가족부에서 삭제할까요?\n(출석·기도 기록은 보존되며, 목록에서만 제거됩니다.)')) return;
        callApi('deleteNewcomer', { idToken, studentId: s.id })
          .then((r) => {
            if (r.ok) { toast.show('삭제됐습니다'); reload(); }
            else toast.show('삭제 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const students = (data && data.students) || [];
      const graduates = (data && data.graduates) || [];
      const year = String(new Date().getFullYear());
      const gradsThisYear = graduates.filter((g) => String(g.graduatedOn || '').slice(0,4) === year);
      // 새가족부 통계 (#8): 활성/등반/이번주 출석/교육완료(4주)
      const todayCount = students.filter((s) => PRESENT_CODES.indexOf(s.todayStatus) >= 0).length;
      const eduDone = students.filter((s) => {
        const p = s.progress || {};
        return p.week1 && p.week2 && p.week3 && p.week4;
      }).length;

      return (
        <>
          <div className="stats-summary">
            <div className="stats-summary-title">새가족부 통계</div>
            <div className="stats-summary-row">
              <span className="big">{students.length}<span style={{fontSize:14}}>명</span></span>
              <span className="sub">진행 중 · 올해 등반 {gradsThisYear.length}명</span>
            </div>
            <div className="stats-summary-meta">
              오늘 출석 <strong>{todayCount}명</strong> · 4주 교육 완료 <strong>{eduDone}명</strong>
            </div>
          </div>

          {/* 출석 수정 대상 주일 선택 — 지난 주 출석도 고칠 수 있다 */}
          <WeekStepper sunday={date} onChange={setDate} />

          <div style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:14,color:'var(--label-alt)'}}>{students.length}명의 새가족</div>
            <button className="btn primary sm" onClick={() => setShowForm(true)}>＋ 새가족 추가</button>
          </div>

          {students.length === 0 && graduates.length === 0 && <div className="loading">새가족이 없습니다.</div>}

          {students.map((s) => {
            const prog = s.progress || {};
            // 선택한 주일(date)의 출석 상태 — 방금 누른 값(override) 우선, 'NONE'이면 없음.
            const ovk = s.id + '|' + date;
            let cur;
            if (override[ovk] !== undefined) cur = (override[ovk] === 'NONE') ? null : override[ovk];
            else { const rec = (s.attendance || []).find((a) => a.date === date); cur = rec ? rec.status : null; }
            // 출석 이력 (최근 → 과거). 선택 주일의 override를 합쳐 즉시 반영.
            const hist = (s.attendance || []).filter((a) => a.date !== date || override[ovk] === undefined);
            if (override[ovk] !== undefined && override[ovk] !== 'NONE') {
              hist.unshift({ date: date, status: override[ovk] });
            }
            hist.sort((a, b) => (a.date < b.date ? 1 : (a.date > b.date ? -1 : 0)));
            return (
              <div className="newcomer-card" key={s.id} data-status={cur || undefined}>
                <div className="newcomer-card-top">
                  <div style={{flex:1}}>
                    <div className="student-name">{s['이름']}</div>
                    <div className="student-meta">{s['학년']} · {s['성별']}</div>
                  </div>
                  <button className="btn ghost sm" onClick={() => onOpenDetail && onOpenDetail(s.id)}>정보</button>
                  <button className="btn danger sm" onClick={() => setGraduateTarget(s)}>등반</button>
                  <button className="btn ghost sm" onClick={() => removeNewcomer(s)} title="새가족부에서 삭제"
                    style={{color:'var(--status-negative)'}}>삭제</button>
                </div>
                <div className="newcomer-card-bottom">
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>출석</div>
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill ' + (cur === opt.code ? 'active ' + opt.code : '')}
                      style={{fontSize:11,padding:'4px 8px'}}
                      title={cur === opt.code ? '다시 누르면 취소' : ''}
                      onClick={() => tapStatus(s.id, opt.code, cur)}>{opt.label}</button>
                  ))}
                </div>
                {hist.length > 0 && (
                  <div className="newcomer-card-bottom" style={{borderTop:'none',paddingTop:0}}>
                    <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>출석일</div>
                    {hist.slice(0, 10).map((a, i) => {
                      const o = STATUS_OPTIONS.find((x) => x.code === a.status);
                      const md = a.date.length >= 10 ? (Number(a.date.slice(5,7)) + '/' + Number(a.date.slice(8,10))) : a.date;
                      const sel = a.date === date;
                      return (
                        <button key={a.date + '_' + i} className={'sum-item ' + a.status}
                          style={{fontSize:11,border:sel?'1.5px solid var(--label-normal)':'none',cursor:'pointer'}}
                          title={a.date + (a.etcText ? ' · ' + a.etcText : '') + ' — 눌러서 이 주일 수정'}
                          onClick={() => setDate(a.date)}>
                          {md} {o ? o.label : a.status}
                        </button>
                      );
                    })}
                  </div>
                )}
                <div className="newcomer-card-bottom" style={{borderTop:'none',paddingTop:0}}>
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>교육</div>
                  {[1,2,3,4].map((w) => {
                    const checked = !!prog['week' + w];
                    return (
                      <button key={w}
                        className={'check-pill' + (checked ? ' checked' : '')}
                        onClick={() => toggleProgress(s.id, w, checked)}>
                        <span className="check-icon">{checked ? '✓' : '○'}</span>
                        {w}주
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* 등반 완료자 — 배경색으로 구분 (새가족#4) */}
          {graduates.length > 0 && (
            <>
              <div className="section-head">등반 완료 ({graduates.length}명)</div>
              {graduates.map((g) => (
                <div className="newcomer-card graduated" key={'g_' + g.id}>
                  <div className="newcomer-card-top">
                    <div style={{flex:1}}>
                      <div className="student-name">{g['이름']}
                        <span className="grad-badge">등반</span>
                      </div>
                      <div className="student-meta">{g['학년']} · {classLabel(g.graduatedTo)}{g.graduatedOn ? ' · ' + g.graduatedOn : ''}</div>
                    </div>
                  </div>
                  <div className="newcomer-footer">
                    <button className="btn ghost sm" style={{flex:1}} onClick={() => onOpenDetail && onOpenDetail(g.id)}>정보 수정</button>
                    <button className="btn ghost sm" style={{flex:1}} onClick={() => setChangeGradTarget(g)}>등반반 변경</button>
                  </div>
                </div>
              ))}
            </>
          )}

          {showForm && (
            <NewcomerForm
              idToken={idToken}
              toast={toast}
              onClose={() => setShowForm(false)}
              onSuccess={() => { setShowForm(false); reload(); }}
            />
          )}

          {graduateTarget && (
            <GraduateDialog
              idToken={idToken}
              toast={toast}
              student={graduateTarget}
              onClose={() => setGraduateTarget(null)}
              onSuccess={() => { setGraduateTarget(null); reload(); }}
            />
          )}

          {changeGradTarget && (
            <GraduateDialog
              idToken={idToken}
              toast={toast}
              student={changeGradTarget}
              mode="change"
              onClose={() => setChangeGradTarget(null)}
              onSuccess={() => { setChangeGradTarget(null); reload(); }}
            />
          )}

          {pendingEtc && (
            <EtcInputSheet status={pendingEtc.status}
              onSave={handleEtcSave} onCancel={() => setPendingEtc(null)} />
          )}
        </>
      );
    }

    // ──────────────── NewcomerForm ────────────────
    function NewcomerForm({ idToken, toast, onClose, onSuccess }) {
      const [form, setForm] = useState({
        name: '', gender: '남', phone: '',
        birthYear: '', birthMonth: '', birthDay: '', grade: '',
        school: '', parentPhone: '', address: '', note: '',
      });
      const [saving, setSaving] = useState(false);

      const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

      // 생년월일 선택지 — 연도는 별도 드롭다운으로 (새가족#1). 청소년 범위 + 버퍼.
      const thisYear = new Date().getFullYear();
      const birthYears = [];
      for (let y = thisYear - 8; y >= thisYear - 25; y--) birthYears.push(y);
      const pad2 = (n) => String(n).padStart(2, '0');

      const submit = () => {
        if (!form.name.trim()) { toast.show('이름을 입력하세요'); return; }
        // 연·월·일이 모두 선택된 경우에만 birthDate(YYYY-MM-DD) 구성.
        const birthDate = (form.birthYear && form.birthMonth && form.birthDay)
          ? form.birthYear + '-' + pad2(form.birthMonth) + '-' + pad2(form.birthDay)
          : '';
        setSaving(true);
        callApi('addNewcomer', {
          idToken,
          name: form.name.trim(),
          gender: form.gender,
          phone: form.phone,
          birthDate: birthDate,
          grade: form.grade,
          school: form.school,
          parentPhone: form.parentPhone,
          address: form.address,
          note: form.note,
        })
          .then((r) => {
            setSaving(false);
            if (r.ok) { toast.show('새가족이 추가됐습니다'); onSuccess(); }
            else toast.show('추가 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-header">
              <h3>새가족 추가</h3>
              <button className="sheet-close" onClick={onClose}>✕</button>
            </div>
            <div className="sheet-body">
              <div className="form-row">
                <label className="form-label">이름 *</label>
                <input className="form-input" value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="홍길동" />
              </div>
              <div className="form-row">
                <label className="form-label">성별</label>
                <div className="radio-group">
                  {['남','여'].map((g) => (
                    <label key={g} className="radio-label">
                      <input type="radio" name="gender" value={g} checked={form.gender === g} onChange={() => set('gender', g)} />
                      {g}
                    </label>
                  ))}
                </div>
              </div>
              <div className="form-row">
                <label className="form-label">학년</label>
                <select className="form-select" value={form.grade} onChange={(e) => set('grade', e.target.value)}>
                  <option value="">선택</option>
                  {['중1','중2','중3','고1','고2','고3'].map((g) => <option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div className="form-row">
                <label className="form-label">연락처</label>
                <input className="form-input" value={form.phone} onChange={(e) => set('phone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">생년월일</label>
                <div style={{display:'flex',gap:8}}>
                  <select className="form-select" style={{flex:1.4}} value={form.birthYear}
                    onChange={(e) => set('birthYear', e.target.value)} aria-label="출생 연도">
                    <option value="">연도</option>
                    {birthYears.map((y) => <option key={y} value={y}>{y}년</option>)}
                  </select>
                  <select className="form-select" style={{flex:1}} value={form.birthMonth}
                    onChange={(e) => set('birthMonth', e.target.value)} aria-label="출생 월">
                    <option value="">월</option>
                    {Array.from({length:12},(_,i)=>i+1).map((m) => <option key={m} value={m}>{m}월</option>)}
                  </select>
                  <select className="form-select" style={{flex:1}} value={form.birthDay}
                    onChange={(e) => set('birthDay', e.target.value)} aria-label="출생 일">
                    <option value="">일</option>
                    {Array.from({length:31},(_,i)=>i+1).map((d) => <option key={d} value={d}>{d}일</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <label className="form-label">학교</label>
                <input className="form-input" value={form.school} onChange={(e) => set('school', e.target.value)} placeholder="○○중학교" />
              </div>
              <div className="form-row">
                <label className="form-label">부모님 연락처</label>
                <input className="form-input" value={form.parentPhone} onChange={(e) => set('parentPhone', e.target.value)} placeholder="010-0000-0000" />
              </div>
              <div className="form-row">
                <label className="form-label">주소</label>
                <input className="form-input" value={form.address} onChange={(e) => set('address', e.target.value)} />
              </div>
              <div className="form-row">
                <label className="form-label">비고</label>
                <input className="form-input" value={form.note} onChange={(e) => set('note', e.target.value)} />
              </div>
            </div>
            <div className="sheet-footer" style={{display:'flex',gap:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={onClose} disabled={saving}>취소</button>
              <button className="btn primary" style={{flex:1}} onClick={submit} disabled={saving}>
                {saving ? '저장 중…' : '저장'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── GraduateDialog ────────────────
    function GraduateDialog({ idToken, toast, student, mode, onClose, onSuccess }) {
      const isChange = mode === 'change'; // 등반반 변경/취소 모드 (이미 등반한 학생)
      const [targetTeacher, setTargetTeacher] = useState(isChange ? (student.graduatedTo || '') : '');
      const [teachers, setTeachers] = useState(null);
      const [saving, setSaving] = useState(false);

      // Try to fetch teacher list from getAllRosters; fall back to free text if not authorized
      useEffect(() => {
        callApi('getAllRosters', { idToken })
          .then((r) => {
            if (r.ok && r.byClass) {
              setTeachers(Object.keys(r.byClass).filter(Boolean));
            } else {
              setTeachers([]); // will show free-text fallback
            }
          })
          .catch(() => setTeachers([]));
      }, [idToken]);

      const confirm_ = () => {
        if (!targetTeacher.trim()) { toast.show('반을 선택해 주세요'); return; }
        setSaving(true);
        const action = isChange ? 'setGraduationClass' : 'graduate';
        callApi(action, { idToken, studentId: student.id, targetTeacher: targetTeacher.trim() })
          .then((r) => {
            setSaving(false);
            if (r.ok) { toast.show(student['이름'] + (isChange ? ' 등반반 변경됨' : ' 등반 완료')); onSuccess(); }
            else toast.show((isChange ? '변경' : '등반') + ' 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      // 등반 취소 (change 모드 전용) — 다시 새가족 활성 상태로 되돌림
      const undoGraduate = () => {
        if (!confirm(student['이름'] + ' 학생의 등반을 취소할까요? (다시 새가족 명단으로 돌아갑니다)')) return;
        setSaving(true);
        callApi('setGraduationClass', { idToken, studentId: student.id, targetTeacher: '' })
          .then((r) => {
            setSaving(false);
            if (r.ok) { toast.show(student['이름'] + ' 등반 취소됨'); onSuccess(); }
            else toast.show('등반 취소 실패: ' + (r.code || ''));
          })
          .catch(() => { setSaving(false); toast.show('네트워크 오류'); });
      };

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" style={{maxHeight:'60vh'}} onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-header"><h3>{student['이름']} {isChange ? '등반반 변경' : '등반'}</h3></div>
            <div className="sheet-body">
              <p style={{fontSize:14,color:'var(--label-alt)',margin:'0 0 16px'}}>
                {isChange ? '바꿀 반(교사)을 선택하세요.' : '이동할 반(교사)을 선택하세요.'}
              </p>
              {teachers === null ? (
                <div style={{color:'var(--label-alt)',fontSize:14}}>불러오는 중…</div>
              ) : teachers.length > 0 ? (
                <select className="form-select" value={targetTeacher} onChange={(e) => setTargetTeacher(e.target.value)}>
                  <option value="">반 선택</option>
                  {teachers.map((t) => <option key={t} value={t}>{classLabel(t)}</option>)}
                </select>
              ) : (
                <input
                  className="form-input"
                  value={targetTeacher}
                  onChange={(e) => setTargetTeacher(e.target.value)}
                  placeholder="교사 이름 직접 입력"
                />
              )}
              {isChange && (
                <button className="btn danger" style={{width:'100%',marginTop:14}} onClick={undoGraduate} disabled={saving}>
                  등반 취소 (새가족으로 되돌리기)
                </button>
              )}
            </div>
            <div className="sheet-footer" style={{display:'flex',gap:8}}>
              <button className="btn ghost" style={{flex:1}} onClick={onClose} disabled={saving}>취소</button>
              <button className="btn primary" style={{flex:1}} onClick={confirm_} disabled={saving || !targetTeacher.trim()}>
                {saving ? '처리 중…' : (isChange ? '변경 확정' : '등반 확정')}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── AdminView ────────────────
    // ── 반별 출석 집계 (studentId → 현재 반 매핑 기준) ──
    // 출석시트 '반'(=teacher) 컬럼은 마이그레이션/수동편집으로 표기·공백이 어긋날 수
    // 있어 직접 매칭하면 반별 통계가 0이 된다(증상: 모든 반 0%). 학년별 통계와 동일하게
    // studentId로 학생의 '현재 반'을 찾아 귀속시키면 teacher 표기에 무관하게 견고하다.
    function classOfStudentMap(byClass) {
      const map = {};
      Object.keys(byClass).forEach(function(cls){
        (byClass[cls] || []).forEach(function(s){ map[String(s.id)] = cls; });
      });
      return map;
    }
    // 반별 그룹 통계: [{name, count, present, total, latest, pct}] (이름 가나다순)
    function computeClassGroups(byClass, presentRows, totalDates, latestDate) {
      const classOf = classOfStudentMap(byClass);
      return Object.keys(byClass)
        .map(function(cls){
          const students = byClass[cls] || [];
          if (students.length === 0) return null;
          const present = presentRows.filter(function(r){ return classOf[String(r.studentId)] === cls; }).length;
          const total = students.length * totalDates;
          const latest = presentRows.filter(function(r){ return classOf[String(r.studentId)] === cls && r.date === latestDate; }).length;
          return { name: cls, count: students.length, present: present, total: total, latest: latest,
                   pct: total > 0 ? Math.min(100, Math.round((present / total) * 100)) : 0 };
        })
        .filter(Boolean)
        .sort(function(a,b){ return a.name.localeCompare(b.name, 'ko'); });
    }
    // 주별 출석 인원 추이 — rows에서 날짜별 출석(PRESENT_CODES) 인원, 최근 n주.
    function weeklyPresentPoints(rows, n) {
      const dates = Array.from(new Set(rows.map(function(r){ return r.date; }))).sort();
      return dates.slice(-n).map(function(d){
        return { label: Number(d.slice(5,7)) + '/' + Number(d.slice(8,10)),
                 value: rows.filter(function(r){ return r.date === d && PRESENT_CODES.indexOf(r.status) >= 0; }).length };
      });
    }

    // 간단한 SVG 선형 그래프 — points: [{label, value}]
    function LineChart({ points, color }) {
      if (!points || points.length === 0) return <div className="weekly-empty">데이터가 없습니다</div>;
      const W = 320, H = 120, padL = 8, padR = 8, padT = 16, padB = 20;
      const maxV = Math.max.apply(null, points.map(function(p){ return p.value; }).concat([1]));
      const n = points.length;
      const xOf = function(i){ return n === 1 ? W / 2 : padL + (i * (W - padL - padR)) / (n - 1); };
      const yOf = function(v){ return padT + (H - padT - padB) * (1 - v / maxV); };
      const d = points.map(function(p, i){ return (i === 0 ? 'M' : 'L') + xOf(i).toFixed(1) + ' ' + yOf(p.value).toFixed(1); }).join(' ');
      const labelStep = Math.max(1, Math.ceil(n / 6));
      const col = color || 'var(--primary)';
      return (
        <svg className="line-chart" viewBox={'0 0 ' + W + ' ' + H} role="img" aria-label="추이 그래프">
          <path d={d} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
          {points.map(function(p, i){
            return (
              <g key={i}>
                <circle cx={xOf(i)} cy={yOf(p.value)} r="2.5" fill={col} />
                <text x={xOf(i)} y={yOf(p.value) - 5} textAnchor="middle" className="lc-val">{p.value}</text>
                {i % labelStep === 0 && <text x={xOf(i)} y={H - 6} textAnchor="middle" className="lc-lab">{p.label}</text>}
              </g>
            );
          })}
        </svg>
      );
    }

    // 관리자 통계: 전체 요약 + 주차별/월별 합계(선형) + 예배별 + 주별 학년별 + 반별 타일
    //              + 학년별 + 결석사유 + 교사 출석현황 (올해 고정, 클라이언트 집계)
    function AdminStats({ byClass, attRows, newcomers }) {
      const [selectedDate, setSelectedDate] = useState('');
      const [selectedClass, setSelectedClass] = useState('');
      const classNames = Object.keys(byClass);
      const allStudents = classNames.reduce(function(acc, c){ return acc.concat(byClass[c] || []); }, []);
      const dates = Array.from(new Set(attRows.map(function(r){ return r.date; }))).sort();
      const totalDates = dates.length;

      if (allStudents.length === 0) return <div className="loading">학생이 없습니다.</div>;
      if (totalDates === 0) return <div className="loading">올해 출석 기록이 아직 없습니다.</div>;

      const presentRows = attRows.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; });

      // 전체 요약
      const overallTotal = allStudents.length * totalDates;
      const overallPct = Math.min(100, Math.round((presentRows.length / overallTotal) * 100));
      const latestDate = dates[dates.length - 1];
      const activeDate = selectedDate || recentSunday();
      const weekSnapshot = AdminStatsUtils.buildAdminWeekSnapshot({ byClass, attRows, selectedDate: activeDate, defaultDate: recentSunday() });
      const weekOverall = weekSnapshot.overall;
      const year = String(new Date().getFullYear());
      const newcomerKpis = AdminStatsUtils.buildNewcomerKpis(newcomers || {}, year);

      // 주차별 출석 합계 (최근 12주) — #1 / 주별 선형 그래프
      const trendDates = dates.slice(-12);
      const weeklyPoints = trendDates.map(function(d){
        return { label: Number(d.slice(5,7)) + '/' + Number(d.slice(8,10)),
                 value: presentRows.filter(function(r){ return r.date === d; }).length };
      });

      // 월별 출석 합계 — 월별 선형 그래프
      const monthMap = {};
      presentRows.forEach(function(r){ const m = r.date.slice(0,7); monthMap[m] = (monthMap[m] || 0) + 1; });
      const monthlyPoints = Object.keys(monthMap).sort().map(function(m){
        return { label: Number(m.slice(5,7)) + '월', value: monthMap[m] };
      });

      // 예배별 출석 합계 (2부/3부/4부/기타) — #2
      const SERVICES = [
        { code:'P2', label:'2부', color:'var(--att-p2)' },
        { code:'P3', label:'3부', color:'var(--att-p3)' },
        { code:'P4', label:'4부', color:'var(--att-p4)' },
        { code:'ETC', label:'기타', color:'var(--att-etc)' },
      ];
      const svcCounts = {};
      attRows.forEach(function(r){ svcCounts[r.status] = (svcCounts[r.status] || 0) + 1; });
      const svcMax = Math.max.apply(null, SERVICES.map(function(s){ return svcCounts[s.code] || 0; }).concat([1]));

      // 학년 맵
      const GRADE_ORDER = ['중1','중2','중3','고1','고2','고3'];
      const GRADE_COLORS = { '중1':'#5B8DEF','중2':'#22C3A6','중3':'#F4A259','고1':'#9B6DFF','고2':'#EF6F6C','고3':'#E6B800','기타':'#9AA0A6' };
      const gradeOf = {};
      allStudents.forEach(function(s){ gradeOf[String(s.id)] = String(s['학년'] || '').trim() || '기타'; });
      const gradeNames = Array.from(new Set(allStudents.map(function(s){ return gradeOf[String(s.id)]; })));
      gradeNames.sort(function(a,b){
        const ia = GRADE_ORDER.indexOf(a), ib = GRADE_ORDER.indexOf(b);
        return (ia < 0 ? GRADE_ORDER.length : ia) - (ib < 0 ? GRADE_ORDER.length : ib);
      });

      // 주별 학년별 누적 출석 (최근 8주) — #4
      const stackDates = dates.slice(-8);
      const stackData = stackDates.map(function(d){
        const byGrade = {}; gradeNames.forEach(function(g){ byGrade[g] = 0; });
        presentRows.filter(function(r){ return r.date === d; }).forEach(function(r){
          const g = gradeOf[String(r.studentId)]; if (g) byGrade[g] = (byGrade[g] || 0) + 1;
        });
        const total = gradeNames.reduce(function(a,g){ return a + byGrade[g]; }, 0);
        return { date: d, byGrade: byGrade, total: total };
      });
      const stackMax = Math.max.apply(null, stackData.map(function(x){ return x.total; }).concat([1]));

      // 학년별 통계
      const gradeGroups = gradeNames.map(function(g){
        const members = allStudents.filter(function(s){ return gradeOf[String(s.id)] === g; });
        const memberIds = {};
        members.forEach(function(s){ memberIds[String(s.id)] = true; });
        const present = presentRows.filter(function(r){ return memberIds[String(r.studentId)]; }).length;
        const total = members.length * totalDates;
        return { name: g, count: members.length, present: present, total: total,
                 pct: total > 0 ? Math.min(100, Math.round((present / total) * 100)) : 0 };
      });

      // 결석 사유 (최근 주일 기준) — #3. 반별 그룹. getAllAttendance는 studentName/etcText 포함.
      const absRows = attRows.filter(function(r){ return r.status === 'ABSENT' && r.date === weekSnapshot.date; });
      const classOfAbs = classOfStudentMap(byClass);
      const absByClass = {};
      absRows.forEach(function(r){
        const cls = classOfAbs[String(r.studentId)];
        if (!cls) return; // 현재 명단에 없는 학생(이동/졸업)은 반별 결석사유에서 제외
        (absByClass[cls] = absByClass[cls] || []).push(r);
      });
      const absClasses = Object.keys(absByClass).sort(function(a,b){ return a.localeCompare(b, 'ko'); });
      const detailClass = selectedClass && byClass[selectedClass] ? selectedClass : '';
      const detailTrend = detailClass
        ? AdminStatsUtils.buildClassTrendPoints({ className: detailClass, byClass, attRows, count: 12 })
        : [];
      const detailStudents = detailClass
        ? AdminStatsUtils.buildClassStudentStatuses({ className: detailClass, byClass, attRows, selectedDate: weekSnapshot.date })
        : [];

      return (
        <>
          <div className="stats-summary">
            <div className="stats-summary-title">선택 주일 전체 현황</div>
            <div className="stats-summary-row">
              <span className="big">{weekOverall.present}<span style={{fontSize:14}}>명</span></span>
              <span className="sub">/ 재적 {weekOverall.enrolled}명 · 출석률 {weekOverall.pct}%</span>
            </div>
            <div className="stats-summary-meta">
              기준일 <strong>{weekSnapshot.date}</strong>
              {' · '}기타 <strong>{weekOverall.etc}명</strong>
              {' · '}결석 <strong style={{color:'var(--status-negative)'}}>{weekOverall.absent}명</strong>
              {' · '}미체크 <strong>{weekOverall.unmarked}명</strong>
            </div>
            <div className="kpi-grid">
              <div className="kpi-chip"><div className="klabel">전체 재적</div><div className="kval">{weekOverall.enrolled}명</div></div>
              <div className="kpi-chip"><div className="klabel">이번 주 입력</div><div className="kval">{weekOverall.marked}명</div></div>
              <div className="kpi-chip"><div className="klabel">새가족 누적 등록</div><div className="kval">{newcomerKpis.registeredTotal}명</div></div>
              <div className="kpi-chip"><div className="klabel">등반 누계</div><div className="kval">{newcomerKpis.graduatedTotal}명</div></div>
              <div className="kpi-chip"><div className="klabel">현재 새가족부</div><div className="kval">{newcomerKpis.current}명</div></div>
              <div className="kpi-chip"><div className="klabel">올해 등반</div><div className="kval">{newcomerKpis.graduatedThisYear}명</div></div>
            </div>
          </div>

          <WeekStepper sunday={weekSnapshot.date} onChange={setSelectedDate} />

          <div className="admin-section">
            <h4>반별 이번 주 현황 <span style={{fontWeight:400,fontSize:12,color:'var(--label-alt)'}}>(반 클릭 시 추이 확인)</span></h4>
            <div className="tile-grid">
              {weekSnapshot.classes.map(function(g){
                const active = selectedClass === g.name;
                return (
                  <button type="button" key={g.name} className={'stat-tile' + (active ? ' active' : '')}
                    title={classLabel(g.name) + ' · 출석 ' + g.present + '/' + g.enrolled + '명'}
                    onClick={() => setSelectedClass(active ? '' : g.name)}>
                    <div className="tname">{classLabel(g.name)}</div>
                    <div className="tpct">{g.present}/{g.enrolled}</div>
                    <div className="tmeta">결석 {g.absent} · 미체크 {g.unmarked}</div>
                    <div className="ttrack"><div className="tfill" style={{width: Math.max(2, g.pct) + '%'}}></div></div>
                  </button>
                );
              })}
            </div>
            {weekSnapshot.classes.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>데이터가 없습니다.</div>}
          </div>

          {detailClass && (
            <div className="admin-section">
              <div className="class-detail-head">
                <h4>{classLabel(detailClass)} 출석 추이</h4>
                <button className="btn ghost sm" onClick={() => setSelectedClass('')}>닫기</button>
              </div>
              <LineChart points={detailTrend} />
              <div style={{marginTop:10}}>
                {detailStudents.map(function(s){
                  return (
                    <div key={s.id} className="status-row">
                      <span className="sname">{s.name}<span className="smeta"> · {s.grade}</span></span>
                      <span className={'sbadge ' + s.status}>{s.label}</span>
                      {s.etcText && <span className="smeta">{s.etcText}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="admin-section">
            <h4>올해 전체 평균 출석률</h4>
            <div className="stats-summary" style={{margin:'0',border:'none',boxShadow:'none'}}>
              <div className="stats-summary-row">
                <span className="big">{overallPct}%</span>
                <span className="sub">({totalDates}회 예배 · 학생 {allStudents.length}명)</span>
              </div>
            </div>
          </div>

          <div className="admin-section">
            <h4>주차별 출석 합계 (최근 {weeklyPoints.length}주)</h4>
            <LineChart points={weeklyPoints} />
          </div>

          <div className="admin-section">
            <h4>월별 출석 합계</h4>
            <LineChart points={monthlyPoints} color="var(--att-p4)" />
          </div>

          <div className="admin-section">
            <h4>예배별 출석 합계 (올해 누적)</h4>
            <div className="svc-bars">
              {SERVICES.map(function(s){
                const n = svcCounts[s.code] || 0;
                return (
                  <div key={s.code} className="svc-row">
                    <span className="svc-name">{s.label}</span>
                    <span className="svc-track">
                      <span className="svc-fill" style={{width: Math.round((n / svcMax) * 100) + '%', background: s.color}}></span>
                    </span>
                    <span className="svc-num">{n}명</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="admin-section">
            <h4>주별 학년별 출석 (최근 {stackDates.length}주)</h4>
            <div className="gradestack">
              {stackData.map(function(col){
                return (
                  <div key={col.date} className="gs-col" title={col.date + ' · ' + col.total + '명'}>
                    <div className="gs-bar" style={{height: Math.round((col.total / stackMax) * 110) + 'px'}}>
                      {gradeNames.map(function(g){
                        const c = col.byGrade[g] || 0;
                        if (c === 0) return null;
                        return <div key={g} className="gs-seg"

    // ──────────────── App (top-level) ────────────────
    function App() {
      const auth = useGoogleAuth();
      // me = { email, teacher, role, title, permissions }
      const [me, setMe] = useState(null);
      const [authError, setAuthError] = useState(null);

      useEffect(() => {
        if (!auth.idToken) { setMe(null); setAuthError(null); return; }
        let aborted = false;
        // whoami를 기다리지 않고 명단·출석을 미리 당겨온다 (병렬 prefetch).
        // 결과는 apiCache에 적재되어 RosterView 마운트 시 즉시 사용된다.
        // 권한 없는 계정이면 ok:false라 캐시되지 않으며 조용히 무시된다.
        callApi('getRoster', { idToken: auth.idToken }).catch(function(){});
        callApi('getAttendance', { idToken: auth.idToken, year: new Date().getFullYear() }).catch(function(){});
        callApi('whoami', { idToken: auth.idToken })
          .then((r) => {
            if (aborted) return;
            if (r.ok) {
              setMe({
                email: r.email,
                teacher: r.teacher,
                role: r.role || 'teacher',
                // title may come top-level or nested; defensive read
                title: r.title || (typeof r.teacher === 'object' && r.teacher && r.teacher.title) || '',
                permissions: r.permissions || [],
              });
              setAuthError(null);
            } else if (r.code === 'unauthorized') {
              setAuthError({ code: 'unauthorized', email: r.email }); setMe(null);
            } else if (r.code === 'token_expired' || r.code === 'invalid_token' || r.code === 'aud_mismatch' || r.code === 'iss_mismatch' || r.code === 'email_unverified') {
              sessionStorage.removeItem('idToken');
              auth.signOut();
            } else {
              setAuthError({ code: r.code || 'unknown' }); setMe(null);
            }
          })
          .catch((e) => { if (!aborted) setAuthError({ code: 'network', message: e.message }); });
        return () => { aborted = true; };
      }, [auth.idToken, auth.signOut]);

      if (!auth.idToken) {
        return (
          <div className="app">
            <LoginScreen containerRef={auth.containerRef}
              notice={auth.expired ? '로그인이 만료되었습니다. 다시 로그인해 주세요.' : null} />
          </div>
        );
      }
      if (authError && authError.code === 'unauthorized') {
        return <div className="app"><UnauthorizedScreen email={authError.email} onSignOut={auth.signOut} /></div>;
      }
      if (!me) {
        if (authError) {
          return (
            <div className="app">
              <div className="login">
                <h1>서버에 연결할 수 없어요</h1>
                <p>네트워크 또는 서버(GAS) 설정 문제일 수 있습니다.</p>
                <p style={{fontSize:12,color:'var(--label-alt)'}}>오류 코드: {authError.code}{authError.message ? ' · ' + authError.message : ''}</p>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn ghost" onClick={() => {
                    setAuthError(null);
                    const t = auth.idToken;
                    auth.signOut();
                    setTimeout(() => { sessionStorage.setItem('idToken', t); window.location.reload(); }, 50);
                  }}>다시 시도</button>
                  <button className="btn ghost" onClick={auth.signOut}>로그아웃</button>
                </div>
              </div>
            </div>
          );
        }
        return <div className="app"><div className="loading">로그인 확인 중…</div></div>;
      }

      return <Shell me={me} idToken={auth.idToken} onSignOut={auth.signOut} />;
    }

    // ──────────────── Shell ────────────────
    function Shell({ me, idToken, onSignOut }) {
      // Admin with no class (e.g. 김지헌 pastor) defaults to admin tab per spec §9
      const [tab, setTab] = useState(() =>
        (!me.teacher && me.permissions.includes('read_all')) ? 'admin' : 'roster'
      );
      const [date, setDate] = useState(recentSunday());
      const [detailId, setDetailId] = useState(null);
      const toast = useToast();
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem('theme') === 'dark' ? 'dark' : 'light'; } catch (e) { return 'light'; }
      });
      const toggleTheme = () => {
        const next = theme === 'dark' ? 'light' : 'dark';
        setTheme(next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
      };

      const TABS = useMemo(() => {
        const base = [['roster','출석'],['weekly','현황'],['prayer','기도제목']];
        const extra = [];
        if (me.permissions.includes('write_newcomer')) extra.push(['newcomers','새가족부']);
        if (me.permissions.includes('read_all')) extra.push(['admin','관리자']);
        return [...base, ...extra];
      }, [me.permissions]);

      // If current tab disappeared after permission change, reset
      const validTab = TABS.some(([k]) => k === tab) ? tab : 'roster';

      return (
        <div className="app">
          <div className="appbar">
            <div className="appbar-inner">
              <div className="appbar-title">
                <div className="sub">청소년부 · {roleLabel(me)}</div>
                <div className="main">{me.teacher ? me.teacher + ' 반' : me.email}</div>
              </div>
              <button className="icon-btn" onClick={toggleTheme}
                aria-label={theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'}
                title={theme === 'dark' ? '라이트 모드' : '다크 모드'}>
                {theme === 'dark' ? (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="2"/>
                    <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                  </svg>
                ) : (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </button>
              <button className="btn ghost" onClick={onSignOut} style={{height:36,fontSize:13}}>로그아웃</button>
            </div>
          </div>

          {(validTab === 'roster' || validTab === 'weekly') && (
            <WeekStepper sunday={date} onChange={setDate} />
          )}

          {validTab === 'roster'    && <RosterView    idToken={idToken} me={me} date={date} toast={toast} onOpenDetail={setDetailId} />}
          {validTab === 'weekly'    && <WeeklyView    idToken={idToken} toast={toast} me={me} date={date} />}
          {validTab === 'prayer'    && <PrayerView    idToken={idToken} toast={toast} />}
          {validTab === 'newcomers' && <NewcomersView idToken={idToken} toast={toast} />}
          {validTab === 'admin'     && <AdminView     idToken={idToken} toast={toast} me={me} />}

          <div className="bottomnav">
            {TABS.map(([k, label]) => (
              <button key={k} className={validTab === k ? 'active' : ''} onClick={() => setTab(k)}>{label}</button>
            ))}
          </div>

          {detailId && <StudentDetail idToken={idToken} studentId={detailId} onClose={() => setDetailId(null)} toast={toast} />}
          <Toast msg={toast.msg} />
        </div>
      );
    }

    // ──────────────── RosterView ────────────────
    function RosterView({ idToken, me, date, toast, onOpenDetail }) {
      const [students, setStudents] = useState(null);
      const [att, setAtt] = useState({});
      const [attRows, setAttRows] = useState([]); // raw rows for last-attended & streak
      const [loading, setLoading] = useState(true);
      const [pendingEtc, setPendingEtc] = useState(null); // { studentId?, status, bulk?, count? }
      const [bulkBusy, setBulkBusy] = useState(false);
      const [lastBulk, setLastBulk] = useState(null); // { label, snapshot:[{studentId, prevStatus}] } — 실행취소용
      const [attErr, setAttErr] = useState({}); // 'date|studentId' -> {status, etcText} — 개별 저장 실패 재시도용
      const [sortBy, setSortBy] = useState('name');    // 'name' | 'grade' | 'lastAtt'
      const [filterBy, setFilterBy] = useState('all'); // 'all' | 'unmarked' | 'streak'
      const [bulkOpen, setBulkOpen] = useState(false);

      // 실행취소 바는 20초 후 자동 닫힘
      useEffect(() => {
        if (!lastBulk) return;
        const t = setTimeout(() => setLastBulk(null), 20000);
        return () => clearTimeout(t);
      }, [lastBulk]);

      // 날짜를 바꾸면 실행취소 무효 — 다른 날짜에 복원되는 사고 방지
      useEffect(() => { setLastBulk(null); }, [date]);

      useEffect(() => {
        let aborted = false;
        setLoading(true);
        Promise.all([
          callApi('getRoster', { idToken }),
          callApi('getAttendance', { idToken, year: new Date().getFullYear() }),
        ]).then(([r, a]) => {
          if (aborted) return;
          if (!r.ok) { toast.show('명단 불러오기 실패'); setLoading(false); return; }
          if (!a.ok) toast.show('출석 기록 불러오기 실패');
          setStudents(r.students);
          const rows = (a.rows || []);
          setAttRows(rows);
          const map = {};
          rows.forEach((row) => { map[row.date + '|' + row.studentId] = row.status; });
          setAtt(map);
          setLoading(false);
        }).catch(() => { if (!aborted) { toast.show('네트워크 오류'); setLoading(false); } });
        return () => { aborted = true; };
      }, [idToken, toast.show]);

      // Common attendance write with optimistic update + rollback.
      // 실패 시 attErr에 기록해 재시도 칩(⟳)을 띄우고, 성공 시 해당 키의 오류를 지운다.
      const saveAttendance = (studentId, status, etcText) => {
        const key = date + '|' + studentId;
        let prev;
        setAtt((m) => { prev = m[key]; return { ...m, [key]: status }; });
        // 재시도/새 탭이 시작되면 기존 오류 칩을 즉시 지운다
        // (재시도 중 표시 + 이중 탭 방지). 실패하면 rollback이 다시 기록한다.
        const clearErr = () => setAttErr((e) => {
          if (!e[key]) return e;
          const next = { ...e }; delete next[key]; return next;
        });
        clearErr();
        const rollback = () => {
          let superseded = false;
          setAtt((m) => {
            if (m[key] !== status) { superseded = true; return m; }
            const next = { ...m };
            if (prev !== undefined) next[key] = prev; else delete next[key];
            return next;
          });
          // 이미 다른 저장이 덮어썼다면(stale 실패) 오류 칩을 띄우지 않는다.
          if (!superseded) setAttErr((e) => ({ ...e, [key]: { status, etcText } }));
        };
        callApi('setAttendance', { idToken, date, studentId, status, etcText })
          .then((r) => {
            if (r.ok) { clearErr(); }
            else { rollback(); toast.show('저장 실패: ' + (r.code || '') + ' — ⟳로 재시도하세요'); }
          })
          .catch(() => { rollback(); toast.show('네트워크 오류 — ⟳로 재시도하세요'); });
      };

      const setStatus = (studentId, status) => {
        // ETC/ABSENT use a mobile-friendly bottom sheet instead of window.prompt.
        if (status === 'ETC' || status === 'ABSENT') {
          const prev = att[date + '|' + studentId];
          setPendingEtc({ studentId, status, prevStatus: prev });
          return;
        }
        saveAttendance(studentId, status, '');
      };

      const handleEtcSave = (text) => {
        if (!pendingEtc) return;
        if (pendingEtc.bulk) applyBulk(pendingEtc.status, text || '', pendingEtc.targets || []);
        else saveAttendance(pendingEtc.studentId, pendingEtc.status, text || '');
        setPendingEtc(null);
      };
      const handleEtcCancel = () => setPendingEtc(null);

      // 일괄 출석: 전달받은 targets 배열에 적용.
      const applyBulk = (status, etcText, targets) => {
        if (targets.length === 0) return;
        const label = STATUS_OPTIONS.find(function(o){ return o.code === status; });
        const labelText = label ? label.label : status;
        setBulkBusy(true);
        // 실행취소용 스냅샷 — 적용 직전 상태 (etcText는 클라이언트에 없어 복원 제외)
        const snapshot = targets.map(function(s){
          return { studentId: s.id, prevStatus: att[date + '|' + s.id] || null };
        });
        const items = targets.map(function(s){ return { studentId: s.id, status: status, etcText: etcText || '' }; });
        const rollback = function(){
          setAtt(function(m){
            const next = { ...m };
            snapshot.forEach(function(x){
              if (x.prevStatus) next[date + '|' + x.studentId] = x.prevStatus;
              else delete next[date + '|' + x.studentId];
            });
            return next;
          });
        };
        // optimistic
        setAtt(function(m){
          const next = { ...m };
          targets.forEach(function(s){ next[date + '|' + s.id] = status; });
          return next;
        });
        callApi('setAttendanceBatch', { idToken, date, items })
          .then(function(r){
            setBulkBusy(false);
            if (r.ok) {
              toast.show((r.written || items.length) + '명 ' + labelText + ' 처리됨');
              setLastBulk({ label: labelText, snapshot: snapshot });
              // 일괄 저장이 성공한 학생의 묵은 개별 실패 칩(⟳)은 해소된 것이므로 지운다
              setAttErr(function(e){
                const next = { ...e };
                let changed = false;
                targets.forEach(function(s){
                  const k = date + '|' + s.id;
                  if (next[k]) { delete next[k]; changed = true; }
                });
                return changed ? next : e;
              });
            } else {
              rollback();
              toast.show('일괄 저장 실패: ' + (r.code || ''));
            }
          })
          .catch(function(){ setBulkBusy(false); rollback(); toast.show('네트워크 오류'); });
      };

      // 반의 최빈 예배부 (올해 기록 기준, 없으면 3부)
      const serviceFreq = {};
      attRows.forEach(function(r){
        if (PRESENT_CODES.indexOf(r.status) >= 0) serviceFreq[r.status] = (serviceFreq[r.status] || 0) + 1;
      });
      const defaultService = ['P3','P2','P4'].sort(function(a,b){
        return (serviceFreq[b]||0) - (serviceFreq[a]||0);
      })[0];
      const labelOf = function(code){
        const o = STATUS_OPTIONS.find(function(x){ return x.code === code; });
        return o ? o.label : code;
      };

      // 미체크 학생 전원에게 일괄 적용. 기타/결석은 사유 시트를 거친다.
      const bulkSetUnmarked = (status) => {
        const targets = (students || []).filter(function(s){ return !att[date + '|' + s.id]; });
        if (targets.length === 0) { toast.show('미체크 학생이 없습니다'); return; }
        if (status === 'ETC' || status === 'ABSENT') {
          setPendingEtc({ bulk: true, status: status, count: targets.length, targets: targets });
          return;
        }
        applyBulk(status, '', targets);
      };

      // 일괄 실행취소 — 이전 상태 복원. 기록이 없던 학생은 'NONE'으로 지움
      // (구버전 서버가 NONE을 거부하면 이전 기록이 있던 학생만 복원).
      const undoBulk = () => {
        if (!lastBulk || bulkBusy) return;
        const snap = lastBulk.snapshot;
        setLastBulk(null);
        setBulkBusy(true);
        const items = snap.map(function(x){
          return { studentId: x.studentId, status: x.prevStatus || 'NONE', etcText: '' };
        });
        const applyLocal = function(){
          setAtt(function(m){
            const next = { ...m };
            snap.forEach(function(x){
              if (x.prevStatus) next[date + '|' + x.studentId] = x.prevStatus;
              else delete next[date + '|' + x.studentId];
            });
            return next;
          });
        };
        callApi('setAttendanceBatch', { idToken, date, items })
          .then(function(r){
            if (r.ok) {
              applyLocal();
              setBulkBusy(false);
              toast.show('실행취소 완료 (' + items.length + '명)');
              return null;
            }
            if (r.code === 'bad_request') {
              // 구버전 서버: NONE 미지원 → 복원 가능한 학생만 재시도
              const restorable = snap
                .filter(function(x){ return x.prevStatus; })
                .map(function(x){ return { studentId: x.studentId, status: x.prevStatus, etcText: '' }; });
              const skipped = snap.length - restorable.length;
              if (restorable.length === 0) {
                setBulkBusy(false);
                toast.show('되돌릴 이전 기록이 없습니다 (GAS 업데이트 필요)');
                return null;
              }
              return callApi('setAttendanceBatch', { idToken, date, items: restorable })
                .then(function(r2){
                  setBulkBusy(false);
                  if (r2.ok) {
                    setAtt(function(m){
                      const next = { ...m };
                      restorable.forEach(function(it){ next[date + '|' + it.studentId] = it.status; });
                      return next;
                    });
                    toast.show(restorable.length + '명 복원' + (skipped > 0 ? ' · ' + skipped + '명은 GAS 업데이트 후 가능' : ''));
                  } else {
                    toast.show('실행취소 실패: ' + (r2.code || ''));
                  }
                });
            }
            setBulkBusy(false);
            toast.show('실행취소 실패: ' + (r.code || ''));
            return null;
          })
          .catch(function(){ setBulkBusy(false); toast.show('네트워크 오류'); });
      };

      if (loading) return <div className="loading">불러오는 중…</div>;
      if (!students || students.length === 0) return <div className="loading">학생이 없습니다.</div>;

      // ── M4/M5 계산: 학생별 마지막 출석일 + 최근 3주 연속 결석 ──
      // rowsByStudent[id] = 그 학생의 모든 row를 date desc 정렬
      const rowsByStudent = {};
      attRows.forEach(function(r){
        (rowsByStudent[r.studentId] = rowsByStudent[r.studentId] || []).push(r);
      });
      Object.keys(rowsByStudent).forEach(function(id){
        rowsByStudent[id].sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
      });

      function lastAttendedOf(id) {
        const rs = rowsByStudent[id] || [];
        for (let i = 0; i < rs.length; i++) {
          if (PRESENT_CODES.indexOf(rs[i].status) >= 0) return rs[i].date;
        }
        return null;
      }
      function isStreakAbsent(id) {
        const rs = rowsByStudent[id] || [];
        if (rs.length < 3) return false;
        return rs[0].status === 'ABSENT' && rs[1].status === 'ABSENT' && rs[2].status === 'ABSENT';
      }
      function daysSince(iso) {
        if (!iso) return null;
        const a = new Date(iso + 'T00:00:00');
        const b = new Date(todayISO() + 'T00:00:00');
        const diff = Math.round((b - a) / 86400000);
        return diff >= 0 ? diff : null;
      }
      function shortDate(iso) {
        if (!iso) return '';
        const parts = iso.split('-');
        return parts.length === 3 ? (parts[1] + '/' + parts[2]) : iso;
      }
      function gradeOrder(g) {
        // 중1<중2<중3<고1<고2<고3<기타
        const map = { '중1':1,'중2':2,'중3':3,'고1':4,'고2':5,'고3':6 };
        return map[g] || 99;
      }

      // 명단 렌더용 필터/정렬 결과. function 선언이라 위 핸들러들보다 뒤에 있어도 안전.
      function getVisibleStudents() {
        let v = (students || []).slice();
        if (filterBy === 'unmarked') {
          v = v.filter(function(s){ return !att[date + '|' + s.id]; });
        } else if (filterBy === 'streak') {
          v = v.filter(function(s){ return isStreakAbsent(s.id); });
        }
        if (sortBy === 'name') {
          v.sort(function(a,b){ return String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko'); });
        } else if (sortBy === 'grade') {
          v.sort(function(a,b){
            const d = gradeOrder(a['학년']) - gradeOrder(b['학년']);
            return d !== 0 ? d : String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko');
          });
        } else if (sortBy === 'lastAtt') {
          v.sort(function(a,b){
            const la = lastAttendedOf(a.id) || '';
            const lb = lastAttendedOf(b.id) || '';
            if (la === lb) return String(a['이름']||'').localeCompare(String(b['이름']||''), 'ko');
            return la < lb ? 1 : -1; // recent first
          });
        }
        return v;
      }
      const view = getVisibleStudents();

      // counts for filter chips
      const unmarkedCount = students.filter(function(s){ return !att[date + '|' + s.id]; }).length;
      const streakCount   = students.filter(function(s){ return isStreakAbsent(s.id); }).length;
      const statusCounts = {};
      students.forEach(function(s){
        const st = att[date + '|' + s.id];
        if (st) statusCounts[st] = (statusCounts[st] || 0) + 1;
      });

      return (
        <>
          {/* 탭하면 미체크 필터 토글 — streak 필터 중에도 미체크로 전환됨(의도) */}
          <div className="summary-bar"
            title="탭하면 미체크 학생만 보기/해제"
            onClick={() => setFilterBy(filterBy === 'unmarked' ? 'all' : 'unmarked')}>
            {STATUS_OPTIONS.map((opt) => statusCounts[opt.code] ? (
              <span key={opt.code} className={'sum-item ' + opt.code}>
                {opt.label} <b>{statusCounts[opt.code]}</b>
              </span>
            ) : null)}
            <span className={'sum-item unmarked' + (unmarkedCount === 0 ? ' done' : '')}>
              미체크 <b>{unmarkedCount}</b>
            </span>
          </div>
          {/* length 가드는 빈 명단 방어용 */}
          {unmarkedCount === 0 && students.length > 0 && (
            <div className="done-banner" aria-live="polite">출석 체크 완료! 🎉</div>
          )}
          {lastBulk && (
            <div className="undo-bar">
              <span>'{lastBulk.label}' 일괄 적용됨 ({lastBulk.snapshot.length}명)</span>
              <button className="btn ghost sm" onClick={undoBulk} disabled={bulkBusy}>실행취소</button>
            </div>
          )}
          <div className="filter-bar" role="toolbar" aria-label="명단 필터·정렬">
            <button className={'filter-chip' + (filterBy === 'all' ? ' active' : '')}
              onClick={() => setFilterBy('all')}>전체<span className="count">{students.length}</span></button>
            <button className={'filter-chip' + (filterBy === 'unmarked' ? ' active' : '')}
              onClick={() => setFilterBy('unmarked')}>미체크<span className="count">{unmarkedCount}</span></button>
            <button className={'filter-chip' + (filterBy === 'streak' ? ' active' : '')}
              onClick={() => setFilterBy('streak')}>⚠ 3주결석<span className="count">{streakCount}</span></button>
            <span className="filter-sep"></span>
            <button className={'filter-chip' + (sortBy === 'name' ? ' active' : '')}
              onClick={() => setSortBy('name')}>이름순</button>
            <button className={'filter-chip' + (sortBy === 'grade' ? ' active' : '')}
              onClick={() => setSortBy('grade')}>학년순</button>
            <button className={'filter-chip' + (sortBy === 'lastAtt' ? ' active' : '')}
              onClick={() => setSortBy('lastAtt')}>최근출석순</button>
          </div>
          {view.length === 0 && (
            <div className="loading" style={{padding:24}}>
              {filterBy === 'unmarked' ? '모두 체크되었습니다 🎉'
                : filterBy === 'streak' ? '3주 연속 결석한 학생이 없습니다 🎉'
                : '학생이 없습니다.'}
            </div>
          )}
          {view.map((s) => {
            const cur = att[date + '|' + s.id];
            const last = lastAttendedOf(s.id);
            const days = daysSince(last);
            const lastClass = days === null ? '' : (days <= 7 ? 'recent' : (days >= 21 ? 'stale' : ''));
            const streak = isStreakAbsent(s.id);
            return (
              <div className={'student-card compact' + (streak ? ' warn' : '')} key={s.id} data-status={cur || undefined}>
                <div className="student-info">
                  <button className="student-name" onClick={() => onOpenDetail(s.id)} style={{textAlign:'left'}}>
                    {s['이름']}
                    {streak && <span className="warn-badge" title="최근 3개 예배 모두 결석">⚠ 3주</span>}
                  </button>
                  <div className="student-meta">
                    {s['학년']} · {s['성별']}
                    {last ? (
                      <span className={'last-att ' + lastClass} title={'마지막 출석: ' + last}>
                        · {days === 0 ? '오늘' : (days + '일 전')}
                      </span>
                    ) : (
                      <span className="last-att stale" title="올해 출석 기록 없음">· 기록 없음</span>
                    )}
                  </div>
                </div>
                <div className="student-actions">
                  {attErr[date + '|' + s.id] && (
                    <button className="pill compact retry"
                      title="저장에 실패했습니다. 탭해서 재시도"
                      aria-label="저장 실패 — 재시도"
                      disabled={bulkBusy}
                      onClick={() => {
                        const e = attErr[date + '|' + s.id];
                        saveAttendance(s.id, e.status, e.etcText || '');
                      }}>⟳</button>
                  )}
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill compact ' + (cur === opt.code ? 'active ' + opt.code : '')}
                      disabled={bulkBusy}
                      onClick={() => setStatus(s.id, opt.code)}>{opt.label}</button>
                  ))}
                </div>
              </div>
            );
          })}
          {unmarkedCount > 0 && <div style={{height:140}} />}
          {unmarkedCount > 0 && (
            <div className="bulk-fab">
              {bulkOpen && (
                <div className="bulk-menu">
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code} disabled={bulkBusy}
                      onClick={() => { setBulkOpen(false); bulkSetUnmarked(opt.code); }}>
                      미체크 전원 {opt.label}
                    </button>
                  ))}
                </div>
              )}
              <button className="bulk-main" disabled={bulkBusy}
                onClick={() => { setBulkOpen(false); bulkSetUnmarked(defaultService); }}>
                미체크 {unmarkedCount}명 → {labelOf(defaultService)} 출석
              </button>
              <button className="bulk-more" disabled={bulkBusy} aria-label="다른 상태로 일괄 적용"
                aria-expanded={bulkOpen}
                onClick={() => setBulkOpen(!bulkOpen)}>▾</button>
            </div>
          )}
          {pendingEtc && (
            <EtcInputSheet status={pendingEtc.status}
              subtitle={pendingEtc.bulk ? '미체크 ' + pendingEtc.count + '명에게 일괄 적용됩니다' : null}
              onSave={handleEtcSave} onCancel={handleEtcCancel} />
          )}
        </>
      );
    }

    // Mobile-friendly bottom sheet for entering ETC (외부예배) or ABSENT 사유.
    // Replaces window.prompt for better keyboard handling on phones.
    function EtcInputSheet({ status, subtitle, onSave, onCancel }) {
      const [value, setValue] = useState('');
      const isEtc = status === 'ETC';
      const title = isEtc ? '외부 예배 입력' : '결석 사유 (선택)';
      const help = isEtc
        ? '다른 곳에서 예배드린 장소나 사유를 입력하세요. 예: 타 교회, 사경회, 수련회'
        : '결석 사유를 입력하세요. 비워두면 사유 없이 결석으로 기록됩니다.';
      const placeholder = isEtc ? '예: 타 교회, 사경회' : '예: 병원, 가족여행 (빈 칸도 OK)';

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onCancel]);

      return (
        <div className="sheet-overlay" role="dialog" aria-modal="true" onClick={onCancel}>
          <div className="sheet" onClick={(e)=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <div style={{padding:'4px 20px 20px'}}>
              <h3 style={{margin:'4px 0 6px',fontSize:17,fontWeight:600}}>{title}</h3>
              {subtitle && (
                <p style={{margin:'0 0 6px',fontSize:13,fontWeight:600,color:'var(--primary)'}}>{subtitle}</p>
              )}
              <p style={{margin:'0 0 12px',fontSize:12,color:'var(--label-alt)',lineHeight:1.45}}>{help}</p>
              <input type="text" autoFocus value={value}
                onChange={(e) => setValue(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') onSave(value); }}
                placeholder={placeholder}
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line-solid)',borderRadius:10,fontSize:15,fontFamily:'inherit',outline:'none'}} />
              <div style={{display:'flex',gap:8,marginTop:14}}>
                <button className="btn ghost" style={{flex:1}} onClick={onCancel}>취소</button>
                <button className="btn primary" style={{flex:2}} onClick={() => onSave(value)}>확인</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ──────────────── PrayerView ────────────────
    function PrayerView({ idToken, toast }) {
      const [prayers, setPrayers] = useState(null);
      const [students, setStudents] = useState([]);
      const [editing, setEditing] = useState(null);
      const [loading, setLoading] = useState(true);

      const reload = useCallback(() => {
        setLoading(true);
        Promise.all([callApi('getRoster', { idToken }), callApi('getPrayers', { idToken })])
          .then(([r, p]) => {
            if (r.ok) setStudents(r.students);
            if (p.ok) setPrayers(p.prayers);
            setLoading(false);
          })
          .catch(() => { toast.show('불러오기 실패'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      useEffect(() => {
        if (!editing) return;
        const onKey = (e) => { if (e.key === 'Escape') setEditing(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [editing]);

      const save = () => {
        if (!editing) return;
        callApi('setPrayer', { idToken, id: editing.id, studentId: editing.studentId, text: editing.text, active: true })
          .then((r) => {
            if (r.ok) { setEditing(null); reload(); toast.show('저장됨'); }
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      const remove = (p) => {
        if (!confirm('이 기도제목을 삭제할까요?')) return;
        callApi('setPrayer', { idToken, id: p.id, studentId: p.studentId, text: p.text, active: false })
          .then((r) => { if (r.ok) reload(); else toast.show('삭제 실패'); })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byStudent = {};
      (prayers || []).forEach((p) => { (byStudent[p.studentId] = byStudent[p.studentId] || []).push(p); });

      return (
        <>
          {students.map((s) => (
            <div key={s.id} style={{padding:'12px 16px',borderBottom:'1px solid var(--line-solid)'}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div className="student-name">{s['이름']}</div>
                <button className="btn ghost sm" aria-label={`${s['이름']} 기도제목 추가`} style={{marginLeft:'auto'}}
                  onClick={() => setEditing({ studentId: s.id, text: '' })}>＋</button>
              </div>
              {(byStudent[s.id] || []).map((p) => (
                <div key={p.id} style={{marginTop:8,padding:'10px 12px',background:'var(--fill-normal)',borderRadius:10,display:'flex',gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{whiteSpace:'pre-wrap'}}>{p.text}</div>
                    {p.createdAt && (
                      <div className="prayer-meta" title={p.createdAt}>
                        {relativeDate(p.createdAt)}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setEditing({ id: p.id, studentId: p.studentId, text: p.text })} style={{color:'var(--label-alt)'}}>수정</button>
                  <button onClick={() => remove(p)} style={{color:'var(--status-negative)'}}>삭제</button>
                </div>
              ))}
            </div>
          ))}
          {editing && (
            <div className="sheet-overlay" onClick={() => setEditing(null)}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <div className="sheet-handle" />
                <div className="sheet-header"><h3>기도제목</h3></div>
                <div className="sheet-body">
                  <textarea value={editing.text} onChange={(e) => setEditing({ ...editing, text: e.target.value })}
                    rows={4} style={{width:'100%',padding:10,border:'1.5px solid var(--line-solid)',borderRadius:10,font:'inherit'}} />
                </div>
                <div className="sheet-footer" style={{display:'flex',gap:8}}>
                  <button className="btn ghost" style={{flex:1}} onClick={() => setEditing(null)}>취소</button>
                  <button className="btn primary" style={{flex:1}} onClick={save}>저장</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // ──────────────── WeeklyView (현황: 주별 명단 + 통계) ────────────────
    function WeeklyView({ idToken, toast, me, date }) {
      const [seg, setSeg] = useState('week'); // 'week' | 'stats'
      const [data, setData] = useState(null);
      useEffect(() => {
        Promise.all([callApi('getRoster',{idToken}), callApi('getAttendance',{idToken, year: new Date().getFullYear()})])
          .then(([r,a]) => {
            if (r.ok && a.ok) setData({ students: r.students, rows: a.rows });
            else toast.show('불러오기 실패');
          })
          .catch(() => toast.show('네트워크 오류'));
      }, [idToken, toast.show]);
      if (!data) return <div className="loading">불러오는 중…</div>;

      const labelOf = function(code){
        const o = STATUS_OPTIONS.find(function(x){ return x.code === code; });
        return o ? o.label : code;
      };

      // 선택한 주일의 기록을 학생 기준으로 매핑
      const byId = {};
      data.rows.forEach(function(r){ if (r.date === date) byId[r.studentId] = r; });
      const groupOf = function(code){
        return data.students.filter(function(s){ return byId[s.id] && byId[s.id].status === code; });
      };
      const presentGroups = PRESENT_CODES
        .map(function(code){ return { code: code, students: groupOf(code) }; })
        .filter(function(g){ return g.students.length > 0; });
      const etcStudents = groupOf('ETC');
      const absentStudents = groupOf('ABSENT');
      const unmarked = data.students.filter(function(s){ return !byId[s.id]; });
      const presentTotal = presentGroups.reduce(function(a,g){ return a + g.students.length; }, 0) + etcStudents.length;

      const contactChips = function(s){
        const phone = String(s['연락처'] || '').replace(/[^0-9+]/g, '');
        if (!phone) return null;
        return (
          <span style={{display:'inline-flex',gap:6,marginLeft:8}}>
            <a href={'tel:' + phone} className="link-chip" aria-label="전화 걸기">📞</a>
            <a href={'sms:' + phone} className="link-chip" aria-label="문자 보내기">💬</a>
          </span>
        );
      };

      return (
        <>
          <div className="seg-bar">
            <button className={seg === 'week' ? 'active' : ''} onClick={() => setSeg('week')}>주별 명단</button>
            <button className={seg === 'stats' ? 'active' : ''} onClick={() => setSeg('stats')}>통계</button>
          </div>

          {seg === 'stats' && <StatsView idToken={idToken} toast={toast} />}

          {seg === 'week' && (
            <div className="weekly-body">
              <div className="weekly-group">
                <div className="weekly-head">✅ 출석 {presentTotal}</div>
                {presentGroups.map(function(g){
                  return (
                    <div key={g.code} className="weekly-line">
                      <span className={'sum-item ' + g.code}>{labelOf(g.code)}</span>
                      <span className="weekly-names">{g.students.map(function(s){ return s['이름']; }).join(', ')}</span>
                    </div>
                  );
                })}
                {etcStudents.map(function(s){
                  return (
                    <div key={s.id} className="weekly-line">
                      <span className="sum-item ETC">기타</span>
                      <span className="weekly-names">{s['이름']}{byId[s.id].etcText ? ' (' + byId[s.id].etcText + ')' : ''}</span>
                    </div>
                  );
                })}
                {presentTotal === 0 && <div className="weekly-empty">이 주일의 출석 기록이 없습니다</div>}
              </div>

              <div className="weekly-group">
                <div className="weekly-head">❌ 결석 {absentStudents.length}</div>
                {absentStudents.map(function(s){
                  return (
                    <div key={s.id} className="weekly-line">
                      <span className="weekly-names">
                        {s['이름']}{byId[s.id].etcText ? ' (' + byId[s.id].etcText + ')' : ''}
                      </span>
                      {contactChips(s)}
                    </div>
                  );
                })}
                {absentStudents.length === 0 && <div className="weekly-empty">결석한 학생이 없습니다 🎉</div>}
              </div>

              <div className="weekly-group">
                <div className="weekly-head">⬜ 미체크 {unmarked.length}</div>
                {unmarked.length > 0 && (
                  <div className="weekly-line">
                    <span className="weekly-names">{unmarked.map(function(s){ return s['이름']; }).join(', ')}</span>
                  </div>
                )}
              </div>
            </div>
          )}
        </>
      );
    }

    // ──────────────── StatsView ────────────────
    function StatsView({ idToken, toast }) {
      const [data, setData] = useState(null);
      const [sortBy, setSortBy] = useState('name'); // 'name' | 'pct_desc' | 'pct_asc'
      useEffect(() => {
        Promise.all([callApi('getRoster',{idToken}), callApi('getAttendance',{idToken, year: new Date().getFullYear()})])
          .then(([r,a]) => { if (r.ok && a.ok) setData({ students: r.students, rows: a.rows }); })
          .catch(() => toast.show('네트워크 오류'));
      }, [idToken, toast.show]);
      if (!data) return <div className="loading">불러오는 중…</div>;
      if (!data.students || data.students.length === 0) return <div className="loading">학생이 없습니다.</div>;
      const dates = Array.from(new Set(data.rows.map((r) => r.date)));
      if (dates.length === 0) return <div className="loading">올해 출석 기록이 아직 없습니다.</div>;

      // 학생별 출석률 계산
      const total = dates.length;
      const perStudent = data.students.map(function(s){
        const mine = data.rows.filter(function(r){ return r.studentId === s.id; });
        const present = mine.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
        const pct = total > 0 ? Math.round((present / total) * 100) : 0;
        return { s: s, present: present, pct: pct };
      });

      // 반 평균
      const avgPct = perStudent.length > 0
        ? Math.round(perStudent.reduce(function(acc, x){ return acc + x.pct; }, 0) / perStudent.length)
        : 0;
      const riskCount = perStudent.filter(function(x){ return x.pct < 50; }).length;
      const goodCount = perStudent.filter(function(x){ return x.pct >= 80; }).length;

      // 최근 주 출석률 (가장 최근 date 한 회의 P2/P3/P4 비율)
      const latestDate = dates.slice().sort().reverse()[0];
      const latestRows = data.rows.filter(function(r){ return r.date === latestDate; });
      const latestPresent = latestRows.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
      const latestPct = data.students.length > 0
        ? Math.round((latestPresent / data.students.length) * 100) : 0;

      // 정렬
      let view = perStudent.slice();
      if (sortBy === 'name') {
        view.sort(function(a,b){ return String(a.s['이름']||'').localeCompare(String(b.s['이름']||''),'ko'); });
      } else if (sortBy === 'pct_desc') {
        view.sort(function(a,b){ return b.pct - a.pct; });
      } else if (sortBy === 'pct_asc') {
        view.sort(function(a,b){ return a.pct - b.pct; });
      }

      return (
        <>
          {/* 반 요약 카드 */}
          <div className="stats-summary">

              <span className="sub">({total}회 예배 · 학생 {data.students.length}명)</span>

            <div className="stats-summary-meta">
              최근 예배({latestDate}): <strong>{latestPresent}/{data.students.length}명</strong> 출석 · {latestPct}%

    // ──────────────── StudentDetail ────────────────
    function StudentDetail({ idToken, studentId, onClose, toast }) {
      const [detail, setDetail] = useState(null);
      const [error, setError] = useState(null);
      useEffect(() => {
        let aborted = false;
        callApi('getStudentDetail', { idToken, studentId })
          .then((r) => {
            if (aborted) return;
            if (r.ok) setDetail(r.student);
            else { setError(r.code || 'unknown'); toast.show('불러오기 실패'); }
          })
          .catch(() => {
            if (aborted) return;
            setError('network'); toast.show('네트워크 오류');
          });
        return () => { aborted = true; };
      }, [idToken, studentId, toast.show]);

      const [extra, setExtra] = useState(null);
      useEffect(() => {
        let aborted = false;
        Promise.all([
          callApi('getAttendance', { idToken, year: new Date().getFullYear() }),
          callApi('getPrayers', { idToken })
        ]).then(([a, p]) => {
          if (aborted) return;
          setExtra({
            att: a.ok ? a.rows.filter((r) => String(r.studentId) === String(studentId))
                              .sort((x, y) => (x.date < y.date ? 1 : -1)).slice(0, 12) : [],
            prayers: p.ok ? (p.prayers || []).filter((x) => String(x.studentId) === String(studentId) && String(x.text || '').trim()) : []
          });
        }).catch(() => { if (!aborted) setExtra({ att: [], prayers: [] }); });
        return () => { aborted = true; };
      }, [idToken, studentId]);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            {error ? (
              <>
                <div className="sheet-header"><h3>불러올 수 없어요</h3></div>
                <div className="sheet-body">
                  <p style={{color:'var(--label-alt)'}}>네트워크나 권한 문제일 수 있어요.</p>
                </div>
                <div className="sheet-footer">
                  <button className="btn ghost" style={{width:'100%'}} onClick={onClose}>닫기</button>
                </div>
              </>
            ) : !detail ? <div className="loading" style={{padding:40}}>불러오는 중…</div> : (
              <>
                <div className="sheet-header"><h3>{detail['이름']}</h3></div>
                <div className="sheet-body">
                  {['학년','성별','생년월일','연락처','학교','초등학교','신급','부/모','부모님연락처','주소','비고']
                    .filter((k) => detail[k])
                    .map((k) => {
                      const v = detail[k];
                      let display = v;
                      // Phone numbers → tap to dial / text. Strip non-digit for href.
                      if ((k === '연락처' || k === '부모님연락처') && v) {
                        const cleaned = String(v).replace(/[^0-9+]/g, '');
                        display = (
                          <span style={{display:'inline-flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                            <span>{v}</span>
                            <a href={'tel:' + cleaned} className="link-chip" aria-label="전화 걸기">📞 전화</a>
                            <a href={'sms:' + cleaned} className="link-chip" aria-label="문자 보내기">💬 문자</a>
                          </span>
                        );
                      } else if (k === '주소' && v) {
                        const q = encodeURIComponent(String(v));
                        display = (
                          <span>
                            <span style={{marginRight:8}}>{v}</span>
                            <a href={'https://www.google.com/maps/search/?api=1&query=' + q}
                               target="_blank" rel="noopener noreferrer"
                               className="link-chip" aria-label="지도에서 보기">🗺 지도</a>
                          </span>
                        );
                      }
                      return (
                        <div key={k} style={{display:'flex',padding:'8px 0',borderBottom:'1px solid var(--fill-normal)'}}>
                          <div style={{width:90,color:'var(--label-alt)',fontSize:13,flexShrink:0}}>{k}</div>
                          <div style={{flex:1,fontSize:14,lineHeight:1.45}}>{display}</div>
                        </div>
                      );
                    })}
                  {extra && extra.prayers.length > 0 && (
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--label-alt)',marginBottom:6}}>🙏 기도제목</div>
                      {extra.prayers.map((p) => (
                        <div key={p.id} style={{fontSize:14,lineHeight:1.5,padding:'6px 0',whiteSpace:'pre-wrap',
                          borderBottom:'1px solid var(--fill-normal)'}}>{p.text}</div>
                      ))}
                    </div>
                  )}
                  {extra && extra.att.length > 0 && (
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--label-alt)',marginBottom:6}}>📅 올해 출석 (최근 12회)</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {extra.att.map((r) => {
                          const o = STATUS_OPTIONS.find((x) => x.code === r.status);
                          const [, mm, dd] = r.date.split('-');
                          const md = Number(mm) + '/' + Number(dd);
                          return (
                            <span key={r.date} className={'sum-item ' + r.status}
                              title={r.etcText || ''}>
                              {md} {o ? o.label : r.status}{r.etcText ? ' · ' + r.etcText : ''}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
                <div className="sheet-footer">
                  <button className="btn ghost" style={{width:'100%'}} onClick={onClose}>닫기</button>
                </div>
              </>
            )}

        </div>
      );
    }

    // ──────────────── NewcomersView ────────────────
    function NewcomersView({ idToken, toast }) {
      const [data, setData] = useState(null); // { students, progress }
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [graduateTarget, setGraduateTarget] = useState(null); // student object

      const reload = useCallback(() => {
        setLoading(true);
        callApi('getNewcomers', { idToken })
          .then((r) => {
            if (r.ok) setData({ students: r.students, progress: r.progress || {} });
            else toast.show('새가족 명단 불러오기 실패: ' + (r.code || ''));
            setLoading(false);
          })
          .catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      useEffect(reload, [reload]);

      const todayDate = todayISO();
      const [pendingEtc, setPendingEtc] = useState(null); // { studentId, status }

      const doSaveAttendance = (studentId, status, etcText) => {
        callApi('setAttendance', { idToken, date: todayDate, studentId, status, etcText: etcText || '' })
          .then((r) => {
            if (r.ok) reload();
            else toast.show('저장 실패: ' + (r.code || ''));
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      // 출석 탭과 동일한 바텀시트 입력 (H3 — window.prompt 제거, UI 일관성)
      const setAttendance = (studentId, status) => {
        if (status === 'ETC' || status === 'ABSENT') {
          setPendingEtc({ studentId, status });
          return;
        }
        doSaveAttendance(studentId, status, '');
      };

      const handleEtcSave = (text) => {
        if (!pendingEtc) return;
        doSaveAttendance(pendingEtc.studentId, pendingEtc.status, text || '');
        setPendingEtc(null);
      };

      const toggleProgress = (studentId, week, current) => {
        const completed = !current;
        callApi('setNewcomerProgress', { idToken, studentId, week, completed })
          .then((r) => {
            if (r.ok) reload();
            else toast.show('진도 저장 실패');
          })
          .catch(() => toast.show('네트워크 오류'));
      };

      if (loading) return <div className="loading">불러오는 중…</div>;

      const students = (data && data.students) || [];
      const progress = (data && data.progress) || {};
      // progress keyed by studentId → { '1주': bool, '2주': bool, '3주': bool, '4주': bool }

      return (
        <>
          <div style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:14,color:'var(--label-alt)'}}>{students.length}명의 새가족</div>
            <button className="btn primary sm" onClick={() => setShowForm(true)}>＋ 새가족 추가</button>
          </div>

          {students.length === 0 && <div className="loading">새가족이 없습니다.</div>}

          {students.map((s) => {
            const prog = progress[s.id] || {};
            // today's attendance
            const todayAtt = s.todayStatus || null;
            return (
              <div className="newcomer-card" key={s.id} data-status={todayAtt || undefined}>
                <div className="newcomer-card-top">
                  <div style={{flex:1}}>
                    <div className="student-name">{s['이름']}</div>
                    <div className="student-meta">{s['학년']} · {s['성별']}</div>
                  </div>
                  <button className="btn danger sm" onClick={() => setGraduateTarget(s)}>등반</button>
                </div>
                <div className="newcomer-card-bottom">
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>출석</div>
                  {STATUS_OPTIONS.map((opt) => (
                    <button key={opt.code}
                      className={'pill ' + (todayAtt === opt.code ? 'active ' + opt.code : '')}
                      style={{fontSize:11,padding:'4px 8px'}}
                      onClick={() => setAttendance(s.id, opt.code)}>{opt.label}</button>
                  ))}
                </div>
                <div className="newcomer-card-bottom" style={{borderTop:'none',paddingTop:0}}>
                  <div style={{fontSize:11,color:'var(--label-alt)',fontWeight:600,marginRight:4}}>교육</div>
                  {[1,2,3,4].map((w) => {
                    const key = `${w}주`;
                    const checked = !!prog[key];
                    return (
                      <button key={w}
                        className={'check-pill' + (checked ? ' checked' : '')}
                        onClick={() => toggleProgress(s.id, w, checked)}>
                        <span className="check-icon">{checked ? '✓' : '○'}</span>
                        {w}주
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {showForm && (
            <NewcomerForm
              idToken={idToken}
              toast={toast}
              onClose={() => setShowForm(false)}
              onSuccess={() => { setShowForm(false); reload(); }}
            />
          )}

          {graduateTarget && (
            <GraduateDialog
              idToken={idToken}
              toast={toast}
              student={graduateTarget}
              onClose={() => setGraduateTarget(null)}
              onSuccess={() => { setGraduateTarget(null); reload(); }}
            />
          )}

          {pendingEtc && (
            <EtcInputSheet status={pendingEtc.status}
              onSave={handleEtcSave} onCancel={() => setPendingEtc(null)} />
          )}
        </>
      );
    }

    // ──────────────── AdminView ────────────────
    // 관리자 통계: 전체 요약 + 주별 추이 + 반별 + 학년별 (올해 고정, 클라이언트 집계)
    function AdminStats({ byClass, attRows }) {
      const classNames = Object.keys(byClass);
      const allStudents = classNames.reduce(function(acc, c){ return acc.concat(byClass[c] || []); }, []);
      const dates = Array.from(new Set(attRows.map(function(r){ return r.date; }))).sort();
      const totalDates = dates.length;

      if (allStudents.length === 0) return <div className="loading">학생이 없습니다.</div>;
      if (totalDates === 0) return <div className="loading">올해 출석 기록이 아직 없습니다.</div>;

      const presentRows = attRows.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; });

      // 전체 요약
      const overallTotal = allStudents.length * totalDates;
      const overallPct = Math.min(100, Math.round((presentRows.length / overallTotal) * 100));
      const latestDate = dates[dates.length - 1];
      const latestPresent = presentRows.filter(function(r){ return r.date === latestDate; }).length;
      const latestPct = Math.min(100, Math.round((latestPresent / allStudents.length) * 100));

      // 주별 추이 (최근 12주)
      const trendDates = dates.slice(-12);
      const trendMax = Math.max.apply(null, trendDates.map(function(d){
        return presentRows.filter(function(r){ return r.date === d; }).length;
      }).concat([1]));

      // 반별: 기록 당시의 반(row.teacher) 기준. 분모는 현재 인원 × 예배 횟수 (스펙 §6, 100% 캡).
      const classGroups = classNames
        .map(function(cls){
          const students = byClass[cls] || [];
          if (students.length === 0) return null;
          const present = presentRows.filter(function(r){ return r.teacher === cls; }).length;
          const total = students.length * totalDates;
          return { name: cls, count: students.length, present: present, total: total,
                   pct: total > 0 ? Math.min(100, Math.round((present / total) * 100)) : 0 };
        })
        .filter(Boolean)
        .sort(function(a,b){ return a.name.localeCompare(b.name, 'ko'); });

      // 학년별: 현재 명단의 학년 기준 (출석 기록엔 학년 없음). 빈 학년 → '기타'.
      const GRADE_ORDER = ['중1','중2','중3','고1','고2','고3'];
      const gradeOf = {};
      allStudents.forEach(function(s){
        gradeOf[String(s.id)] = String(s['학년'] || '').trim() || '기타';
      });
      const gradeNames = Array.from(new Set(Object.keys(gradeOf).map(function(id){ return gradeOf[id]; })));
      gradeNames.sort(function(a,b){
        const ia = GRADE_ORDER.indexOf(a), ib = GRADE_ORDER.indexOf(b);
        return (ia < 0 ? GRADE_ORDER.length : ia) - (ib < 0 ? GRADE_ORDER.length : ib);
      });
      const gradeGroups = gradeNames.map(function(g){
        const members = allStudents.filter(function(s){ return gradeOf[String(s.id)] === g; });
        const memberIds = {};
        members.forEach(function(s){ memberIds[String(s.id)] = true; });
        const present = presentRows.filter(function(r){ return memberIds[String(r.studentId)]; }).length;
        const total = members.length * totalDates;
        return { name: g, count: members.length, present: present, total: total,
                 pct: total > 0 ? Math.min(100, Math.round((present / total) * 100)) : 0 };
      });

      return (
        <>
          <div className="stats-summary">
            <div className="stats-summary-title">올해 전체 평균 출석률</div>
            <div className="stats-summary-row">
              <span className="big">{overallPct}%</span>
              <span className="sub">({totalDates}회 예배 · 학생 {allStudents.length}명)</span>
            </div>
            <div className="stats-summary-meta">
              최근 예배({latestDate}): <strong>{latestPresent}/{allStudents.length}명</strong> 출석 · {latestPct}%
            </div>
          </div>

          <div className="admin-section">
            <h4>주별 출석 추이 (최근 {trendDates.length}주)</h4>
            <div className="trend-chart">
              {trendDates.map(function(d){
                const n = presentRows.filter(function(r){ return r.date === d; }).length;
                return (
                  <div key={d} className="trend-col" title={d + ' · ' + n + '명'}>
                    <span className="trend-num">{n}</span>
                    <div className="trend-fill" style={{height: Math.max(4, Math.round((n / trendMax) * 60)) + 'px'}}></div>
                    <span className="trend-date">{Number(d.slice(5,7)) + '/' + Number(d.slice(8,10))}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <GroupStatSection title="반별 통계" groups={classGroups} />
          <GroupStatSection title="학년별 통계" groups={gradeGroups} />
        </>
      );
    }

    // 그룹(반/학년) 통계 공용 렌더러. groups: [{name, count, present, total, pct}]
    function GroupStatSection({ title, groups }) {
      return (
        <div className="admin-section">
          <h4>{title}</h4>
          {groups.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>데이터가 없습니다.</div>}
          {groups.map(function(g){
            return (
              <div key={g.name} className="stat-bar-card">
                <div className="stat-bar-head">
                  <span className="stat-bar-name">{g.name} <span style={{fontWeight:400,color:'var(--label-alt)'}}>({g.count}명)</span></span>
                  <span className="stat-bar-pct">{g.pct}%</span>
                </div>
                <div className="stat-bar-track">
                  <div className="stat-bar-fill" style={{width: Math.max(2, g.pct) + '%'}}></div>
                </div>
                <div className="stat-bar-meta">{g.present} / {g.total}회 출석</div>
              </div>
            );
          })}
        </div>
      );
    }
    // 관리자: 새가족 출석 현황 + 등반 교육 진행(읽기 전용) + 올해 등반 완료자
    function AdminNewcomerStatus({ attRows, newcomers }) {
      const year = String(new Date().getFullYear());
      const ncStudents = (newcomers && newcomers.students) || [];
      const dates = Array.from(new Set(attRows.map(function(r){ return r.date; }))).sort();
      const totalDates = dates.length;

      // 올해 등반 완료자 (graduates 없는 구 GAS 응답과 하위호환)
      const hasGradApi = !!(newcomers && newcomers.graduates);
      const gradsThisYear = ((newcomers && newcomers.graduates) || [])
        .filter(function(g){ return String(g.graduatedOn || '').slice(0, 4) === year; })
        .sort(function(a,b){ return String(b.graduatedOn).localeCompare(String(a.graduatedOn)); });

      const WEEKS = [1, 2, 3, 4];

      return (
        <>
          <div className="admin-section">
            <h4>새가족 출석 현황 (올해 {totalDates}회)</h4>
            {ncStudents.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>현재 새가족 학생이 없습니다.</div>}
            {ncStudents.map(function(s){
              const mine = attRows.filter(function(r){ return String(r.studentId) === String(s.id); });
              const present = mine.filter(function(r){ return PRESENT_CODES.indexOf(r.status) >= 0; }).length;
              const pct = totalDates > 0 ? Math.min(100, Math.round((present / totalDates) * 100)) : 0;
              return (
                <div key={s.id} className="stat-bar-card">
                  <div className="stat-bar-head">
                    <span className="stat-bar-name">{s['이름']}</span>
                    <span className="stat-bar-pct">{pct}%</span>
                  </div>
                  <div className="stat-bar-track">
                    <div className="stat-bar-fill" style={{width: Math.max(2, pct) + '%'}}></div>
                  </div>
                  <div className="stat-bar-meta">{present} / {totalDates}회 출석 · {s['학년']}</div>
                </div>
              );
            })}
          </div>

          <div className="admin-section">
            <h4>등반 교육 진행 <span style={{fontWeight:400,fontSize:12,color:'var(--label-alt)'}}>(수정은 새가족 탭에서)</span></h4>
            {ncStudents.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>진행 중인 학생이 없습니다.</div>}
            {ncStudents.map(function(s){
              const pr = s.progress || {};
              return (
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--fill-normal)'}}>
                  <span style={{flex:1,fontSize:14,fontWeight:500}}>{s['이름']}</span>
                  {WEEKS.map(function(w){
                    const done = !!pr['week' + w];
                    return (
                      <span key={w} className={'grad-week' + (done ? ' done' : '')}
                        title={done ? (pr['week' + w + 'Date'] || '') : ''}>
                        {w}주{done ? ' ✓' : ''}
                      </span>
                    );
                  })}
                </div>
              );
            })}
          </div>

          <div className="admin-section">
            <h4>올해 등반 완료 ({gradsThisYear.length}명)</h4>
            {!hasGradApi && <div style={{fontSize:14,color:'var(--label-alt)'}}>등반 명단은 GAS 재배포 후 표시됩니다.</div>}
            {hasGradApi && gradsThisYear.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>올해 등반 완료자가 없습니다.</div>}
            {gradsThisYear.map(function(g){
              return (
                <div key={g.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--fill-normal)',fontSize:14}}>
                  <span style={{flex:1,fontWeight:500}}>{g['이름'] || ('학생 ' + g.id)}
                    {g['학년'] ? <span style={{fontWeight:400,color:'var(--label-alt)',marginLeft:6,fontSize:12}}>{g['학년']}</span> : null}
                  </span>
                  <span style={{color:'var(--label-alt)',fontSize:13}}>{g.graduatedOn}</span>
                  <span className="sum-item" style={{fontSize:12}}>{g.graduatedTo} 반</span>
                </div>
              );
            })}
          </div>
        </>
      );
    }

    // 관리자: 명단 + 기도제목 (v1.2의 AdminView 내용 이동, 출석 합계 섹션은 통계 세그먼트로 대체되어 삭제)
    function AdminRosterPrayers({ byClass, allPrayers, classFilter, setClassFilter }) {
      const classNames = Object.keys(byClass).sort();
      const displayClasses = classFilter ? [classFilter] : classNames;
      const prayerList = (allPrayers && allPrayers.prayers) || [];
      const studentClass = {};
      classNames.forEach((cls) => {
        (byClass[cls] || []).forEach((s) => { studentClass[s.id] = cls; });
      });
      return (
        <>
          <div style={{padding:'12px 16px'}}>
            <label style={{fontSize:13,fontWeight:600,color:'var(--label-alt)',display:'block',marginBottom:6}}>반 선택</label>
            <select className="form-select" value={classFilter} onChange={(e) => setClassFilter(e.target.value)}>
              <option value="">전체 반</option>
              {classNames.map((c) => <option key={c} value={c}>{c} 반</option>)}
            </select>
          </div>
          <div className="admin-section">
            <h4>학생 명단</h4>
            {displayClasses.map((cls) => {
              const students = byClass[cls] || [];
              return (
                <div key={cls} style={{marginBottom:12}}>
                  <div className="class-group-head">{cls} 반</div>
                  {students.map((s) => (
                    <div key={s.id} style={{fontSize:14,padding:'4px 0',borderBottom:'1px solid var(--fill-normal)',display:'flex',gap:8}}>
                      <span style={{flex:1,fontWeight:500}}>{s['이름']}</span>
                      <span style={{color:'var(--label-alt)',fontSize:12}}>{s['학년']} · {s['성별']}</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          <div className="admin-section">
            <h4>기도제목</h4>
            {displayClasses.map((cls) => {
              const clsPrayers = prayerList.filter((p) => studentClass[p.studentId] === cls);
              if (clsPrayers.length === 0) return null;
              return (
                <div key={cls} style={{marginBottom:12}}>
                  <div className="class-group-head">{cls} 반</div>
                  {clsPrayers.map((p) => (
                    <div key={p.id} style={{padding:'6px 0',borderBottom:'1px solid var(--fill-normal)',fontSize:14}}>
                      <span style={{fontWeight:500}}>{p.studentName || p.studentId}</span>
                      <span style={{color:'var(--label-alt)',marginLeft:8}}>— {p.text}</span>
                    </div>
                  ))}
                </div>
              );
            })}
            {prayerList.length === 0 && <div style={{fontSize:14,color:'var(--label-alt)'}}>기도제목이 없습니다.</div>}
          </div>
        </>
      );
    }

    function AdminView({ idToken, toast, me }) {
      const [seg, setSeg] = useState('stats'); // 'stats' | 'newcomer' | 'roster'
      const [classFilter, setClassFilter] = useState(''); // '' = all (명단·기도 세그먼트용)
      const [rosters, setRosters] = useState(null);
      const [allAtt, setAllAtt] = useState(null);
      const [allPrayers, setAllPrayers] = useState(null);
      const [newcomers, setNewcomers] = useState(null); // {students, graduates?}
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        const year = new Date().getFullYear();
        Promise.all([
          callApi('getAllRosters', { idToken }),
          callApi('getAllAttendance', { idToken, year }),
          callApi('getAllPrayers', { idToken }),
          callApi('getNewcomers', { idToken }),
        ]).then(([r, a, p, n]) => {
          if (r.ok) setRosters(r);
          else toast.show('명단 불러오기 실패');
          if (a.ok) setAllAtt(a);
          if (p.ok) setAllPrayers(p);
          if (n.ok) setNewcomers(n);
          setLoading(false);
        }).catch(() => { toast.show('네트워크 오류'); setLoading(false); });
      }, [idToken, toast.show]);

      if (loading) return <div className="loading">불러오는 중…</div>;

      const byClass = (rosters && rosters.byClass) || {};
      const attRows = (allAtt && allAtt.rows) || [];

      return (
        <>
          <div className="seg-bar">
            <button className={seg === 'stats' ? 'active' : ''} onClick={() => setSeg('stats')}>통계</button>
            <button className={seg === 'newcomer' ? 'active' : ''} onClick={() => setSeg('newcomer')}>새가족·등반</button>
            <button className={seg === 'roster' ? 'active' : ''} onClick={() => setSeg('roster')}>명단·기도</button>
          </div>
          {seg === 'stats' && <AdminStats byClass={byClass} attRows={attRows} />}
          {seg === 'newcomer' && <AdminNewcomerStatus attRows={attRows} newcomers={newcomers} />}
          {seg === 'roster' && (
            <AdminRosterPrayers byClass={byClass} allPrayers={allPrayers}
              classFilter={classFilter} setClassFilter={setClassFilter} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0066FF">
  <title>혜림교회 청소년부 출석부</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="청소년부 출석">
  <script>
    // 첫 페인트 전에 저장된 테마 적용 (FOUC 방지)
    try { if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js" crossorigin></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <style>
    /* ============================================================
       Montage Design System (WDS) — 혜림교회 청소년부 출석부 적용
       tokens(montage-tokens.css) + components(montage-app.css) inline
       + legacy var alias (JSX inline style 호환) + UX Medium 5 커스텀
       ============================================================ */

    /* ── Montage atomic + semantic + type + space + radius + shadow tokens ── */
    :root {
      /* Common */
      --atomic-common-0: #000000; --atomic-common-100: #ffffff;

      /* Cool Neutral */
      --atomic-coolNeutral-5: #0F0F10; --atomic-coolNeutral-7: #141415; --atomic-coolNeutral-10: #171719;
      --atomic-coolNeutral-15: #1B1C1E; --atomic-coolNeutral-17: #212225; --atomic-coolNeutral-20: #292A2D;
      --atomic-coolNeutral-22: #2E2F33; --atomic-coolNeutral-23: #333438; --atomic-coolNeutral-25: #37383C;
      --atomic-coolNeutral-30: #46474C; --atomic-coolNeutral-40: #5A5C63; --atomic-coolNeutral-50: #70737C;
      --atomic-coolNeutral-60: #878A93; --atomic-coolNeutral-70: #989BA2; --atomic-coolNeutral-80: #AEB0B6;
      --atomic-coolNeutral-90: #C2C4C8; --atomic-coolNeutral-95: #DBDCDF; --atomic-coolNeutral-96: #E1E2E4;
      --atomic-coolNeutral-97: #EAEBEC; --atomic-coolNeutral-98: #F4F4F5; --atomic-coolNeutral-99: #F7F7F8;

      /* Blue — brand */
      --atomic-blue-10:#001536; --atomic-blue-20:#002966; --atomic-blue-30:#003E9C; --atomic-blue-40:#0054D1;
      --atomic-blue-45:#005EEB; --atomic-blue-50:#0066FF; --atomic-blue-55:#1A75FF; --atomic-blue-60:#3385FF;
      --atomic-blue-65:#4F95FF; --atomic-blue-70:#69A5FF; --atomic-blue-80:#9EC5FF; --atomic-blue-90:#C9DEFE;
      --atomic-blue-95:#EAF2FE; --atomic-blue-99:#F7FBFF;

      /* Status atomics */
      --atomic-red-10:#3B0101; --atomic-red-40:#E52222; --atomic-red-50:#FF4242; --atomic-red-60:#FF6363;
      --atomic-red-90:#FED5D5; --atomic-red-95:#FEECEC;
      --atomic-green-10:#00240C; --atomic-green-40:#009632; --atomic-green-50:#00BF40; --atomic-green-60:#1ED45A;
      --atomic-green-90:#ACFCC7; --atomic-green-95:#D9FFE6;
      --atomic-orange-10:#361E00; --atomic-orange-39:#D17600; --atomic-orange-50:#FF9200; --atomic-orange-60:#FFA938;
      --atomic-orange-90:#FEE6C6; --atomic-orange-95:#FEF4E6;

      /* Accent palette */
      --atomic-redOrange-48:#F55A00; --atomic-redOrange-50:#FF5E00; --atomic-redOrange-60:#FF7B2E;
      --atomic-lime-37:#429E00; --atomic-lime-50:#58CF04; --atomic-lime-60:#6BE016;
      --atomic-cyan-40:#0098B2; --atomic-cyan-50:#00BDDE; --atomic-cyan-60:#28D0ED;
      --atomic-lightBlue-40:#008DCF; --atomic-lightBlue-50:#00AEFF; --atomic-lightBlue-60:#3DC2FF;
      --atomic-violet-45:#5B37ED; --atomic-violet-50:#6541F2; --atomic-violet-60:#7D5EF7; --atomic-violet-70:#9E86FC;
      --atomic-purple-40:#AD36E3; --atomic-purple-50:#CB59FF; --atomic-purple-60:#D478FF;
      --atomic-pink-46:#E846CD; --atomic-pink-50:#F553DA; --atomic-pink-60:#FA73E3;

      /* Semantic — Light */
      --semantic-static-white:#ffffff; --semantic-static-black:#000000;
      --semantic-primary-normal:#0066FF; --semantic-primary-strong:#005EEB; --semantic-primary-heavy:#0054D1;
      --semantic-label-normal:#171719; --semantic-label-strong:#000000;
      --semantic-label-neutral:rgba(46,47,51,0.88); --semantic-label-alternative:rgba(55,56,60,0.61);
      --semantic-label-assistive:rgba(55,56,60,0.28); --semantic-label-disable:rgba(55,56,60,0.16);
      --semantic-background-normal-normal:#ffffff; --semantic-background-normal-alternative:#F7F7F8;
      --semantic-background-elevated-normal:#ffffff; --semantic-background-elevated-alternative:#F7F7F8;
      --semantic-background-transparent-normal:rgba(255,255,255,0.08);
      --semantic-background-transparent-alternative:rgba(255,255,255,0.28);
      --semantic-interaction-inactive:#989BA2; --semantic-interaction-disable:#F4F4F5;
      --semantic-line-normal-normal:rgba(112,115,124,0.22);
      --semantic-line-normal-neutral:rgba(112,115,124,0.16);
      --semantic-line-normal-alternative:rgba(112,115,124,0.08);
      --semantic-line-solid-normal:#E1E2E4; --semantic-line-solid-neutral:#EAEBEC; --semantic-line-solid-alternative:#F4F4F5;
      --semantic-status-positive:#00BF40; --semantic-status-cautionary:#FF9200; --semantic-status-negative:#FF4242;
      --semantic-accent-bg-redOrange:#FF5E00; --semantic-accent-bg-lime:#58CF04; --semantic-accent-bg-cyan:#00BDDE;
      --semantic-accent-bg-lightBlue:#00AEFF; --semantic-accent-bg-violet:#6541F2;
      --semantic-accent-bg-purple:#CB59FF; --semantic-accent-bg-pink:#F553DA;
      --semantic-accent-fg-red:#E52222; --semantic-accent-fg-redOrange:#F55A00; --semantic-accent-fg-orange:#D17600;
      --semantic-accent-fg-lime:#429E00; --semantic-accent-fg-green:#009632; --semantic-accent-fg-cyan:#0098B2;
      --semantic-accent-fg-lightBlue:#008DCF; --semantic-accent-fg-blue:#005EEB; --semantic-accent-fg-violet:#5B37ED;
      --semantic-accent-fg-purple:#AD36E3; --semantic-accent-fg-pink:#E846CD;
      --semantic-inverse-primary:#3385FF; --semantic-inverse-background:#1B1C1E; --semantic-inverse-label:#F7F7F8;
      --semantic-fill-normal:rgba(112,115,124,0.08); --semantic-fill-strong:rgba(112,115,124,0.16);
      --semantic-fill-alternative:rgba(112,115,124,0.05);
      --semantic-material-dimmer:rgba(23,23,25,0.52);

      /* Shadows */
      --shadow-xsmall:0px 1px 2px -1px rgba(23,23,23,0.10);
      --shadow-small:0px 2px 4px -2px rgba(23,23,23,0.06), 0px 4px 6px -1px rgba(23,23,23,0.06);
      --shadow-medium:0px 4px 6px -2px rgba(23,23,23,0.07), 0px 10px 15px -3px rgba(23,23,23,0.07);
      --shadow-large:0px 6px 10px -4px rgba(23,23,23,0.08), 0px 16px 24px -6px rgba(23,23,23,0.08);
      --shadow-xlarge:0px 10px 15px -5px rgba(23,23,23,0.10), 0px 24px 38px -10px rgba(23,23,23,0.12);
      --shadow-spread-small:0px 0px 60px 0px rgba(23,23,23,0.10);
      --shadow-spread-medium:0px 15px 75px 0px rgba(23,23,23,0.16);

      /* Spacing */
      --space-0:0px; --space-0-5:0.5px; --space-1:1px; --space-2:2px; --space-4:4px;
      --space-6:6px; --space-8:8px; --space-10:10px; --space-12:12px; --space-14:14px;
      --space-16:16px; --space-20:20px; --space-24:24px; --space-32:32px; --space-40:40px;
      --space-48:48px; --space-56:56px; --space-64:64px; --space-72:72px; --space-80:80px;

      /* Radii */
      --radius-sm:8px; --radius-md:10px; --radius-lg:12px; --radius-xl:16px; --radius-2xl:20px; --radius-pill:9999px;

      /* Type — Pretendard ramp + tracking */
      --font-family-base:"Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      --font-family-mono:"JetBrains Mono", "D2Coding", Menlo, Consolas, monospace;
      --type-title1-size:2rem;       --type-title1-line:2.75rem;   --type-title1-tracking:-0.0253em;
      --type-title3-size:1.5rem;     --type-title3-line:2rem;      --type-title3-tracking:-0.023em;
      --type-heading1-size:1.375rem; --type-heading1-line:1.875rem;--type-heading1-tracking:-0.0194em;
      --type-heading2-size:1.25rem;  --type-heading2-line:1.75rem; --type-heading2-tracking:-0.012em;
      --type-headline1-size:1.125rem;--type-headline1-line:1.625rem;--type-headline1-tracking:-0.002em;
      --type-headline2-size:1.0625rem;--type-headline2-line:1.5rem;--type-headline2-tracking:0em;
      --type-body1-size:1rem;        --type-body1-line:1.5rem;     --type-body1-tracking:0.0057em;
      --type-body2-size:0.9375rem;   --type-body2-line:1.375rem;   --type-body2-tracking:0.0096em;
      --type-label1-size:0.875rem;   --type-label1-line:1.25rem;   --type-label1-tracking:0.0145em;
      --type-label2-size:0.8125rem;  --type-label2-line:1.125rem;  --type-label2-tracking:0.0194em;
      --type-caption1-size:0.75rem;  --type-caption1-line:1rem;    --type-caption1-tracking:0.0252em;
      --type-caption2-size:0.6875rem;--type-caption2-line:0.875rem;--type-caption2-tracking:0.0311em;

      /* Weights */
      --weight-regular:400; --weight-medium:500; --weight-bold-display:700; --weight-bold-text:600;

      /* ── 출석 5상태 액센트 매핑 (도메인 → atomic) — 이 5개만 바꾸면 전부 따라옴 ── */
      --att-p2:        var(--atomic-green-50);
      --att-p3:        var(--atomic-blue-50);
      --att-p4:        var(--atomic-violet-50);
      --att-etc:       var(--atomic-orange-50);
      --att-absent:    var(--atomic-red-50);
      --att-p2-fg:     var(--semantic-accent-fg-green);
      --att-p3-fg:     var(--semantic-accent-fg-blue);
      --att-p4-fg:     var(--semantic-accent-fg-violet);
      --att-etc-fg:    var(--semantic-accent-fg-orange);
      --att-absent-fg: var(--semantic-accent-fg-red);

      /* ── Legacy 변수 alias (JSX inline style 호환용 — 절대 제거 금지) ── */
      --primary:        var(--semantic-primary-normal);
      --primary-strong: var(--semantic-primary-strong);
      --bg:             var(--semantic-background-normal-normal);
      --bg-alt:         var(--semantic-background-normal-alternative);
      --label-normal:   var(--semantic-label-normal);
      --label-alt:      var(--semantic-label-alternative);
      --line-solid:     var(--semantic-line-solid-normal);
      --fill-normal:    var(--semantic-fill-normal);
      --status-positive:   var(--semantic-status-positive);
      --status-cautionary: var(--semantic-status-cautionary);
      --status-negative:   var(--semantic-status-negative);
      --status-violet:     var(--atomic-violet-50);
      --font-base:         var(--font-family-base);

      /* 앱 셸 */
      --app-max: 460px;
      --appbar-h: 56px;
    }

    /* ── Dark theme (선택) — <html data-theme="dark"> ── */
    [data-theme="dark"]{
      --semantic-primary-normal:#3385FF; --semantic-primary-strong:#1A75FF; --semantic-primary-heavy:#0066FF;
      --semantic-label-normal:#F7F7F8; --semantic-label-strong:#ffffff;
      --semantic-label-neutral:rgba(194,196,200,0.88); --semantic-label-alternative:rgba(174,176,182,0.61);
      --semantic-label-assistive:rgba(174,176,182,0.28); --semantic-label-disable:rgba(152,155,162,0.16);
      --semantic-background-normal-normal:#1B1C1E; --semantic-background-normal-alternative:#0F0F10;
      --semantic-background-elevated-normal:#212225; --semantic-background-elevated-alternative:#141415;
      --semantic-interaction-inactive:#5A5C63; --semantic-interaction-disable:#2E2F33;
      --semantic-line-normal-normal:rgba(112,115,124,0.32);
      --semantic-line-normal-neutral:rgba(112,115,124,0.28);
      --semantic-line-normal-alternative:rgba(112,115,124,0.22);
      --semantic-line-solid-normal:#37383C; --semantic-line-solid-neutral:#333438; --semantic-line-solid-alternative:#2E2F33;
      --semantic-status-positive:#1ED45A; --semantic-status-cautionary:#FFA938; --semantic-status-negative:#FF6363;
      --semantic-fill-normal:rgba(112,115,124,0.22); --semantic-fill-strong:rgba(112,115,124,0.28);
      --semantic-fill-alternative:rgba(112,115,124,0.12);
      --semantic-material-dimmer:rgba(23,23,25,0.74);
      --semantic-inverse-primary:#0066FF; --semantic-inverse-background:#ffffff; --semantic-inverse-label:#171719;
    }

    /* ====== RESET / BASE ====== */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:var(--font-family-base);
      color:var(--semantic-label-normal);
      background:var(--semantic-background-normal-alternative);
      font-size:var(--type-body1-size);
      line-height:var(--type-body1-line);
      letter-spacing:var(--type-body1-tracking);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit}
    #root{min-height:100dvh;display:flex;justify-content:center;background:var(--semantic-background-normal-alternative)}

    /* ====== APP SHELL ====== */
    .app{
      width:100%;max-width:var(--app-max);min-height:100dvh;
      background:var(--semantic-background-normal-normal);
      display:flex;flex-direction:column;position:relative;
      box-shadow:var(--shadow-spread-small);
    }
    @media(max-width:460px){.app{box-shadow:none;max-width:100%}}

    /* ====== APPBAR ====== */
    .appbar{
      position:sticky;top:0;z-index:10;
      background:color-mix(in srgb, var(--semantic-background-normal-normal) 88%, transparent);
      backdrop-filter:saturate(180%) blur(32px);
      -webkit-backdrop-filter:saturate(180%) blur(32px);
      border-bottom:1px solid var(--semantic-line-solid-normal);
      padding:env(safe-area-inset-top) 0 0;
    }
    .appbar-inner{height:var(--appbar-h);display:flex;align-items:center;padding:0 var(--space-16);gap:var(--space-8)}
    .appbar-title{flex:1;display:flex;flex-direction:column;line-height:1.15;min-width:0}
    .appbar-title .sub{
      font-size:var(--type-caption2-size);line-height:var(--type-caption2-line);
      letter-spacing:var(--type-caption2-tracking);
      color:var(--semantic-label-alternative);font-weight:var(--weight-medium);
    }
    .appbar-title .main{
      font-size:var(--type-headline2-size);line-height:1.25;
      letter-spacing:var(--type-headline2-tracking);
      font-weight:var(--weight-bold-text);
      color:var(--semantic-label-normal);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    /* ====== BUTTONS ====== */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      height:44px;padding:0 var(--space-16);
      border-radius:var(--radius-lg);
      font-size:var(--type-body2-size);letter-spacing:var(--type-body2-tracking);
      font-weight:var(--weight-bold-text);
      transition:background 150ms ease, box-shadow 150ms ease, color 150ms ease;
    }
    .btn.primary{background:var(--semantic-primary-normal);color:var(--semantic-static-white)}
    .btn.primary:hover{background:var(--semantic-primary-strong)}
    .btn.primary:active{background:var(--semantic-primary-heavy)}
    .btn.ghost{background:var(--semantic-fill-normal);color:var(--semantic-label-normal)}
    .btn.ghost:hover{background:var(--semantic-fill-strong)}
    .btn.danger{background:color-mix(in srgb, var(--semantic-status-negative) 10%, transparent);color:var(--semantic-status-negative)}
    .btn.danger:hover{background:color-mix(in srgb, var(--semantic-status-negative) 16%, transparent)}
    .btn.sm{height:32px;padding:0 var(--space-12);font-size:var(--type-label2-size);letter-spacing:var(--type-label2-tracking);border-radius:var(--radius-sm)}

    /* ====== LOGIN / 표지 ====== */
    .login{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      padding:var(--space-32) var(--space-24) var(--space-32);gap:var(--space-14);text-align:center;
    }
    .login h1{font-size:var(--type-heading1-size);line-height:var(--type-heading1-line);letter-spacing:var(--type-heading1-tracking);font-weight:var(--weight-bold-display);margin:0}
    .login p{color:var(--semantic-label-alternative);margin:0}
    /* ── 표지 cover (시안 적용: 다크 히어로 + 앱 미리보기 카드 + 블루 로그인) ──
       LoginScreen 전용. UnauthorizedScreen/에러 화면은 위의 generic .login 유지. */
    .cover{flex:1;display:flex;flex-direction:column;min-height:100dvh;background:var(--semantic-background-normal-alternative)}
    .cover .login-notice{margin:calc(env(safe-area-inset-top) + var(--space-12)) var(--space-16) 0}
    /* notice가 있으면 히어로의 상단 safe-area 패딩은 notice가 이미 처리 → 중복 제거 */
    .cover:has(> .login-notice) .cover-hero{padding-top:var(--space-32)}

    /* 다크 마스트헤드 — 테마 무관 고정 브랜드 밴드 */
    .cover-hero{
      background:var(--atomic-coolNeutral-10); /* #171719 */
      color:#fff;text-align:center;
      padding:calc(env(safe-area-inset-top) + var(--space-40)) var(--space-24) var(--space-80);
    }
    .cover-brand{display:inline-flex;align-items:center;gap:var(--space-6);margin-bottom:var(--space-20)}
    .cover-brand svg{display:block}
    .cover-brand-text{font-size:var(--type-label1-size);font-weight:var(--weight-bold-display);color:#fff;letter-spacing:-0.01em}
    .cover-title{
      margin:0;color:#fff;word-break:keep-all;
      font-size:clamp(28px, 8.4vw, 34px);line-height:1.18;
      font-weight:800;letter-spacing:-0.03em;
    }
    .cover-sub{
      margin:var(--space-14) 0 0;color:rgba(255,255,255,0.62);word-break:keep-all;
      font-size:var(--type-body1-size);line-height:1.5;
    }

    /* 앱 미리보기 폰 카드 — 히어로/본문 경계에 겹쳐 떠 있음 */
    .cover-preview-wrap{margin:-72px var(--space-24) 0;position:relative;z-index:1}
    .cover-preview{
      background:var(--semantic-background-elevated-normal);
      border:1px solid var(--semantic-line-solid-alternative);
      border-radius:var(--radius-2xl);
      box-shadow:0 22px 50px -14px rgba(0,0,0,0.40), 0 6px 16px -8px rgba(0,0,0,0.22);
      padding:var(--space-16) var(--space-16) var(--space-8);overflow:hidden;
    }
    .cover-pv-status{
      display:flex;align-items:center;justify-content:space-between;
      font-size:var(--type-label2-size);font-weight:var(--weight-bold-display);
      color:var(--semantic-label-normal);padding:2px 2px var(--space-10);
    }
    .cover-pv-status .notch{width:34px;height:13px;border-radius:7px;border:2px solid var(--semantic-label-assistive)}
    .cover-pv-sub{font-size:var(--type-caption1-size);font-weight:var(--weight-bold-text);color:var(--semantic-label-alternative)}
    .cover-pv-class{font-size:var(--type-heading2-size);font-weight:800;letter-spacing:-0.02em;color:var(--semantic-label-normal);margin:1px 0 var(--space-10)}
    .cover-pv-count{
      display:flex;align-items:baseline;gap:var(--space-6);
      padding-bottom:var(--space-12);border-bottom:1px solid var(--semantic-line-solid-alternative);
    }
    .cover-pv-count .big{font-size:30px;line-height:1;font-weight:800;letter-spacing:-0.02em;color:var(--semantic-label-normal)}
    .cover-pv-count .rest{font-size:var(--type-body2-size);color:var(--semantic-label-alternative);font-weight:var(--weight-medium)}
    .cover-pv-row{display:flex;align-items:center;gap:var(--space-12);padding:var(--space-10) 0}
    .cover-pv-row .nm{font-size:var(--type-headline2-size);font-weight:var(--weight-bold-text);color:var(--semantic-label-normal);line-height:1.2}
    .cover-pv-row .gr{font-size:var(--type-caption1-size);color:var(--semantic-label-alternative);margin-top:2px}
    .cover-pv-row .chk{
      margin-left:auto;width:26px;height:26px;border-radius:var(--radius-pill);flex-shrink:0;
      display:inline-flex;align-items:center;justify-content:center;
    }
    .cover-pv-row .chk.on{background:var(--atomic-blue-50)}
    .cover-pv-row .chk.off{border:2px solid var(--semantic-line-solid-normal)}

    /* 본문(밝은 영역) — 로그인 버튼 + 푸터, 하단 정렬 */
    .cover-body{
      flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:var(--space-14);
      padding:var(--space-32) var(--space-20) calc(env(safe-area-inset-bottom) + var(--space-32));
    }
    .cover-gis{display:flex;justify-content:center;width:100%;min-height:44px}
    .cover-foot{margin:0;font-size:var(--type-label1-size);color:var(--semantic-label-alternative);text-align:center;word-break:keep-all}

    /* ====== STUDENT CARD ====== */
    .student-card{
      padding:var(--space-12) var(--space-16);
      border:1px solid var(--semantic-line-solid-normal);
      border-radius:var(--radius-xl);
      margin:var(--space-8) var(--space-16);
      display:flex;align-items:center;gap:var(--space-12);
      background:var(--semantic-background-normal-normal);
      transition:border-color 150ms ease, background 150ms ease;
    }
    .student-card.compact{padding:var(--space-10) var(--space-12);margin:var(--space-6) var(--space-12);gap:var(--space-10)}
    /* 이름 칸: 내용 길이에 맞춰 72~120px 유연 — 5자 이상 이름 줄바꿈 방지 */
    .student-card.compact .student-info{flex:0 1 auto;min-width:72px;max-width:120px}
    .student-card.compact .student-name{font-size:var(--type-label1-size);line-height:1.2}
    .student-card.compact .student-meta{font-size:var(--type-caption2-size);margin-top:1px}
    .student-card.compact .student-actions{flex:1;gap:var(--space-4);justify-content:flex-end}

    .student-name{font-weight:var(--weight-bold-text);color:var(--semantic-label-normal)}
    .student-meta{font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);color:var(--semantic-label-alternative)}
    .student-actions{margin-left:auto;display:flex;gap:var(--space-6);flex-wrap:wrap;justify-content:flex-end}

    .student-card[data-status="P2"]    {background:color-mix(in srgb, var(--att-p2) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p2) 26%, transparent)}
    .student-card[data-status="P3"]    {background:color-mix(in srgb, var(--att-p3) 4%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p3) 24%, transparent)}
    .student-card[data-status="P4"]    {background:color-mix(in srgb, var(--att-p4) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-p4) 24%, transparent)}
    .student-card[data-status="ETC"]   {background:color-mix(in srgb, var(--att-etc) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-etc) 26%, transparent)}
    .student-card[data-status="ABSENT"]{background:color-mix(in srgb, var(--att-absent) 5%, var(--semantic-background-normal-normal));border-color:color-mix(in srgb, var(--att-absent) 24%, transparent)}

    /* ====== STATUS PILL ====== */
    .pill{
      padding:var(--space-6) var(--space-10);border-radius:var(--radius-pill);
      font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);
      font-weight:var(--weight-bold-text);
      border:1.5px solid var(--semantic-line-solid-normal);
      background:var(--semantic-background-normal-normal);
      color:var(--semantic-label-neutral);
      display:inline-flex;align-items:center;justify-content:center;
      min-height:34px; /* 터치 타겟 확보 (M2) */
      transition:background 150ms ease, border-color 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }
    /* compact도 시각 크기는 작게 유지하되 터치 높이는 30px 이상 확보 (M2) */
    .pill.compact{padding:7px 9px;min-height:30px;font-size:var(--type-caption2-size);border-width:1px;letter-spacing:-0.02em}
    .pill:hover{background:var(--semantic-fill-normal)}
    .pill.active.P2    {background:color-mix(in srgb, var(--att-p2) 14%, transparent);    border-color:var(--att-p2);    color:var(--att-p2-fg);    box-shadow:0 0 0 1px color-mix(in srgb, var(--att-p2) 18%, transparent)}
    .pill.active.P3    {background:color-mix(in srgb, var(--att-p3) 12%, transparent);    border-color:var(--att-p3);    color:var(--att-p3-fg);    box-shadow:0 0 0 1px color-mix(in srgb, var(--att-p3) 15%, transparent)}
    .pill.active.P4    {background:color-mix(in srgb, var(--att-p4) 12%, transparent);    border-color:var(--att-p4);    color:var(--att-p4-fg);    box-shadow:0 0 0 1px color-mix(in srgb, var(--att-p4) 18%, transparent)}
    .pill.active.ETC   {background:color-mix(in srgb, var(--att-etc) 12%, transparent);   border-color:var(--att-etc);   color:var(--att-etc-fg);   box-shadow:0 0 0 1px color-mix(in srgb, var(--att-etc) 18%, transparent)}
    .pill.active.ABSENT{background:color-mix(in srgb, var(--att-absent) 12%, transparent);border-color:var(--att-absent);color:var(--att-absent-fg);box-shadow:0 0 0 1px color-mix(in srgb, var(--att-absent) 15%, transparent)}

    /* ====== BULK LABEL (used by StatsView sort bar) ====== */
    .bulk-label{font-size:var(--type-caption2-size);color:var(--semantic-label-alternative);font-weight:var(--weight-bold-text);margin-right:2px}

    /* ====== LINK CHIP (전화/문자/지도) ====== */
    .link-chip{
      display:inline-flex;align-items:center;gap:3px;
      padding:3px var(--space-8);border-radius:var(--radius-pill);
      background:color-mix(in srgb, var(--semantic-primary-normal) 8%, transparent);
      color:var(--semantic-primary-normal);
      font-size:var(--type-caption1-size);font-weight:var(--weight-bold-text);text-decoration:none;
      transition:background 150ms ease;
    }
    .link-chip:hover{background:color-mix(in srgb, var(--semantic-primary-normal) 16%, transparent)}

    /* ====== CHECK PILL (새가족부 양육) ====== */
    .check-pill{
      display:inline-flex;align-items:center;gap:var(--space-4);
      min-height:32px; /* 터치 타겟 (M2) */
      padding:var(--space-6) var(--space-10);border-radius:var(--radius-pill);
      font-size:var(--type-caption1-size);font-weight:var(--weight-bold-text);
      border:1.5px solid var(--semantic-line-solid-normal);
      background:var(--semantic-background-normal-normal);
      color:var(--semantic-label-neutral);cursor:pointer;
      transition:background 150ms ease, border-color 150ms ease, color 150ms ease;
    }
    .check-pill.checked{background:color-mix(in srgb, var(--semantic-primary-normal) 12%, transparent);border-color:var(--semantic-primary-normal);color:var(--semantic-accent-fg-blue)}
    .check-pill .check-icon{font-size:13px}

    /* ====== ATT SUMMARY (통계 큰숫자) ====== */
    .att-summary{display:flex;align-items:baseline;gap:var(--space-8);padding:2px 0 var(--space-10)}
    .att-summary .big-num{font-size:var(--type-title1-size);line-height:1;letter-spacing:var(--type-title1-tracking);font-weight:var(--weight-bold-display);color:var(--semantic-label-normal)}
    .att-summary .big-num-label{font-size:var(--type-label2-size);color:var(--semantic-label-alternative);font-weight:var(--weight-medium)}
    .att-summary .ratio{margin-left:auto;font-size:var(--type-label2-size);font-weight:var(--weight-bold-text);color:var(--semantic-primary-normal)}

    /* ====== TOAST ====== */
    .toast{
      position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
      background:var(--semantic-inverse-background);color:var(--semantic-inverse-label);
      padding:var(--space-10) var(--space-16);border-radius:var(--radius-pill);
      font-size:var(--type-body2-size);box-shadow:var(--shadow-large);
      z-index:100;white-space:nowrap;
    }

    /* ====== BOTTOM NAV ====== */
    .bottomnav{
      position:sticky;bottom:0;display:flex;
      border-top:1px solid var(--semantic-line-solid-normal);
      background:var(--semantic-background-normal-normal);
      overflow-x:auto;-webkit-overflow-scrolling:touch;
      padding-bottom:env(safe-area-inset-bottom);scrollbar-width:none;
    }
    .bottomnav::-webkit-scrollbar{display:none}
    /* 탭이 6개여도 360px 폰에서 잘리지 않게 균등 분배 (M4) */
    .bottomnav button{
      flex:1 1 0;min-width:0;padding:var(--space-10) var(--space-4);
      font-size:var(--type-caption2-size);letter-spacing:var(--type-caption2-tracking);
      color:var(--semantic-label-alternative);white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
      transition:color 150ms ease;
    }
    .bottomnav button.active{color:var(--semantic-primary-normal);font-weight:var(--weight-bold-text)}

    /* ====== LOADING ====== */
    .loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--semantic-label-alternative);padding:var(--space-40) 0}

    /* ====== SHEET / MODAL ====== */
    .sheet-overlay{position:fixed;inset:0;background:var(--semantic-material-dimmer);display:flex;align-items:flex-end;z-index:50}
    .sheet{
      background:var(--semantic-background-elevated-normal);width:100%;max-width:var(--app-max);margin:0 auto;
      border-top-left-radius:var(--radius-2xl);border-top-right-radius:var(--radius-2xl);
      max-height:92vh;display:flex;flex-direction:column;overflow:hidden;
      box-shadow:var(--shadow-xlarge);
    }
    .sheet-handle{width:36px;height:4px;border-radius:var(--radius-pill);background:var(--semantic-line-solid-normal);margin:var(--space-10) auto var(--space-6)}
    .sheet-header{padding:var(--space-4) var(--space-20) var(--space-10);display:flex;align-items:center;justify-content:space-between;gap:var(--space-12)}
    .sheet-header h3{font-size:var(--type-headline1-size);line-height:var(--type-headline1-line);letter-spacing:var(--type-headline1-tracking);font-weight:var(--weight-bold-text);margin:0}
    .sheet-close{width:36px;height:36px;border-radius:var(--radius-md);display:inline-flex;align-items:center;justify-content:center;color:var(--semantic-label-alternative)}
    .sheet-close:hover{background:var(--semantic-fill-normal)}
    .sheet-body{padding:0 var(--space-20) var(--space-16);overflow-y:auto;flex:1}
    .sheet-footer{padding:var(--space-12) var(--space-20);border-top:1px solid var(--semantic-line-solid-normal)}

    /* ====== FORM ====== */
    .form-row{margin-bottom:var(--space-14)}
    .form-label{font-size:var(--type-label2-size);letter-spacing:var(--type-label2-tracking);font-weight:var(--weight-bold-text);color:var(--semantic-label-alternative);margin-bottom:var(--space-4);display:block}
    .form-input,.form-select{
      width:100%;padding:var(--space-10) var(--space-12);
      border:1.5px solid var(--semantic-line-solid-normal);border-radius:var(--radius-md);
      font:inherit;font-size:var(--type-body2-size);color:var(--semantic-label-normal);
      background:var(--semantic-background-normal-normal);
      transition:border-color 150ms ease;outline:none;
    }
    .form-input:focus,.form-select:focus{border-color:var(--semantic-primary-normal);box-shadow:0 0 0 3px color-mix(in srgb, var(--semantic-primary-normal) 12%, transparent)}
    .form-select{cursor:pointer}
    .radio-group{display:flex;gap:var(--space-12)}
    .radio-label{display:flex;align-items:center;gap:var(--space-6);font-size:var(--type-body2-size);cursor:pointer}

    /* ====== SECTION HEAD ====== */
    .section-head{
      padding:var(--space-12) var(--space-16) var(--space-6);
      font-size:var(--type-caption1-size);letter-spacing:0.04em;text-transform:uppercase;
      font-weight:var(--weight-bold-text);color:var(--semantic-label-alternative);
    }

    /* ====== NEWCOMER CARD ====== */
    .newcomer-card{border-radius:var(--radius-xl);border:1px solid var(--semantic-line-solid-normal);margin:var(--space-8) var(--space-16);overflow:hidden;background:var(--semantic-background-normal-normal);transition:border-color 150ms ease}
    .newcomer-card-top{padding:var(--space-12) var(--space-14);display:flex;align-items:center;gap:var(--space-12);transition:background 150ms ease}
    .newcomer-card[data-status="P2"]    {border-color:color-mix(in srgb, var(--att-p2) 26%, transparent)}
    .newcomer-card[data-status="P3"]    {border-color:color-mix(in srgb, var(--att-p3) 24%, transparent)}
    .newcomer-card[data-status="P4"]    {border-color:color-mix(in srgb, var(--att-p4) 24%, transparent)}
    .newcomer-card[data-status="ETC"]   {border-color:color-mix(in srgb, var(--att-etc) 26%, transparent)}
    .newcomer-card[data-status="ABSENT"]{border-color:color-mix(in srgb, var(--att-absent) 24%, transparent)}
    .newcomer-card-bottom{padding:var(--space-8) var(--space-14) var(--space-12);border-top:1px solid var(--semantic-line-normal-alternative);display:flex;flex-wrap:wrap;gap:var(--space-6);align-items:center}
    .newcomer-footer{padding:var(--space-6) var(--space-14) var(--space-10);display:flex;gap:var(--space-8)}

    /* ====== ADMIN ====== */
    .admin-section{padding:var(--space-12) var(--space-16);border-bottom:1px solid var(--semantic-line-solid-normal)}
    .admin-section h4{margin:0 0 var(--space-10);font-size:var(--type-label1-size);font-weight:var(--weight-bold-text);color:var(--semantic-label-alternative)}
    .stat-row{display:flex;justify-content:space-between;padding:var(--space-6) 0;border-bottom:1px solid var(--semantic-line-normal-alternative);font-size:var(--type-body2-size)}
    .class-group-head{font-size:var(--type-label1-size);font-weight:var(--weight-bold-text);color:var(--semantic-primary-normal);padding:var(--space-10) 0 var(--space-4)}

    /* ====== PRAYER ITEM (선택적, JSX 인라인 스타일 유지중) ====== */
    .prayer-item{margin-top:var(--space-8);padding:var(--space-10) var(--space-12);background:var(--semantic-fill-normal);border-radius:var(--radius-md);display:flex;gap:var(--space-8)}
    .prayer-item .txt{flex:1;white-space:pre-wrap}
    .prayer-item .edit{color:var(--semantic-label-alternative)}
    .prayer-item .del{color:var(--semantic-status-negative)}

    /* ============================================================
       UX Medium 5 커스텀 (M1~M5) — Montage 토큰화, 그라데이션 제거
       ============================================================ */

    /* M2 — Roster filter/sort toolbar */
    .filter-bar{
      padding:var(--space-8) var(--space-16);
      display:flex;gap:var(--space-6);flex-wrap:wrap;align-items:center;
      border-bottom:1px solid var(--semantic-line-solid-normal);
      background:var(--semantic-background-normal-normal);
    }
    .filter-chip{
      padding:6px var(--space-12);border-radius:var(--radius-pill);
      font-size:var(--type-caption1-size);letter-spacing:var(--type-caption1-tracking);
      font-weight:var(--weight-bold-text);
      background:var(--semantic-fill-normal);
      color:var(--semantic-label-alternative);
      border:1px solid transparent;cursor:pointer;
      display:inline-flex;align-items:center;min-height:30px; /* 터치 타겟 (M2) */
      transition:background 150ms ease, color 150ms ease, border-color 150ms ease;
    }
    .filter-chip.active{
      background:color-mix(in srgb, var(--semantic-primary-normal) 10%, transparent);
      color:var(--semantic-primary-normal);
      border-color:color-mix(in srgb, var(--semantic-primary-normal) 25%, transparent);
    }
    .filter-chip .count{font-weight:var(--weight-bold-display);margin-left:3px}
    .filter-sep{width:1px;height:16px;background:var(--semantic-line-solid-normal);margin:0 var(--space-4)}

    /* M5 — 3주 연속 결석 강조 */
    .warn-badge{
      display:inline-flex;align-items:center;gap:3px;
      padding:2px var(--space-6);border-radius:var(--radius-sm);
      background:color-mix(in srgb, var(--semantic-status-negative) 12%, transparent);
      color:var(--semantic-status-negative);
      font-size:var(--type-caption2-size);font-weight:var(--weight-bold-display);
      margin-left:var(--space-6);letter-spacing:-0.02em;
    }
    .student-card.warn{border-left:3px solid var(--semantic-status-negative)}

    /* M4 — 마지막 출석일 메타 */
    .last-att{color:var(--semantic-label-alternative);font-size:var(--type-caption2-size);margin-left:var(--space-6)}
    .last-att.recent{color:var(--semantic-status-positive)}
    .last-att.stale{color:var(--semantic-status-negative)}

    /* M3 — 기도제목 작성일 */
    .prayer-meta{font-size:var(--type-caption2-size);color:var(--semantic-label-alternative);margin-top:var(--space-4)}

    /* M1 — Stats 요약 카드 + 학생별 progress bar (그라데이션 제거, 평면 틴트) */
    .stats-summary{
      margin:var(--space-12) var(--space-16);
      padding:var(--space-14) var(--space-16);
      border-radius:var(--radius-xl);
      background:color-mix(in srgb, var(--semantic-primary-normal) 6%, var(--semantic-background-normal-normal));
      border:1px solid color-mix(in srgb, var(--semantic-primary-normal) 16%, transparent);
    }
    .stats-summary-title{
      font-size:var(--type-caption1-size);letter-spacing:0.02em;text-transform:uppercase;
      color:var(--semantic-label-alternative);font-weight:var(--weight-bold-text);
      margin-bottom:var(--space-6);
    }
    .stats-summary-row{display:flex;align-items:baseline;gap:var(--space-12)}
    .stats-summary-row .big{
      font-size:30px;line-height:1;
      letter-spacing:var(--type-title1-tracking);
      font-weight:var(--weight-bold-display);
      color:var(--semantic-primary-normal);
    }
    .stats-summary-row .sub{font-size:var(--type-label2-size);color:var(--semantic-label-normal);font-weight:var(--weight-medium)}
    .stats-summary-meta{margin-top:var(--space-8);font-size:var(--type-caption1-size);color:var(--semantic-label-alternative)}
    .stats-summary-meta strong{color:var(--semantic-label-normal);font-weight:var(--weight-bold-text)}

    .stat-bar-card{
      margin:var(--space-6) var(--space-16);
      padding:var(--space-10) var(--space-14);
      border:1px solid var(--semantic-line-solid-normal);
      border-radius:var(--radius-lg);
      background:var(--semantic-background-normal-normal);
    }
    .stat-bar-card.risk{
      border-color:color-mix(in srgb, var(--semantic-status-negative) 30%, transparent);
      background:color-mix(in srgb, var(--semantic-status-negative) 3%, var(--semantic-background-normal-normal));
    }
    .stat-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-6)}
    .stat-bar-name{font-size:var(--type-label1-size);font-weight:var(--weight-bold-text)}
    .stat-bar-pct{font-size:var(--type-label2-size);font-weight:var(--weight-bold-display);color:var(--semantic-primary-normal)}
    .stat-bar-card.risk .stat-bar-pct{color:var(--semantic-status-negative)}
    .stat-bar-track{height:6px;border-radius:3px;background:var(--semantic-fill-normal);overflow:hidden}
    .stat-bar-fill{height:100%;background:var(--semantic-primary-normal);border-radius:3px;transition:width 240ms ease}
    .stat-bar-card.risk .stat-bar-fill{background:var(--semantic-status-negative)}
    .stat-bar-card.good .stat-bar-fill{background:var(--semantic-status-positive)}
    .stat-bar-meta{font-size:var(--type-caption2-size);color:var(--semantic-label-alternative);margin-top:var(--space-4)}

    /* ============================================================
       UX round 2 — H1/H2/M3 + Low (undo, 다크토글, 만료안내, 주이동)
       ============================================================ */

    /* 일괄 적용 실행취소 바 */
    .undo-bar{
      margin:var(--space-4) var(--space-12);
      padding:var(--space-6) var(--space-8) var(--space-6) var(--space-12);
      border-radius:var(--radius-lg);
      background:var(--semantic-fill-normal);
      display:flex;align-items:center;gap:var(--space-8);
      font-size:var(--type-label2-size);letter-spacing:var(--type-label2-tracking);
    }
    .undo-bar span{flex:1;color:var(--semantic-label-neutral);min-width:0}

    /* 세션 만료 안내 (로그인 화면) */
    .login-notice{
      padding:var(--space-8) var(--space-14);
      border-radius:var(--radius-md);
      background:color-mix(in srgb, var(--semantic-status-cautionary) 10%, transparent);
      color:var(--semantic-accent-fg-orange);
      font-size:var(--type-label2-size);font-weight:var(--weight-bold-text);
    }

    /* 앱바 아이콘 버튼 (다크모드 토글) */
    .icon-btn{
      width:36px;height:36px;border-radius:var(--radius-md);
      display:inline-flex;align-items:center;justify-content:center;
      color:var(--semantic-label-alternative);flex-shrink:0;
      transition:background 150ms ease, color 150ms ease;
    }
    .icon-btn:hover{background:var(--semantic-fill-normal);color:var(--semantic-label-normal)}

    /* ── v1.2 week stepper ── */
    .week-stepper{display:flex;align-items:center;gap:4px;padding:6px 8px;
      border-bottom:1px solid var(--line-solid);background:var(--bg)}
    .week-stepper.off-week{background:color-mix(in srgb, var(--att-etc) 18%, var(--bg))}
    .week-stepper.off-week .week-main{color:var(--att-etc-fg)}

    .trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}

    /* ── v1.2 theme: 밝고 활기찬 청소년부 (라이트 전용 오버라이드) ──
       다크 모드는 <html data-theme="dark">이므로 :root:not([data-theme="dark"])로

      --semantic-primary-normal:#FF6B4A;     /* 코랄 포인트 (--primary alias도 따라옴) */

    }
    /* checked 필 텍스트를 코랄 계열로 — 기존 블루(--semantic-accent-fg-blue)와의 충돌 방지 */

    :root:not([data-theme="dark"]) .appbar .btn.ghost{color:#fff;border:1px solid rgba(255,255,255,.4)}
    /* background은 건드리지 않는다 — .student-card[data-status]의 상태 틴트 보존 */
    :root:not([data-theme="dark"]) .student-card{
      margin:8px 12px;box-shadow:0 2px 10px rgba(255,107,74,.06);

    .student-name{font-size:17px;font-weight:700}

    .pill{min-height:40px;min-width:44px}

    /* 저장 실패 재시도 칩 (v1.2) — 기존 상태 필 패턴(--att-* 변수 + color-mix)을 따라 다크 모드 호환 */

<body>
  <div id="root"></div>
  <script>
    window.APP_CONFIG = {
      GAS_URL: 'https://script.google.com/macros/s/AKfycbz0vknBedfi4QsvqgtM1JYjHAqrETM90kcb95oxZof8svX8SDL2n1lHgGcgXILp5Zjatg/exec',
      OAUTH_CLIENT_ID: '90527666620-pv68hai4j0rfqa94hsubrs2pe3afgril.apps.googleusercontent.com',
    };
  </script>
  <script type="text/babel" data-presets="env,react" data-type="module">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ──────────────── API client ────────────────
    // 클라이언트 읽기 캐시 — 탭 전환 시 재요청을 막아 즉시 화면 전환 (M1).
    // 쓰기 액션이 성공하면 관련 읽기 캐시를 무효화한다.
    const apiCache = new Map(); // key → { t, json }
    const READ_TTL_MS = 2 * 60 * 1000; // 2분 (서버 캐시 5분보다 짧게)
    const READ_ACTIONS = ['getRoster','getAttendance','getPrayers','getNewcomers',
      'getAllRosters','getAllAttendance','getAllPrayers','getStudentDetail'];
    const WRITE_INVALIDATES = {
      setAttendance:      ['getAttendance','getAllAttendance','getNewcomers'],
      setAttendanceBatch: ['getAttendance','getAllAttendance','getNewcomers'],
      setPrayer:          ['getPrayers','getAllPrayers'],
      addNewcomer:        ['getNewcomers','getAllRosters'],
      setNewcomerProgress:['getNewcomers'],
      graduate:           ['getNewcomers','getRoster','getAllRosters','getAttendance','getAllAttendance','getStudentDetail'],
    };
    function invalidateApiCache(prefixes) {
      Array.from(apiCache.keys()).forEach((k) => {
        if (prefixes.some((p) => k.indexOf(p + '|') === 0)) apiCache.delete(k);
      });
    }
    // 세대 카운터: 로그아웃/만료로 clear된 뒤, 그 이전에 발사된 in-flight 응답이
    // 캐시에 도로 적재되는 것을 막는다 (공유 기기에서 이전 사용자 명단 노출 방지).
    let apiCacheGen = 0;
    function clearApiCache() { apiCache.clear(); apiCacheGen++; }

    // 동일 읽기 요청이 동시에 여러 번 나가지 않도록 in-flight promise 공유.
    // (로그인 직후 prefetch와 RosterView 마운트가 같은 요청을 쏘는 경우 1회만 발사)
    const apiInflight = new Map(); // key → Promise

    async function callApiRaw_(action, payload, cacheKey) {
      const genAtStart = apiCacheGen;
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(window.APP_CONFIG.GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body,
      });
      if (!res.ok) throw new Error('네트워크 오류 ' + res.status);
      const json = await res.json();
      if (json && json.ok === false && (json.code === 'token_expired' || json.code === 'invalid_token')) {
        // 토큰 만료(구글 ID Token ~1시간): 저장소·캐시를 비우고 로그인 화면으로
        // 전환하도록 알림 (H2 — 만료 후 무한 저장실패 루프 방지)
        sessionStorage.removeItem('idToken');
        clearApiCache();
        window.dispatchEvent(new CustomEvent('app:session-expired'));
      }
      if (json && json.ok) {
        // 발사 후 로그아웃/만료로 캐시가 비워졌다면 적재하지 않는다.
        if (cacheKey && genAtStart === apiCacheGen) apiCache.set(cacheKey, { t: Date.now(), json });
        if (WRITE_INVALIDATES[action]) invalidateApiCache(WRITE_INVALIDATES[action]);
      }
      return json;
    }

    function callApi(action, payload) {
      // 캐시 키에 idToken은 제외 (세션당 단일 사용자, 로그아웃 시 전체 clear)
      const cacheKey = READ_ACTIONS.indexOf(action) >= 0
        ? action + '|' + JSON.stringify({ ...payload, idToken: undefined })
        : null;
      if (cacheKey) {
        const hit = apiCache.get(cacheKey);
        if (hit && Date.now() - hit.t < READ_TTL_MS) return Promise.resolve(hit.json);
        const inflight = apiInflight.get(cacheKey);
        if (inflight) return inflight;
      }
      const p = callApiRaw_(action, payload, cacheKey);
      if (cacheKey) {
        apiInflight.set(cacheKey, p);
        p.then(() => apiInflight.delete(cacheKey), () => apiInflight.delete(cacheKey));
      }
      return p;
    }

    // ──────────────── Google Auth ────────────────
    function useGoogleAuth() {
      const [idToken, setIdToken] = useState(() => sessionStorage.getItem('idToken') || null);
      const [ready, setReady] = useState(false);
      const [expired, setExpired] = useState(false);
      const containerRef = useRef(null);

      // 토큰 만료 감지(callApi에서 발행) → 즉시 로그인 화면으로 전환 (H2)
      useEffect(() => {
        const onExpired = () => { setExpired(true); setIdToken(null); };
        window.addEventListener('app:session-expired', onExpired);
        return () => window.removeEventListener('app:session-expired', onExpired);
      }, []);

      useEffect(() => {
        let cancelled = false;
        let attempts = 0;
        let timerId = null;
        const tryInit = () => {
          if (cancelled) return;
          if (!window.google || !window.google.accounts || !window.google.accounts.id) {
            attempts++;
            if (attempts > 50) { console.warn('GIS failed to load after 5s'); return; }
            timerId = setTimeout(tryInit, 100);
            return;
          }
          google.accounts.id.initialize({
            client_id: window.APP_CONFIG.OAUTH_CLIENT_ID,
            callback: (resp) => {
              if (resp && resp.credential) {
                sessionStorage.setItem('idToken', resp.credential);
                setExpired(false);
                setIdToken(resp.credential);
              }
            },
            auto_select: false,
          });
          setReady(true);
        };
        tryInit();
        return () => { cancelled = true; if (timerId) clearTimeout(timerId); };
      }, []);

      const renderButton = useCallback(() => {
        if (!ready || !containerRef.current) return;
        // 버튼 폭을 컨테이너 실제 폭에 맞춰 동적 산출 — 좁은 폰(320px) 오버플로 방지,
        // 큰 화면에선 거의 풀폭(GIS 허용 범위 200~400px로 클램프).
        const avail = containerRef.current.offsetWidth || 320;
        const width = Math.max(200, Math.min(400, Math.round(avail)));
        google.accounts.id.renderButton(containerRef.current, { theme: 'filled_blue', size: 'large', shape: 'pill', text: 'signin_with', logo_alignment: 'center', width });
      }, [ready]);

      useEffect(() => { if (ready && !idToken) renderButton(); }, [ready, idToken, renderButton]);

      const signOut = useCallback(() => {
        sessionStorage.removeItem('idToken');
        clearApiCache(); // 공유 기기에서 PII가 메모리 캐시에 남지 않도록
        setExpired(false);
        setIdToken(null);
        if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
      }, []);

      return { idToken, ready, expired, containerRef, signOut };
    }

    // ──────────────── Helpers ────────────────
    function todayISO() {
      const now = new Date();
      const kst = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
      const y = kst.getUTCFullYear();
      const m = String(kst.getUTCMonth()+1).padStart(2,'0');
      const dd = String(kst.getUTCDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    // Shift an ISO date by n days — 주 단위 날짜 점프(◀ 지난주/다음주 ▶)용.
    function shiftDays(iso, n) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d.getTime())) return todayISO();
      d.setDate(d.getDate() + n);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + dd;
    }

    // 가장 최근 주일(일요일). 오늘이 주일이면 오늘. KST 기준(todayISO).
    function recentSunday() {
      const iso = todayISO();
      const d = new Date(iso + 'T00:00:00');
      return shiftDays(iso, -d.getDay());
    }

    // 'YYYY-MM-DD' → '6월 2주 · 6/14 주일' (그 달의 N번째 주일).
    function weekLabel(iso) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d.getTime())) return iso;
      const month = d.getMonth() + 1;
      const nth = Math.floor((d.getDate() - 1) / 7) + 1;
      return month + '월 ' + nth + '주 · ' + month + '/' + d.getDate() + ' 주일';
    }

    // Relative time for prayer createdAt etc. Accepts 'YYYY-MM-DD' or
    // ISO timestamp; returns "오늘", "어제", "N일 전", "N주 전", or absolute date.
    function relativeDate(iso) {
      if (!iso) return '';
      const dateOnly = String(iso).slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateOnly)) return iso;
      const then = new Date(dateOnly + 'T00:00:00');
      const now = new Date(todayISO() + 'T00:00:00');
      const diff = Math.round((now - then) / 86400000);
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff > 0 && diff < 14) return diff + '일 전';
      if (diff >= 14 && diff < 60) return Math.floor(diff / 7) + '주 전';
      if (diff < 0) return dateOnly; // future → show absolute
      return dateOnly;
    }

    const STATUS_OPTIONS = [
      { code: 'P2', label: '2부', accent: 'positive' },
      { code: 'P3', label: '3부', accent: 'primary' },
      { code: 'P4', label: '4부', accent: 'violet' },
      { code: 'ETC', label: '기타', accent: 'cautionary' },
      { code: 'ABSENT', label: '결석', accent: 'negative' },
    ];

    // present = attended a service (P2/P3/P4)
    const PRESENT_CODES = ['P2', 'P3', 'P4'];

    const TITLE_LABELS = {
      pastor: '강도사',
      head: '교사총무',
      dev: '개발자',
      newcomer_lead: '새가족부 총괄',
    };

    function roleLabel(me) {
      const roleName =
        me.role === 'admin' ? '관리자'
        : me.role === 'newcomer_staff' ? '새가족부'
        : '교사';
      const titleName = TITLE_LABELS[me.title] || '';
      return titleName ? `${roleName} · ${titleName}` : roleName;
    }

    // 전역 주일 스테퍼. 다음 주(미래)는 이동 불가, 이번 주가 아니면 경고색 + [이번 주로].
    function WeekStepper({ sunday, onChange }) {
      const current = recentSunday();
      const isCurrent = sunday === current;
      return (
        <div className={'week-stepper' + (isCurrent ? '' : ' off-week')}>
          <button className="week-arrow" onClick={() => onChange(shiftDays(sunday, -7))} aria-label="지난 주일">◀</button>
          <div className="week-label">
            <span className="week-main" aria-live="polite">{weekLabel(sunday)}</span>
            {!isCurrent && (
              <button className="week-today" onClick={() => onChange(current)}>이번 주로</button>
            )}
          </div>
          <button className="week-arrow" onClick={() => onChange(shiftDays(sunday, 7))} aria-label="다음 주일"
            disabled={sunday >= current}>▶</button>
        </div>
      );
    }

    // ──────────────── Toast ────────────────
    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="toast">{msg}</div>;
    }

    function useToast() {
      const [msg, setMsg] = useState(null);
      const timerRef = useRef(null);
      const show = useCallback((m) => {
        setMsg(m);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => setMsg(null), 2200);
      }, []);
      useEffect(() => () => { if (timerRef.current) clearTimeout(timerRef.current); }, []);
      return React.useMemo(() => ({ msg, show }), [msg, show]);
    }

    // ──────────────── Login / Error screens ────────────────
    // 표지 미리보기 카드에 보여줄 예시 명단(시안 그대로) — UI 데모용, 실데이터 아님.
    const COVER_PREVIEW_ROWS = [
      { name: '김믿음', grade: '중2', present: true },
      { name: '박소망', grade: '중2', present: true },
      { name: '이사랑', grade: '중3', present: false },
      { name: '정은혜', grade: '중3', present: true },
    ];

    function LoginScreen({ containerRef, notice }) {
      return (
        <div className="cover">
          {notice && <div className="login-notice" role="alert">{notice}</div>}

          <div className="cover-hero">
            <span className="cover-brand">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff"
                strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M12 2.2v3.2M10.4 3.6h3.2" />
                <path d="M4.6 20.5v-9l7.4-5 7.4 5v9" />
                <path d="M3.4 20.5h17.2" />

    function UnauthorizedScreen({ email, onSignOut }) {
      return (
        <div className="login">

          <p>부장에게 등록을 요청하세요.</p>
